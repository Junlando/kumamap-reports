<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta property="og:image" content="https://i.meee.com.tw/Z3D57Nq.jpg"/>
    <meta property="og:title" content="一拍即分"/>
    <title>SplitBill 一拍即分</title>
    <script>
        var userAgent = navigator.userAgent || navigator.vendor || window.opera;

        if (!/android/i.test(userAgent) && !/iPad|iPhone|iPod/.test(userAgent)) {
            window.location = "https://junlando.com/splitbill";
        } else {
            var deepLinkUrl = 'splitbill://junlando.com/splitbill/invite' + window.location.search;
            var redirectTimer = setTimeout(redirectToStore, 1280);

            // 當 app 被喚起，瀏覽器會失去焦點，取消跳轉
            window.addEventListener('blur', function () {
                clearTimeout(redirectTimer);
            });

            // 部分 Android 瀏覽器用 visibilitychange 比較可靠
            document.addEventListener('visibilitychange', function () {
                if (document.hidden) {
                    clearTimeout(redirectTimer);
                }
            });

            window.location = deepLinkUrl;
        }

        function redirectToStore() {
            if (/android/i.test(userAgent)) {
                window.location = 'https://play.google.com/store/apps/details?id=com.junlando.splitbill';
            } else {
                window.location = 'https://apps.apple.com/us/app/id6760274304';
            }
        }
    </script>
</head>
<body>
</body>
</html>
