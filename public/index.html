<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Junlando – 日本旅遊社群</title>
  <meta name="description" content="分享日本旅遊資訊、美食、景點推薦的社群平台" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4F6EF7;
      --primary-light: #EEF1FE;
      --text-main: #1A1A2E;
      --text-sub: #888;
      --star: #F59E0B;
      --heart: #EF4444;
      --border: #F0F0F0;
      --bg: #F5F6FA;
      --card: #fff;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-main);
    }

    /* ── Header ── */
    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .header-inner {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .logo-icon { font-size: 22px; }
    .logo-text {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #4F6EF7, #A78BFA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-sub { font-size: 12px; color: var(--text-sub); }

    /* ── Feed ── */
    .feed {
      max-width: 680px;
      margin: 0 auto;
      padding: 16px 16px 80px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Post Card ── */
    .post-card {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      text-decoration: none;
      color: inherit;
      display: block;
      transition: box-shadow 0.18s;
    }
    .post-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }

    .card-body { padding: 14px 16px 0; }

    /* Topic tag */
    .topic-tag {
      display: inline-block;
      background: var(--primary-light);
      color: var(--primary);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 8px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Title + stars row */
    .card-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .card-restaurant {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.3;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .stars {
      display: flex;
      gap: 1px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .star { font-size: 13px; line-height: 1; }
    .star.filled { color: var(--star); }
    .star.empty  { color: #DDD; }

    /* Author row */
    .author-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .author-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
      background: linear-gradient(135deg, var(--primary), #A78BFA);
      flex-shrink: 0;
    }
    .author-avatar-placeholder {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #A78BFA);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .author-name { font-size: 13px; font-weight: 600; color: var(--text-main); }
    .author-dot  { font-size: 11px; color: var(--text-sub); }
    .post-time   { font-size: 12px; color: var(--text-sub); }

    /* Content */
    .card-content {
      font-size: 14px;
      color: #555;
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 10px;
    }

    /* Thumbnail */
    .card-thumb {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      background: #f0f0f0;
    }
    .card-thumb-placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      background: linear-gradient(135deg, #EEF1FE, #E0E7FF);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }

    /* Stats bar */
    .card-stats {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 16px 12px;
      border-top: 1px solid var(--border);
      margin-top: 10px;
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: var(--text-sub);
      font-weight: 500;
    }
    .stat-icon { font-size: 14px; }

    /* ── Skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton-card { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.06); padding: 16px; display: flex; flex-direction: column; gap: 12px; }

    /* ── State ── */
    .state-box { text-align: center; padding: 64px 24px; color: var(--text-sub); }
    .state-box .icon { font-size: 48px; margin-bottom: 12px; }
    .state-box p { font-size: 15px; }

    /* ── Load more ── */
    #load-more-btn {
      display: block;
      width: 100%;
      max-width: 320px;
      margin: 8px auto 0;
      padding: 13px;
      border: none;
      border-radius: 50px;
      background: var(--primary);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #load-more-btn:hover   { opacity: 0.85; }
    #load-more-btn:disabled { opacity: 0.5; cursor: default; }

    @media (max-width: 480px) {
      .feed { padding: 12px 12px 80px; gap: 10px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="/">
      <span class="logo-icon">✈️</span>
      <span class="logo-text">Junlando</span>
    </a>
    <span class="header-sub">日本旅遊社群</span>
  </div>
</header>

<div class="feed" id="feed">
  <!-- Skeleton -->
  <div class="skeleton-card">
    <div class="skeleton" style="height:18px;width:40%"></div>
    <div class="skeleton" style="height:22px;width:75%"></div>
    <div class="skeleton" style="height:14px;width:55%"></div>
    <div class="skeleton" style="height:200px;border-radius:12px"></div>
  </div>
  <div class="skeleton-card">
    <div class="skeleton" style="height:18px;width:50%"></div>
    <div class="skeleton" style="height:22px;width:65%"></div>
    <div class="skeleton" style="height:14px;width:45%"></div>
    <div class="skeleton" style="height:200px;border-radius:12px"></div>
  </div>
</div>
<button id="load-more-btn" style="display:none">載入更多</button>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCo8XHh_ln2fpGWkcuKtax0nYSKzlgFW-8",
    authDomain: "japan-community-fb528.firebaseapp.com",
    projectId: "japan-community-fb528",
    storageBucket: "japan-community-fb528.firebasestorage.app",
    messagingSenderId: "112553415405",
    appId: "1:112553415405:web:15aa1ec6c90e9841fa32e4"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const PAGE_SIZE = 15;
  let lastDoc = null;
  let loading = false;
  const feed = document.getElementById('feed');
  const loadMoreBtn = document.getElementById('load-more-btn');

  function relativeTime(ts) {
    if (!ts) return '';
    const diff = Date.now() - (ts.toDate ? ts.toDate() : new Date(ts)).getTime();
    const m = Math.floor(diff / 60000);
    if (m < 1)  return '剛剛';
    if (m < 60) return `${m} 分鐘前`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h} 小時前`;
    const d = Math.floor(h / 24);
    if (d < 30) return `${d} 天前`;
    const mo = Math.floor(d / 30);
    if (mo < 12) return `${mo} 個月前`;
    return `${Math.floor(mo / 12)} 年前`;
  }

  function renderStars(rating) {
    const r = Math.round(rating || 0);
    return Array.from({length: 5}, (_, i) =>
      `<span class="star ${i < r ? 'filled' : 'empty'}">★</span>`
    ).join('');
  }

  function renderCard(id, d) {
    const thumb = (Array.isArray(d.thumbnailURLs) && d.thumbnailURLs[0])
      || (Array.isArray(d.imageURLs) && d.imageURLs[0]);
    const name = d.title || d.restaurantName || '（未命名）';
    const topic = d.topicTitle || '';
    const avatarEl = d.authorAvatar
      ? `<img class="author-avatar" src="${d.authorAvatar}" alt="${d.authorName || ''}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    const avatarPlaceholder = `<div class="author-avatar-placeholder" style="${d.authorAvatar ? 'display:none' : ''}">${(d.authorName||'？')[0]}</div>`;

    return `
      <a class="post-card" href="/post/${id}">
        <div class="card-body">
          ${topic ? `<div class="topic-tag">${topic}</div>` : ''}
          <div class="card-title-row">
            <div class="card-restaurant">${name}</div>
            <div class="stars">${renderStars(d.rating)}</div>
          </div>
          <div class="author-row">
            ${avatarEl}${avatarPlaceholder}
            <span class="author-name">${d.authorName || '匿名'}</span>
            <span class="author-dot">·</span>
            <span class="post-time">${relativeTime(d.createdAt)}</span>
          </div>
          ${d.content ? `<div class="card-content">${d.content.replace(/\n/g,' ')}</div>` : ''}
        </div>
        ${thumb
          ? `<img class="card-thumb" src="${thumb}" alt="${name}" loading="lazy">`
          : `<div class="card-thumb-placeholder">🗾</div>`}
        <div class="card-stats">
          <div class="stat-item">
            <span class="stat-icon">❤️</span>
            <span>${d.likeCount || 0}</span>
          </div>
          <div class="stat-item">
            <span class="stat-icon">💬</span>
            <span>${d.commentCount || 0}</span>
          </div>
        </div>
      </a>`;
  }

  async function loadPosts(isFirst = false) {
    if (loading) return;
    loading = true;
    loadMoreBtn.disabled = true;
    if (isFirst) feed.innerHTML = '';
    try {
      let q = db.collection('posts').orderBy('createdAt', 'desc').limit(PAGE_SIZE);
      if (lastDoc) q = q.startAfter(lastDoc);
      const snap = await q.get();
      if (snap.empty && isFirst) {
        feed.innerHTML = `<div class="state-box"><div class="icon">🗺️</div><p>目前還沒有貼文</p></div>`;
        return;
      }
      snap.forEach(doc => feed.insertAdjacentHTML('beforeend', renderCard(doc.id, doc.data())));
      lastDoc = snap.docs[snap.docs.length - 1];
      loadMoreBtn.style.display = snap.docs.length < PAGE_SIZE ? 'none' : 'block';
    } catch (e) {
      console.error(e);
      if (isFirst) feed.innerHTML = `<div class="state-box"><div class="icon">⚠️</div><p>載入失敗，請稍後再試</p></div>`;
    } finally {
      loading = false;
      loadMoreBtn.disabled = false;
    }
  }

  loadMoreBtn.addEventListener('click', () => loadPosts(false));
  loadPosts(true);
</script>

</body>
</html>
