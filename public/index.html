<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Junlando – 日本旅遊社群</title>
  <meta name="description" content="分享日本旅遊資訊、優惠券、景點推薦的社群平台" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f8f9fa;
      color: #1a1a2e;
      min-height: 100vh;
    }
    header {
      background: #fff;
      border-bottom: 1px solid #e9ecef;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
    .logo-icon { font-size: 24px; }
    .logo-text {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #e63946, #f4a261);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-sub { font-size: 13px; color: #888; }
    .hero {
      background: linear-gradient(135deg, #e63946 0%, #f4a261 100%);
      color: #fff;
      text-align: center;
      padding: 48px 24px 40px;
    }
    .hero h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .hero p  { font-size: 15px; opacity: 0.9; }
    main { max-width: 960px; margin: 0 auto; padding: 32px 16px 64px; }
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #888;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .post-card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      transition: transform 0.18s, box-shadow 0.18s;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
    }
    .post-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
    .card-image { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #f0f0f0; }
    .card-image-placeholder {
      width: 100%;
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, #ffecd2, #fcb69f);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }
    .card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-content {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }
    .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
    .card-author { font-size: 12px; color: #e63946; font-weight: 600; }
    .card-date   { font-size: 11px; color: #aaa; }
    .state-box { text-align: center; padding: 64px 24px; color: #999; }
    .state-box .icon { font-size: 48px; margin-bottom: 16px; }
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton-card { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .skeleton-img  { height: 160px; }
    .skeleton-body { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .skeleton-line { height: 14px; border-radius: 4px; }
    #load-more-btn {
      display: block;
      margin: 32px auto 0;
      padding: 12px 32px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #e63946, #f4a261);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #load-more-btn:hover { opacity: 0.85; }
    #load-more-btn:disabled { opacity: 0.5; cursor: default; }
    @media (max-width: 480px) {
      .hero h1 { font-size: 22px; }
      .posts-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="/">
      <span class="logo-icon">✈️</span>
      <span class="logo-text">Junlando</span>
    </a>
    <span class="header-sub">日本旅遊社群</span>
  </div>
</header>

<div class="hero">
  <h1>✈️ 探索日本旅遊貼文</h1>
  <p>由旅人分享的真實體驗、美食與景點推薦</p>
</div>

<main>
  <div class="section-title">最新貼文</div>
  <div class="posts-grid" id="posts-grid">
    <div class="skeleton-card"><div class="skeleton skeleton-img"></div><div class="skeleton-body"><div class="skeleton skeleton-line" style="width:80%"></div><div class="skeleton skeleton-line" style="width:60%"></div></div></div>
    <div class="skeleton-card"><div class="skeleton skeleton-img"></div><div class="skeleton-body"><div class="skeleton skeleton-line" style="width:70%"></div><div class="skeleton skeleton-line" style="width:50%"></div></div></div>
    <div class="skeleton-card"><div class="skeleton skeleton-img"></div><div class="skeleton-body"><div class="skeleton skeleton-line" style="width:90%"></div><div class="skeleton skeleton-line" style="width:65%"></div></div></div>
  </div>
  <button id="load-more-btn" style="display:none">載入更多</button>
</main>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCo8XHh_ln2fpGWkcuKtax0nYSKzlgFW-8",
    authDomain: "japan-community-fb528.firebaseapp.com",
    projectId: "japan-community-fb528",
    storageBucket: "japan-community-fb528.firebasestorage.app",
    messagingSenderId: "112553415405",
    appId: "1:112553415405:web:15aa1ec6c90e9841fa32e4",
    measurementId: "G-B2MWZTZ1TZ"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const PAGE_SIZE = 12;
  let lastDoc = null;
  let loading = false;

  const grid = document.getElementById('posts-grid');
  const loadMoreBtn = document.getElementById('load-more-btn');

  function formatDate(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  function renderCard(id, data) {
    const { title, authorName, content, imageURLs, createdAt } = data;
    const img = Array.isArray(imageURLs) && imageURLs.length > 0 ? imageURLs[0] : null;
    const href = `/post/${id}`;
    return `
      <a class="post-card" href="${href}">
        ${img ? `<img class="card-image" src="${img}" alt="${title || ''}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
        <div class="card-image-placeholder" style="${img ? 'display:none' : ''}">🗾</div>
        <div class="card-body">
          <div class="card-title">${title || '（無標題）'}</div>
          <div class="card-content">${content ? content.replace(/\n/g, ' ') : ''}</div>
          <div class="card-footer">
            <span class="card-author">${authorName || '匿名'}</span>
            <span class="card-date">${formatDate(createdAt)}</span>
          </div>
        </div>
      </a>`;
  }

  async function loadPosts(isFirstLoad = false) {
    if (loading) return;
    loading = true;
    loadMoreBtn.disabled = true;
    if (isFirstLoad) grid.innerHTML = '';
    try {
      let query = db.collection('posts').orderBy('createdAt', 'desc').limit(PAGE_SIZE);
      if (lastDoc) query = query.startAfter(lastDoc);
      const snap = await query.get();
      if (snap.empty && isFirstLoad) {
        grid.innerHTML = `<div class="state-box" style="grid-column:1/-1"><div class="icon">🗺️</div><p>目前還沒有貼文，快來分享你的旅遊體驗！</p></div>`;
        loadMoreBtn.style.display = 'none';
        return;
      }
      snap.forEach(doc => { grid.insertAdjacentHTML('beforeend', renderCard(doc.id, doc.data())); });
      lastDoc = snap.docs[snap.docs.length - 1];
      loadMoreBtn.style.display = snap.docs.length < PAGE_SIZE ? 'none' : 'block';
    } catch (err) {
      console.error(err);
      if (isFirstLoad) {
        grid.innerHTML = `<div class="state-box" style="grid-column:1/-1"><div class="icon">⚠️</div><p>載入失敗，請稍後再試。</p></div>`;
      }
    } finally {
      loading = false;
      loadMoreBtn.disabled = false;
    }
  }

  loadMoreBtn.addEventListener('click', () => loadPosts(false));
  loadPosts(true);
</script>

</body>
</html>
