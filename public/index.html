<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Junlando – 日本旅遊社群</title>
  <meta name="description" content="分享日本旅遊資訊、美食、景點推薦的社群平台" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #2B5CE6;
      --primary-light: #EEF2FF;
      --text-main: #111827;
      --text-sub: #6B7280;
      --star: #F59E0B;
      --border: #E5E7EB;
      --bg: #F3F4F8;
      --card: #fff;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      padding-bottom: 60px;
    }

    /* ── Header ── */
    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .header-inner {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .logo-icon { font-size: 22px; }
    .logo-text {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.5px;
    }
    .header-right { display: flex; gap: 4px; }
    .icon-btn {
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
      color: var(--text-main);
      border: none; background: transparent;
    }
    .icon-btn:hover { background: var(--bg); }

    /* ── Page ── */
    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* ── Section ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      margin-bottom: 12px;
    }
    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-icon { font-size: 20px; line-height: 1; }
    .section-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-main);
    }
    .section-more {
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      text-decoration: none;
      white-space: nowrap;
    }
    .section-more:hover { text-decoration: underline; }

    /* ── Horizontal scroll ── */
    .cards-row {
      display: flex;
      gap: 12px;
      padding: 4px 16px 4px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .cards-row::-webkit-scrollbar { display: none; }

    /* ── Post card (horizontal) ── */
    .post-card-h {
      flex-shrink: 0;
      width: 180px;
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      scroll-snap-align: start;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.18s, transform 0.18s;
    }
    .post-card-h:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); transform: translateY(-2px); }

    .card-h-img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      background: #F0F0F0;
    }
    .card-h-img-placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      background: linear-gradient(135deg, #EEF2FF, #DDE5FF);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }
    .card-h-body {
      padding: 10px 12px 12px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .card-h-title {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.4;
      color: var(--text-main);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-h-stars {
      display: flex;
      gap: 1px;
    }
    .star { font-size: 11px; }
    .star.filled { color: var(--star); }
    .star.empty  { color: #D1D5DB; }

    .card-h-author {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: auto;
    }
    .card-h-avatar {
      width: 20px; height: 20px;
      border-radius: 50%;
      object-fit: cover;
      background: linear-gradient(135deg, var(--primary), #818CF8);
      flex-shrink: 0;
    }
    .card-h-avatar-placeholder {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #818CF8);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 9px; font-weight: 700;
      flex-shrink: 0;
    }
    .card-h-author-name {
      font-size: 11px;
      color: var(--text-sub);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Discussion rows (topic list style) ── */
    .discussion-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0 16px;
    }
    .discussion-row {
      background: var(--card);
      border-radius: 14px;
      padding: 14px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s;
    }
    .discussion-row:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.09); }
    .disc-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: var(--primary-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .disc-body { flex: 1; min-width: 0; }
    .disc-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 3px;
    }
    .disc-topic {
      font-size: 12px;
      color: var(--text-sub);
    }
    .disc-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      flex-shrink: 0;
    }
    .disc-count {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
      line-height: 1;
    }
    .disc-label {
      font-size: 11px;
      color: var(--text-sub);
    }
    .disc-arrow {
      color: var(--text-sub);
      font-size: 14px;
      margin-left: 4px;
    }

    /* ── Skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, #EBEBEB 25%, #E0E0E0 50%, #EBEBEB 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .skeleton-section { padding: 0 16px; }
    .skeleton-cards { display: flex; gap: 12px; padding: 4px 16px; overflow: hidden; }
    .skeleton-card-h {
      flex-shrink: 0;
      width: 180px;
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    /* ── State ── */
    .state-box { text-align: center; padding: 64px 24px; color: var(--text-sub); }
    .state-box .icon { font-size: 48px; margin-bottom: 12px; }
    .state-box p { font-size: 15px; }

    @media (max-width: 480px) {
      .page { padding: 16px 0; gap: 24px; }
      .section-name { font-size: 17px; }
      .post-card-h { width: 160px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="/">
      <span class="logo-icon">✈️</span>
      <span class="logo-text">Junlando</span>
    </a>
    <div class="header-right">
      <button class="icon-btn" title="搜尋">🔍</button>
    </div>
  </div>
</header>

<div class="page" id="page">
  <!-- Skeleton -->
  <div>
    <div class="section-header skeleton-section">
      <div class="skeleton" style="height:20px;width:160px"></div>
    </div>
    <div class="skeleton-cards">
      <div class="skeleton-card-h">
        <div class="skeleton" style="height:135px"></div>
        <div style="padding:10px 12px;display:flex;flex-direction:column;gap:6px">
          <div class="skeleton" style="height:14px"></div>
          <div class="skeleton" style="height:12px;width:60%"></div>
        </div>
      </div>
      <div class="skeleton-card-h">
        <div class="skeleton" style="height:135px"></div>
        <div style="padding:10px 12px;display:flex;flex-direction:column;gap:6px">
          <div class="skeleton" style="height:14px"></div>
          <div class="skeleton" style="height:12px;width:70%"></div>
        </div>
      </div>
      <div class="skeleton-card-h">
        <div class="skeleton" style="height:135px"></div>
        <div style="padding:10px 12px;display:flex;flex-direction:column;gap:6px">
          <div class="skeleton" style="height:14px"></div>
          <div class="skeleton" style="height:12px;width:50%"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCo8XHh_ln2fpGWkcuKtax0nYSKzlgFW-8",
    authDomain: "japan-community-fb528.firebaseapp.com",
    projectId: "japan-community-fb528",
    storageBucket: "japan-community-fb528.firebasestorage.app",
    messagingSenderId: "112553415405",
    appId: "1:112553415405:web:15aa1ec6c90e9841fa32e4"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // Icons for topic categories (fallback emoji by keyword)
  function topicIcon(topicTitle) {
    const t = (topicTitle || '').toLowerCase();
    if (t.includes('美食') || t.includes('餐廳') || t.includes('食')) return '🍜';
    if (t.includes('購物') || t.includes('藥妝') || t.includes('買')) return '🛍️';
    if (t.includes('景點') || t.includes('觀光') || t.includes('寺') || t.includes('神社')) return '⛩️';
    if (t.includes('住宿') || t.includes('飯店') || t.includes('旅館')) return '🏨';
    if (t.includes('交通') || t.includes('新幹線') || t.includes('鐵路')) return '🚄';
    if (t.includes('優惠') || t.includes('折扣') || t.includes('coupon')) return '🎟️';
    if (t.includes('夜生活') || t.includes('酒吧') || t.includes('居酒屋')) return '🍻';
    if (t.includes('自然') || t.includes('溫泉') || t.includes('山')) return '🌸';
    return '✈️';
  }

  function renderStars(rating) {
    const r = Math.round(rating || 0);
    return Array.from({length: 5}, (_, i) =>
      `<span class="star ${i < r ? 'filled' : 'empty'}">★</span>`
    ).join('');
  }

  function renderCardH(id, d) {
    const thumb = (Array.isArray(d.thumbnailURLs) && d.thumbnailURLs[0])
      || (Array.isArray(d.imageURLs) && d.imageURLs[0]);
    const name = d.title || d.restaurantName || '（未命名）';
    const avatarEl = d.authorAvatar
      ? `<img class="card-h-avatar" src="${d.authorAvatar}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    const avatarPlaceholder = `<div class="card-h-avatar-placeholder" style="${d.authorAvatar ? 'display:none' : ''}">${(d.authorName||'？')[0]}</div>`;

    return `
      <a class="post-card-h" href="/post/${id}">
        ${thumb
          ? `<img class="card-h-img" src="${thumb}" alt="${name}" loading="lazy">`
          : `<div class="card-h-img-placeholder">🗾</div>`}
        <div class="card-h-body">
          <div class="card-h-title">${name}</div>
          <div class="card-h-stars">${renderStars(d.rating)}</div>
          <div class="card-h-author">
            ${avatarEl}${avatarPlaceholder}
            <span class="card-h-author-name">${d.authorName || '匿名旅人'}</span>
          </div>
        </div>
      </a>`;
  }

  function renderSection(topicTitle, posts, isFirst) {
    const icon = topicIcon(topicTitle);
    const cardsHtml = posts.map(p => renderCardH(p.id, p.data)).join('');
    return `
      <div>
        <div class="section-header">
          <div class="section-title">
            <span class="section-icon">${icon}</span>
            <span class="section-name">${topicTitle}</span>
          </div>
          <span class="section-more">查看全部 ›</span>
        </div>
        <div class="cards-row">${cardsHtml}</div>
      </div>`;
  }

  async function loadFeed() {
    const page = document.getElementById('page');
    try {
      const snap = await db.collection('posts')
        .orderBy('createdAt', 'desc')
        .limit(80)
        .get();

      if (snap.empty) {
        page.innerHTML = `<div class="state-box"><div class="icon">🗺️</div><p>目前還沒有貼文</p></div>`;
        return;
      }

      // Group posts by topicTitle
      const topicMap = new Map(); // topicTitle -> [{id, data}]
      snap.forEach(doc => {
        const d = doc.data();
        const topic = d.topicTitle || '其他';
        if (!topicMap.has(topic)) topicMap.set(topic, []);
        topicMap.get(topic).push({ id: doc.id, data: d });
      });

      // Sort topics by number of posts (most first)
      const sortedTopics = [...topicMap.entries()]
        .sort((a, b) => b[1].length - a[1].length);

      let html = '';
      sortedTopics.forEach(([topicTitle, posts], i) => {
        html += renderSection(topicTitle, posts, i === 0);
      });

      page.innerHTML = html;
    } catch (e) {
      console.error(e);
      page.innerHTML = `<div class="state-box"><div class="icon">⚠️</div><p>載入失敗，請稍後再試</p></div>`;
    }
  }

  loadFeed();
</script>

</body>
</html>
