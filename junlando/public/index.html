<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Junlando – 日本旅遊社群</title>
  <meta name="description" content="分享日本旅遊資訊、美食、景點推薦的社群平台" />

  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #2B5CE6;
      --primary-light: #EEF2FF;
      --text-main: #111827;
      --text-sub: #6B7280;
      --star: #F59E0B;
      --border: #E5E7EB;
      --bg: #F3F4F8;
      --card: #fff;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      padding-bottom: 60px;
    }

    /* ── Header ── */
    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
    }
    .header-left { width: 56px; flex-shrink: 0; }
    .logo-link { display: flex; align-items: center; text-decoration: none; }
    .logo-link img { width: 32px; height: 32px; border-radius: 6px; }
    .header-right { display: flex; align-items: center; justify-content: flex-end; min-width: 56px; }

    /* ── Page ── */
    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* ── Section ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      margin-bottom: 12px;
    }
    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-icon { width: 36px; height: 36px; object-fit: contain; flex-shrink: 0; }
    .section-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-main);
    }
    .section-more {
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      text-decoration: none;
      white-space: nowrap;
    }
    .section-more:hover { text-decoration: underline; }

    /* ── Horizontal scroll ── */
    .cards-row {
      display: flex;
      gap: 12px;
      padding: 4px 16px 4px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .cards-row::-webkit-scrollbar { display: none; }

    /* ── Post card (horizontal) ── */
    .post-card-h {
      flex-shrink: 0;
      width: 180px;
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      scroll-snap-align: start;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.18s, transform 0.18s;
    }
    .post-card-h:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); transform: translateY(-2px); }

    .img-wrap {
      width: 100%;
      height: 135px;
      position: relative;
      overflow: hidden;
      background: #EBEBEB;
      flex-shrink: 0;
    }
    .img-wrap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .img-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #EEF2FF, #DDE5FF);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
    }
    .card-h-body {
      padding: 10px 12px 12px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .card-h-title {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.4;
      color: var(--text-main);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-h-stars {
      display: flex;
      gap: 1px;
    }
    .star { font-size: 11px; }
    .star.filled { color: var(--star); }
    .star.empty  { color: #D1D5DB; }

    .card-h-author {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: auto;
      cursor: pointer;
    }
    .card-h-author:hover .card-h-author-name { color: var(--primary); }
    .card-h-avatar {
      width: 20px; height: 20px;
      border-radius: 50%;
      object-fit: cover;
      background: linear-gradient(135deg, var(--primary), #818CF8);
      flex-shrink: 0;
    }
    .card-h-avatar-placeholder {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #818CF8);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 9px; font-weight: 700;
      flex-shrink: 0;
    }
    .card-h-author-name {
      font-size: 11px;
      color: var(--text-sub);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Discussion rows (topic list style) ── */
    .discussion-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0 16px;
    }
    .discussion-row {
      background: var(--card);
      border-radius: 14px;
      padding: 14px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s;
    }
    .discussion-row:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.09); }
    .disc-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: var(--primary-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .disc-body { flex: 1; min-width: 0; }
    .disc-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 3px;
    }
    .disc-topic {
      font-size: 12px;
      color: var(--text-sub);
    }
    .disc-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      flex-shrink: 0;
    }
    .disc-count {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
      line-height: 1;
    }
    .disc-label {
      font-size: 11px;
      color: var(--text-sub);
    }
    .disc-arrow {
      color: var(--text-sub);
      font-size: 14px;
      margin-left: 4px;
    }

    /* ── Skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, #EBEBEB 25%, #E0E0E0 50%, #EBEBEB 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .skeleton-section { padding: 0 16px; }
    .skeleton-cards { display: flex; gap: 12px; padding: 4px 16px; overflow: hidden; }
    .skeleton-card-h {
      flex-shrink: 0;
      width: 180px;
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    /* ── State ── */
    .state-box { text-align: center; padding: 64px 24px; color: var(--text-sub); }
    .state-box .icon { font-size: 48px; margin-bottom: 12px; }
    .state-box p { font-size: 15px; }

    @media (max-width: 480px) {
      .page { padding: 16px 0; gap: 24px; }
      .section-name { font-size: 17px; }
      .post-card-h { width: 160px; }
    }

    .header-login-btn {
      padding: 7px 16px;
      border-radius: 8px;
      background: transparent;
      color: var(--text-main);
      font-size: 14px;
      font-weight: 600;
      border: 1.5px solid #D1D5DB;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }
    .header-login-btn:hover { background: var(--bg); }
    .header-create-btn {
      padding: 7px 14px;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
      margin-right: 8px;
    }
    .header-create-btn:hover { opacity: 0.88; }
    @media (max-width: 768px) { .header-create-btn { display: none; } }
    .header-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--primary-light);
      display: block;
    }
    .header-avatar-ph {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #818CF8);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 12px; font-weight: 700;
    }
    .auth-dropdown-wrap { position: relative; display: flex; align-items: center; }
    .auth-avatar-btn { display: flex; align-items: center; cursor: pointer; }
    .auth-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      border: 1px solid var(--border);
      width: 160px;
      z-index: 200;
      overflow: hidden;
    }
    .auth-dropdown.open { display: block; }
    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 14px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-main);
      text-decoration: none;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.12s;
    }
    .dropdown-item:hover:not(:disabled) { background: var(--bg); }
    .dropdown-item:disabled { color: var(--text-sub); cursor: not-allowed; }
    .dropdown-item.danger { color: #DC2626; }
    .dropdown-item.danger:hover { background: #FEF2F2; }
    .dropdown-divider { height: 1px; background: var(--border); margin: 4px 0; }

    /* ── Bottom Tab Bar ── */
    .bottom-tab {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #fff;
      border-top: 1px solid var(--border);
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .bottom-tab-inner {
      display: flex;
      align-items: stretch;
      height: 56px;
    }
    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      text-decoration: none;
      color: #9CA3AF;
      border: none;
      background: none;
      font-family: inherit;
      cursor: pointer;
      transition: color 0.12s;
      padding: 0;
    }
    .tab-item:hover, .tab-item.active { color: var(--primary); }
    .tab-icon  { font-size: 22px; line-height: 1; }
    .tab-label { font-size: 10px; font-weight: 600; letter-spacing: 0.01em; }

    @media (max-width: 768px) {
      .bottom-tab.show { display: block; }
      body.has-tab { padding-bottom: 80px; }
      #auth-btn { display: none !important; }
    }

    /* ── Topic Pills ── */
    .topic-pills-wrap {
      position: sticky;
      top: 52px;
      z-index: 90;
      background: var(--bg);
      padding: 10px 0 8px;
      border-bottom: 1px solid var(--border);
    }
    .topic-pills {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
      padding: 0 16px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .topic-pills::-webkit-scrollbar { display: none; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: #fff;
      color: var(--text-sub);
      transition: all 0.15s;
      flex-shrink: 0;
      font-family: inherit;
    }
    .pill.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .pill:hover:not(.active) { border-color: var(--primary); color: var(--primary); }

    /* ── Card topic chip ── */
    .img-wrap { position: relative; }
    .card-topic-chip {
      position: absolute;
      top: 6px; left: 6px;
      background: rgba(0,0,0,0.52);
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 50px;
      line-height: 1.4;
      max-width: calc(100% - 12px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      pointer-events: none;
    }

    /* ── Hot Topics Section ── */
    .hot-section {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      margin: 0 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .hot-header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    .hot-title { font-size: 16px; font-weight: 700; color: var(--text-main); }
    .hot-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border: none;
      border-bottom: 1px solid var(--border);
      background: none;
      font-family: inherit;
      width: 100%;
      cursor: pointer;
      transition: background 0.12s;
      text-align: left;
    }
    .hot-row:last-child { border-bottom: none; }
    .hot-row:hover { background: var(--bg); }
    .hot-icon { width: 32px; height: 32px; object-fit: contain; flex-shrink: 0; }
    .hot-topic-name {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .hot-count { font-size: 13px; color: var(--text-sub); flex-shrink: 0; white-space: nowrap; }

    /* ── Mixed Feed Grid ── */
    .feed-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 0 16px;
    }
    @media (min-width: 600px) {
      .feed-grid { grid-template-columns: repeat(3, 1fr); }
    }
    .feed-grid .post-card-h { width: 100%; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-left"></div>
    <a class="logo-link" href="/">
      <img src="/favicon.ico" width="32" height="32" alt="Junlando" />
    </a>
    <div class="header-right">
      <div id="auth-btn" style="display:flex;align-items:center"></div>
    </div>
  </div>
</header>

<div id="topic-pills-wrap" class="topic-pills-wrap" style="display:none">
  <div class="topic-pills" id="topic-pills"></div>
</div>

<div class="page" id="page">
  <!-- Skeleton -->
  <div>
    <div class="section-header skeleton-section">
      <div class="skeleton" style="height:20px;width:160px"></div>
    </div>
    <div class="skeleton-cards">
      <div class="skeleton-card-h">
        <div class="skeleton" style="height:135px"></div>
        <div style="padding:10px 12px;display:flex;flex-direction:column;gap:6px">
          <div class="skeleton" style="height:14px"></div>
          <div class="skeleton" style="height:12px;width:60%"></div>
        </div>
      </div>
      <div class="skeleton-card-h">
        <div class="skeleton" style="height:135px"></div>
        <div style="padding:10px 12px;display:flex;flex-direction:column;gap:6px">
          <div class="skeleton" style="height:14px"></div>
          <div class="skeleton" style="height:12px;width:70%"></div>
        </div>
      </div>
      <div class="skeleton-card-h">
        <div class="skeleton" style="height:135px"></div>
        <div style="padding:10px 12px;display:flex;flex-direction:column;gap:6px">
          <div class="skeleton" style="height:14px"></div>
          <div class="skeleton" style="height:12px;width:50%"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCo8XHh_ln2fpGWkcuKtax0nYSKzlgFW-8",
    authDomain: "japan-community-fb528.firebaseapp.com",
    projectId: "japan-community-fb528",
    storageBucket: "japan-community-fb528.firebasestorage.app",
    messagingSenderId: "112553415405",
    appId: "1:112553415405:web:15aa1ec6c90e9841fa32e4"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  function categoryIconSrc(categoryID) {
    const map = { food: '/icons/ic_food.png', hotels: '/icons/ic_hotel.png', shopping: '/icons/ic_shop.png', spot: '/icons/ic_spot.png' };
    return map[(categoryID || '').toLowerCase()] || '/icons/ic_spot.png';
  }
  function categoryIconTag(categoryID) {
    return `<img class="section-icon" src="${categoryIconSrc(categoryID)}" alt="" />`;
  }
  function categoryEmoji(categoryID) {
    const map = { food: '🍜', hotels: '🏨', shopping: '🛍️', spot: '⛩️' };
    return map[(categoryID || '').toLowerCase()] || '✈️';
  }
  function categoryLabel(cat) {
    const map = { food: '🍱 美食', hotels: '🏨 住宿', shopping: '🛍️ 購物', attractions: '⛩️ 景點' };
    return map[(cat || '').toLowerCase()] || cat;
  }

  let activeFilter = null;
  function filterByTopic(cat) {
    activeFilter = cat;
    document.querySelectorAll('.pill').forEach(p => {
      p.classList.toggle('active', cat === null ? p.dataset.cat === '__all__' : p.dataset.cat === cat);
    });
    document.querySelectorAll('.feed-section').forEach(s => {
      s.style.display = (cat === null || s.dataset.category === cat) ? '' : 'none';
    });
  }

  function renderStars(rating) {
    const r = Math.round(rating || 0);
    return Array.from({length: 5}, (_, i) =>
      `<span class="star ${i < r ? 'filled' : 'empty'}">★</span>`
    ).join('');
  }

  function renderCardH(id, d) {
    const thumb = (Array.isArray(d.thumbnailURLs) && d.thumbnailURLs[0])
      || (Array.isArray(d.imageURLs) && d.imageURLs[0]);
    const name = d.title || d.restaurantName || '（未命名）';
    const avatarEl = d.authorAvatar
      ? `<img class="card-h-avatar" src="${d.authorAvatar}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    const avatarPlaceholder = `<div class="card-h-avatar-placeholder" style="${d.authorAvatar ? 'display:none' : ''}">${(d.authorName||'？')[0]}</div>`;

    const topicCat = d.topicCategory || d.topicTitle || '';
    return `
      <a class="post-card-h" href="/post/${id}" data-category="${topicCat.replace(/"/g, '&quot;')}">
        <div class="img-wrap">${thumb
          ? `<img src="${thumb}" alt="${name}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block">`
          : `<div class="img-placeholder">🗾</div>`
        }</div>
        <div class="card-h-body">
          <div class="card-h-title">${name}</div>
          <div class="card-h-stars">${renderStars(d.rating)}</div>
          <div class="card-h-author" onclick="event.stopPropagation();window.location.href='/user/${d.authorUID || ''}'">
            ${avatarEl}${avatarPlaceholder}
            <span class="card-h-author-name">${d.authorName || '匿名旅人'}</span>
          </div>
        </div>
      </a>`;
  }

  function renderSection(topicTitle, categoryID, topicCategory, posts) {
    const iconTag = categoryIconTag(categoryID);
    const safeTitle = topicTitle.replace(/"/g, '&quot;');
    const safeCat = (topicCategory || '').replace(/"/g, '&quot;');
    const cardsHtml = posts.map(p => renderCardH(p.id, p.data)).join('');
    return `
      <div class="feed-section" data-topic="${safeTitle}" data-category="${safeCat}">
        <div class="section-header">
          <div class="section-title">
            ${iconTag}
            <span class="section-name">${topicTitle}</span>
          </div>
          <a class="section-more" href="/topic/?title=${encodeURIComponent(topicTitle)}">查看全部 ›</a>
        </div>
        <div class="cards-row">${cardsHtml}</div>
      </div>`;
  }

  async function loadFeed() {
    const page = document.getElementById('page');
    try {
      const snap = await db.collection('posts')
        .orderBy('createdAt', 'desc')
        .limit(80)
        .get();

      if (snap.empty) {
        page.innerHTML = `<div class="state-box"><div class="icon">🗺️</div><p>目前還沒有貼文</p></div>`;
        return;
      }

      // Group posts by topicTitle, tracking categoryID + topicCategory
      const topicMap = new Map();
      snap.forEach(doc => {
        const d = doc.data();
        const topic = d.topicTitle || '其他';
        const tcat = d.topicCategory || d.categoryID || '';
        if (!topicMap.has(topic)) topicMap.set(topic, { categoryID: d.categoryID || '', topicCategory: tcat, posts: [] });
        topicMap.get(topic).posts.push({ id: doc.id, data: d });
      });

      const sortedTopics = [...topicMap.entries()]
        .sort((a, b) => b[1].posts.length - a[1].posts.length);

      // Build pills from unique topicCategory values
      const pillsWrap = document.getElementById('topic-pills-wrap');
      const pillsEl = document.getElementById('topic-pills');
      if (pillsEl) {
        pillsEl.innerHTML = '';
        const allPill = document.createElement('button');
        allPill.className = 'pill active';
        allPill.dataset.cat = '__all__';
        allPill.textContent = '全部';
        allPill.onclick = () => filterByTopic(null);
        pillsEl.appendChild(allPill);
        const seenCats = new Set();
        sortedTopics.forEach(([, { topicCategory }]) => {
          if (!topicCategory || seenCats.has(topicCategory)) return;
          seenCats.add(topicCategory);
          const pill = document.createElement('button');
          pill.className = 'pill';
          pill.dataset.cat = topicCategory;
          pill.textContent = categoryLabel(topicCategory);
          pill.onclick = () => filterByTopic(topicCategory);
          pillsEl.appendChild(pill);
        });
      }
      if (pillsWrap) pillsWrap.style.display = 'block';

      // Build hot topics (top 5)
      const top5 = sortedTopics.slice(0, 5);
      const hotHtml = `
        <div class="hot-section">
          <div class="hot-header"><span class="hot-title">🔥 熱門討論</span></div>
          <div class="hot-list">
            ${top5.map(([topicTitle, { categoryID, topicCategory, posts }]) => `
              <button class="hot-row" data-title="${topicTitle.replace(/"/g, '&quot;')}">
                <img class="hot-icon" src="${categoryIconSrc(categoryID)}" alt="" />
                <span class="hot-topic-name">${topicTitle}</span>
                <span class="hot-count">${posts.length} 則</span>
              </button>`).join('')}
          </div>
        </div>`;

      // Build feed sections
      let feedHtml = '';
      sortedTopics.forEach(([topicTitle, { categoryID, topicCategory, posts }]) => {
        feedHtml += renderSection(topicTitle, categoryID, topicCategory, posts);
      });

      page.innerHTML = hotHtml + feedHtml;

      // Attach hot row clicks → navigate to topic feed
      page.querySelectorAll('.hot-row').forEach(row => {
        row.addEventListener('click', () => {
          window.location.href = `/topic/?title=${encodeURIComponent(row.dataset.title)}`;
        });
      });
    } catch (e) {
      console.error(e);
      page.innerHTML = `<div class="state-box"><div class="icon">⚠️</div><p>載入失敗，請稍後再試</p></div>`;
    }
  }

  function setupAuthHeader() {
    const auth = firebase.auth();

    document.addEventListener('click', () => {
      const dd = document.getElementById('auth-dropdown');
      if (dd) dd.classList.remove('open');
    });

    auth.onAuthStateChanged(user => {
      // Bottom tab bar
      const tabBar = document.getElementById('bottom-tab');
      if (user) {
        if (tabBar) tabBar.classList.add('show');
        document.body.classList.add('has-tab');
        const profileTab = document.getElementById('tab-profile');
        if (profileTab) profileTab.href = `/user/${user.uid}`;
      } else {
        if (tabBar) tabBar.classList.remove('show');
        document.body.classList.remove('has-tab');
      }

      const el = document.getElementById('auth-btn');
      if (!el) return;
      el.innerHTML = '';

      if (user) {
        const initial = (user.displayName || '？')[0];

        const wrap = document.createElement('div');
        wrap.className = 'auth-dropdown-wrap';

        const avatarBtn = document.createElement('div');
        avatarBtn.className = 'auth-avatar-btn';
        avatarBtn.onclick = e => {
          e.stopPropagation();
          document.getElementById('auth-dropdown').classList.toggle('open');
        };

        if (user.photoURL) {
          const img = document.createElement('img');
          img.className = 'header-avatar';
          img.src = user.photoURL;
          img.alt = '';
          const ph = document.createElement('span');
          ph.className = 'header-avatar-ph';
          ph.textContent = initial;
          ph.style.display = 'none';
          img.onerror = () => { img.style.display = 'none'; ph.style.display = 'flex'; };
          avatarBtn.appendChild(img);
          avatarBtn.appendChild(ph);
        } else {
          const ph = document.createElement('span');
          ph.className = 'header-avatar-ph';
          ph.textContent = initial;
          avatarBtn.appendChild(ph);
        }
        wrap.appendChild(avatarBtn);

        const dd = document.createElement('div');
        dd.id = 'auth-dropdown';
        dd.className = 'auth-dropdown';
        dd.onclick = e => e.stopPropagation();

        const profileLink = document.createElement('a');
        profileLink.className = 'dropdown-item';
        profileLink.href = `/user/${user.uid}`;
        profileLink.textContent = '👤 我的主頁';

        const settingsBtn = document.createElement('button');
        settingsBtn.className = 'dropdown-item';
        settingsBtn.disabled = true;
        settingsBtn.textContent = '⚙️ 帳號設定';

        const divider = document.createElement('div');
        divider.className = 'dropdown-divider';

        const signoutBtn = document.createElement('button');
        signoutBtn.className = 'dropdown-item danger';
        signoutBtn.textContent = '登出';
        signoutBtn.onclick = () => { auth.signOut(); dd.classList.remove('open'); };

        dd.appendChild(profileLink);
        dd.appendChild(settingsBtn);
        dd.appendChild(divider);
        dd.appendChild(signoutBtn);
        wrap.appendChild(dd);

        const createBtn = document.createElement('a');
        createBtn.className = 'header-create-btn';
        createBtn.href = '/create';
        createBtn.textContent = '＋ 發文';
        el.appendChild(createBtn);
        el.appendChild(wrap);

      } else {
        const btn = document.createElement('button');
        btn.className = 'header-login-btn';
        btn.textContent = '登入';
        btn.onclick = () => {
          auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
            .catch(err => {
              if (err.code !== 'auth/popup-closed-by-user' && err.code !== 'auth/cancelled-popup-request') {
                console.error(err);
              }
            });
        };
        el.appendChild(btn);
      }
    });
  }

  loadFeed();
  setupAuthHeader();
</script>

<div class="bottom-tab" id="bottom-tab">
  <div class="bottom-tab-inner">
    <a class="tab-item active" href="/">
      <span class="tab-icon">🏠</span>
      <span class="tab-label">首頁</span>
    </a>
    <button class="tab-item">
      <span class="tab-icon">🔍</span>
      <span class="tab-label">搜尋</span>
    </button>
    <a class="tab-item" href="/create">
      <span class="tab-icon">✏️</span>
      <span class="tab-label">發文</span>
    </a>
    <button class="tab-item">
      <span class="tab-icon">🔔</span>
      <span class="tab-label">通知</span>
    </button>
    <a class="tab-item" id="tab-profile" href="#">
      <span class="tab-icon">👤</span>
      <span class="tab-label">我的</span>
    </a>
  </div>
</div>
