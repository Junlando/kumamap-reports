<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Junlando</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #2B5CE6;
      --primary-light: #EEF2FF;
      --text-main: #111827;
      --text-sub: #6B7280;
      --star: #F59E0B;
      --border: #E5E7EB;
      --bg: #F3F4F8;
      --card: #fff;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-main);
    }

    /* ── Header ── */
    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      height: 52px;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: var(--primary);
      font-size: 14px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 50px;
      background: var(--primary-light);
      flex-shrink: 0;
      white-space: nowrap;
    }
    .back-btn:hover { opacity: 0.85; }
    .header-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-main);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      flex: 1;
    }
    .header-right {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .header-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--primary-light);
      display: block;
    }
    .header-avatar-ph {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #818CF8);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 12px; font-weight: 700;
    }
    .header-login-btn {
      padding: 6px 14px;
      border-radius: 50px;
      background: var(--primary);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    .header-login-btn:hover { opacity: 0.88; }
    .auth-dropdown-wrap { position: relative; display: flex; align-items: center; }
    .auth-avatar-btn { display: flex; align-items: center; cursor: pointer; }
    .auth-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      border: 1px solid var(--border);
      width: 160px;
      z-index: 200;
      overflow: hidden;
    }
    .auth-dropdown.open { display: block; }
    .dropdown-item {
      display: flex; align-items: center; gap: 8px;
      padding: 11px 14px; font-size: 14px; font-weight: 500;
      color: var(--text-main); text-decoration: none;
      border: none; background: none; width: 100%;
      text-align: left; font-family: inherit; cursor: pointer;
      transition: background 0.12s;
    }
    .dropdown-item:hover:not(:disabled) { background: var(--bg); }
    .dropdown-item:disabled { color: var(--text-sub); cursor: not-allowed; }
    .dropdown-item.danger { color: #DC2626; }
    .dropdown-item.danger:hover { background: #FEF2F2; }
    .dropdown-divider { height: 1px; background: var(--border); margin: 4px 0; }

    /* ── Main ── */
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Post card (full-width vertical) ── */
    .post-card-v {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      display: block;
      cursor: pointer;
      transition: box-shadow 0.18s, transform 0.18s;
    }
    .post-card-v:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); transform: translateY(-2px); }

    .card-img-wrap {
      width: 100%;
      padding-top: 52%;
      position: relative;
      overflow: hidden;
      background: #EBEBEB;
    }
    .card-img-wrap img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .card-img-placeholder {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #EEF2FF, #DDE5FF);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
    }

    .card-body {
      padding: 14px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .card-title {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.4;
      color: var(--text-main);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .card-author {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }
    .card-avatar {
      width: 24px; height: 24px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--primary), #818CF8);
    }
    .card-avatar-ph {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #818CF8);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 10px; font-weight: 700;
      flex-shrink: 0;
    }
    .card-author-name {
      font-size: 13px;
      color: var(--text-sub);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card-date {
      font-size: 12px;
      color: var(--text-sub);
      flex-shrink: 0;
    }
    .card-stars { display: flex; gap: 1px; }
    .star { font-size: 13px; }
    .star.filled { color: var(--star); }
    .star.empty  { color: #D1D5DB; }

    /* ── Content preview ── */
    .card-content {
      font-size: 14px;
      line-height: 1.65;
      color: #374151;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }
    .card-content.expanded {
      display: block;
      overflow: visible;
    }
    .card-read-more {
      font-size: 13px;
      color: #9CA3AF;
      font-weight: 500;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      padding: 0;
      text-align: left;
    }
    .card-read-more:hover { color: var(--text-sub); }

    /* ── Action bar ── */
    .card-actions {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 6px 10px 12px;
    }
    .action-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-sub);
      padding: 6px 8px;
      border-radius: 8px;
      transition: background 0.12s;
      text-decoration: none;
      line-height: 1;
    }
    .action-btn:hover { background: var(--bg); color: var(--text-main); }
    .action-btn svg { flex-shrink: 0; }
    .action-spacer { flex: 1; }
    .like-btn.liked { color: #EF4444; }
    .like-btn.liked svg { stroke: #EF4444; }
    .bookmark-btn.bookmarked { color: var(--primary); }
    .bookmark-btn.bookmarked svg { fill: var(--primary); stroke: var(--primary); }

    /* ── Skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .skeleton-card {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    /* ── State ── */
    .state-box { text-align: center; padding: 64px 24px; color: var(--text-sub); }
    .state-box .icon { font-size: 48px; margin-bottom: 12px; }
    .state-box p { font-size: 15px; }

    @media (max-width: 480px) {
      main { padding: 12px; }
      .card-title { font-size: 15px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="back-btn" href="/">← 返回</a>
    <span class="header-title" id="header-title"></span>
    <div class="header-right" id="auth-btn"></div>
  </div>
</header>

<main id="main">
  <!-- Skeleton -->
  <div class="skeleton-card">
    <div style="padding:14px 16px 10px;display:flex;flex-direction:column;gap:10px">
      <div class="skeleton" style="height:18px;width:75%"></div>
      <div class="skeleton" style="height:14px;width:45%"></div>
      <div class="skeleton" style="height:14px;width:90%"></div>
      <div class="skeleton" style="height:14px;width:70%"></div>
    </div>
    <div class="skeleton" style="width:100%;padding-top:52%;"></div>
  </div>
  <div class="skeleton-card">
    <div style="padding:14px 16px 10px;display:flex;flex-direction:column;gap:10px">
      <div class="skeleton" style="height:18px;width:60%"></div>
      <div class="skeleton" style="height:14px;width:40%"></div>
      <div class="skeleton" style="height:14px;width:85%"></div>
    </div>
    <div class="skeleton" style="width:100%;padding-top:52%;"></div>
  </div>
  <div class="skeleton-card">
    <div style="padding:14px 16px 10px;display:flex;flex-direction:column;gap:10px">
      <div class="skeleton" style="height:18px;width:80%"></div>
      <div class="skeleton" style="height:14px;width:50%"></div>
      <div class="skeleton" style="height:14px;width:80%"></div>
      <div class="skeleton" style="height:14px;width:60%"></div>
    </div>
    <div class="skeleton" style="width:100%;padding-top:52%;"></div>
  </div>
</main>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCo8XHh_ln2fpGWkcuKtax0nYSKzlgFW-8",
    authDomain: "japan-community-fb528.firebaseapp.com",
    projectId: "japan-community-fb528",
    storageBucket: "japan-community-fb528.firebasestorage.app",
    messagingSenderId: "112553415405",
    appId: "1:112553415405:web:15aa1ec6c90e9841fa32e4"
  };
  firebase.initializeApp(firebaseConfig);
  const db   = firebase.firestore();
  const auth = firebase.auth();

  const topicTitle = new URLSearchParams(window.location.search).get('title') || '';
  document.getElementById('header-title').textContent = topicTitle;
  document.title = topicTitle ? `${topicTitle} – Junlando` : 'Junlando';

  function relativeTime(ts) {
    if (!ts) return '';
    const diff = Date.now() - (ts.toDate ? ts.toDate() : new Date(ts)).getTime();
    const m = Math.floor(diff / 60000);
    if (m < 1)  return '剛剛';
    if (m < 60) return `${m} 分鐘前`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h} 小時前`;
    const d = Math.floor(h / 24);
    if (d < 30) return `${d} 天前`;
    return (ts.toDate ? ts.toDate() : new Date(ts))
      .toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  function renderStars(rating) {
    const r = Math.round(rating || 0);
    return Array.from({ length: 5 }, (_, i) =>
      `<span class="star ${i < r ? 'filled' : 'empty'}">★</span>`
    ).join('');
  }

  const IC_HEART = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
  const IC_HEART_F = `<svg width="20" height="20" viewBox="0 0 24 24" fill="#EF4444" stroke="#EF4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
  const IC_COMMENT = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;
  const IC_SEND = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`;
  const IC_BM = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`;
  const IC_BM_F = `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`;

  function buildCard(id, d) {
    const thumb = (Array.isArray(d.thumbnailURLs) && d.thumbnailURLs[0])
      || (Array.isArray(d.imageURLs) && d.imageURLs[0]);
    const name    = d.title || d.restaurantName || '（未命名）';
    const content = d.content || '';

    const imgHtml = thumb
      ? `<img src="${thumb}" alt="" loading="lazy" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity 0.2s">`
      : `<div class="card-img-placeholder">🗾</div>`;

    const avatarHtml = d.authorAvatar
      ? `<img class="card-avatar" src="${d.authorAvatar}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
         <div class="card-avatar-ph" style="display:none">${(d.authorName || '？')[0]}</div>`
      : `<div class="card-avatar-ph">${(d.authorName || '？')[0]}</div>`;

    const card = document.createElement('div');
    card.className = 'post-card-v';
    card.onclick = () => window.location.href = `/post/${id}`;

    card.innerHTML = `
      <div class="card-body">
        <div class="card-title"></div>
        <div class="card-meta-row">
          <div class="card-author">
            ${avatarHtml}
            <span class="card-author-name"></span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
            <div class="card-stars">${renderStars(d.rating)}</div>
            <span class="card-date">${relativeTime(d.createdAt)}</span>
          </div>
        </div>
        ${content ? `<div class="card-content"></div>
        <button class="card-read-more" style="display:none">展開</button>` : ''}
      </div>
      ${thumb ? `<div class="card-img-wrap">${imgHtml}</div>` : ''}
      <div class="card-actions">
        <button class="action-btn like-btn">${IC_HEART}<span class="like-count">${d.likeCount || 0}</span></button>
        <a class="action-btn comment-btn" href="/post/${id}">${IC_COMMENT}<span>${d.commentCount || 0}</span></a>
        <button class="action-btn share-btn">${IC_SEND}</button>
        <div class="action-spacer"></div>
        <button class="action-btn bookmark-btn">${IC_BM}</button>
      </div>`;

    // Set text safely
    card.querySelector('.card-title').textContent = name;
    card.querySelector('.card-author-name').textContent = d.authorName || '匿名旅人';
    if (content) card.querySelector('.card-content').textContent = content;

    // Stop propagation on interactive elements
    card.querySelectorAll('.action-btn, .comment-btn').forEach(el => {
      el.addEventListener('click', e => e.stopPropagation());
    });

    // Expand / collapse (set up here; visibility decided after DOM insert)
    if (content) {
      const contentEl  = card.querySelector('.card-content');
      const readMoreBtn = card.querySelector('.card-read-more');
      readMoreBtn.onclick = e => {
        e.stopPropagation();
        const expanded = contentEl.classList.toggle('expanded');
        readMoreBtn.textContent = expanded ? '收起' : '展開';
      };
    }

    // Like toggle (UI only)
    const baseCount = d.likeCount || 0;
    card.querySelector('.like-btn').onclick = e => {
      e.stopPropagation();
      const btn = e.currentTarget;
      const liked = !btn.classList.contains('liked');
      btn.classList.toggle('liked', liked);
      btn.innerHTML = (liked ? IC_HEART_F : IC_HEART) +
        `<span class="like-count">${liked ? baseCount + 1 : baseCount}</span>`;
    };

    // Bookmark toggle (UI only)
    card.querySelector('.bookmark-btn').onclick = e => {
      e.stopPropagation();
      const btn = e.currentTarget;
      const saved = btn.classList.toggle('bookmarked');
      btn.innerHTML = saved ? IC_BM_F : IC_BM;
    };

    // Reveal image only after load so object-fit:cover is never seen mid-decode
    if (thumb) {
      const imgEl = card.querySelector('.card-img-wrap img');
      if (imgEl) {
        const reveal = () => { imgEl.style.opacity = '1'; };
        imgEl.complete && imgEl.naturalWidth > 0 ? reveal() : (imgEl.onload = imgEl.onerror = reveal);
      }
    }

    return card;
  }

  async function loadFeed() {
    const main = document.getElementById('main');
    if (!topicTitle) {
      main.innerHTML = `<div class="state-box"><div class="icon">🗺️</div><p>未指定討論串</p></div>`;
      return;
    }
    try {
      const snap = await db.collection('posts')
        .where('topicTitle', '==', topicTitle)
        .orderBy('createdAt', 'desc')
        .limit(80)
        .get();

      if (snap.empty) {
        main.innerHTML = `<div class="state-box"><div class="icon">📭</div><p>這個討論串還沒有貼文</p></div>`;
        return;
      }

      main.innerHTML = '';
      const cards = [];
      snap.forEach(doc => {
        const card = buildCard(doc.id, doc.data());
        main.appendChild(card);
        cards.push(card);
      });

      // Defer truncation check — wait 150 ms so fonts & layout are fully settled
      setTimeout(() => {
        cards.forEach(card => {
          const contentEl   = card.querySelector('.card-content');
          const readMoreBtn = card.querySelector('.card-read-more');
          if (contentEl && readMoreBtn && contentEl.scrollHeight > contentEl.clientHeight) {
            readMoreBtn.style.display = '';
          }
        });
      }, 150);
    } catch (e) {
      console.error(e);
      main.innerHTML = `<div class="state-box"><div class="icon">⚠️</div><p>載入失敗，請稍後再試</p></div>`;
    }
  }

  function setupAuthHeader() {
    document.addEventListener('click', () => {
      const dd = document.getElementById('auth-dropdown');
      if (dd) dd.classList.remove('open');
    });

    auth.onAuthStateChanged(user => {
      const el = document.getElementById('auth-btn');
      if (!el) return;
      el.innerHTML = '';

      if (user) {
        const initial = (user.displayName || '？')[0];
        const wrap = document.createElement('div');
        wrap.className = 'auth-dropdown-wrap';

        const avatarBtn = document.createElement('div');
        avatarBtn.className = 'auth-avatar-btn';
        avatarBtn.onclick = e => {
          e.stopPropagation();
          document.getElementById('auth-dropdown').classList.toggle('open');
        };

        if (user.photoURL) {
          const img = document.createElement('img');
          img.className = 'header-avatar'; img.src = user.photoURL; img.alt = '';
          const ph = document.createElement('span');
          ph.className = 'header-avatar-ph'; ph.textContent = initial; ph.style.display = 'none';
          img.onerror = () => { img.style.display = 'none'; ph.style.display = 'flex'; };
          avatarBtn.appendChild(img); avatarBtn.appendChild(ph);
        } else {
          const ph = document.createElement('span');
          ph.className = 'header-avatar-ph'; ph.textContent = initial;
          avatarBtn.appendChild(ph);
        }
        wrap.appendChild(avatarBtn);

        const dd = document.createElement('div');
        dd.id = 'auth-dropdown'; dd.className = 'auth-dropdown';
        dd.onclick = e => e.stopPropagation();

        const profileLink = document.createElement('a');
        profileLink.className = 'dropdown-item';
        profileLink.href = `/user/${user.uid}`;
        profileLink.textContent = '👤 我的主頁';

        const settingsBtn = document.createElement('button');
        settingsBtn.className = 'dropdown-item';
        settingsBtn.disabled = true;
        settingsBtn.textContent = '⚙️ 帳號設定';

        const divider = document.createElement('div');
        divider.className = 'dropdown-divider';

        const signoutBtn = document.createElement('button');
        signoutBtn.className = 'dropdown-item danger';
        signoutBtn.textContent = '登出';
        signoutBtn.onclick = () => { auth.signOut(); dd.classList.remove('open'); };

        dd.appendChild(profileLink); dd.appendChild(settingsBtn);
        dd.appendChild(divider); dd.appendChild(signoutBtn);
        wrap.appendChild(dd);
        el.appendChild(wrap);
      } else {
        const btn = document.createElement('button');
        btn.className = 'header-login-btn';
        btn.textContent = '登入';
        btn.onclick = () => {
          auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
            .catch(err => {
              if (err.code !== 'auth/popup-closed-by-user' && err.code !== 'auth/cancelled-popup-request') {
                console.error(err);
              }
            });
        };
        el.appendChild(btn);
      }
    });
  }

  loadFeed();
  setupAuthHeader();
</script>
</body>
</html>
