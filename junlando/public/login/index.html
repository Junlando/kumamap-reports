<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登入 – Junlando</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #2B5CE6;
      --primary-light: #EEF2FF;
      --text-main: #111827;
      --text-sub: #6B7280;
      --border: #E5E7EB;
      --bg: #F3F4F8;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 28px;
      text-decoration: none;
    }
    .logo-icon { font-size: 26px; }
    .logo-text {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.5px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-main);
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-sub);
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .btn {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: opacity 0.15s, transform 0.1s;
      margin-bottom: 12px;
      font-family: inherit;
    }
    .btn:hover:not(:disabled) { opacity: 0.85; }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-google {
      background: #fff;
      color: #374151;
      border: 1.5px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .btn-apple {
      background: #000;
      color: #fff;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 4px 0 16px;
      color: var(--text-sub);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-top: 1px solid var(--border);
    }

    .error-msg {
      font-size: 13px;
      color: #DC2626;
      margin-top: 16px;
      min-height: 20px;
      line-height: 1.5;
    }

    .back-link {
      display: inline-block;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-sub);
      text-decoration: none;
    }
    .back-link:hover { color: var(--primary); }

    @media (max-width: 420px) {
      .card { padding: 32px 20px; border-radius: 20px; }
      h1 { font-size: 20px; }
    }
  </style>
</head>
<body>

<div class="page">
  <div class="card">
    <a class="logo" href="/">
      <span class="logo-icon">✈️</span>
      <span class="logo-text">Junlando</span>
    </a>

    <h1>歡迎加入</h1>
    <p class="subtitle">登入後探索日本旅遊社群，<br>分享你的旅行故事</p>

    <button class="btn btn-google" id="btn-google" onclick="signInGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      使用 Google 登入
    </button>

    <div class="divider">或</div>

    <button class="btn btn-apple" id="btn-apple" onclick="signInApple()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="white">
        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
      </svg>
      使用 Apple 登入
    </button>

    <div class="error-msg" id="error-msg"></div>
    <a class="back-link" href="/">← 返回首頁</a>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCo8XHh_ln2fpGWkcuKtax0nYSKzlgFW-8",
    authDomain: "japan-community-fb528.firebaseapp.com",
    projectId: "japan-community-fb528",
    storageBucket: "japan-community-fb528.firebasestorage.app",
    messagingSenderId: "112553415405",
    appId: "1:112553415405:web:15aa1ec6c90e9841fa32e4"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  auth.onAuthStateChanged(user => {
    if (user) window.location.replace('/');
  });

  function setLoading(loading) {
    document.getElementById('btn-google').disabled = loading;
    document.getElementById('btn-apple').disabled = loading;
  }

  function showError(msg) {
    document.getElementById('error-msg').textContent = msg;
  }

  function handleAuthError(err) {
    setLoading(false);
    if (err.code === 'auth/popup-closed-by-user' || err.code === 'auth/cancelled-popup-request') return;
    if (err.code === 'auth/popup-blocked') {
      showError('彈出視窗被封鎖，請允許此網站開啟彈出視窗後再試');
    } else {
      showError('登入失敗，請稍後再試');
    }
    console.error(err);
  }

  function signInGoogle() {
    showError('');
    setLoading(true);
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider)
      .then(() => window.location.replace('/'))
      .catch(handleAuthError);
  }

  function signInApple() {
    showError('');
    setLoading(true);
    const provider = new firebase.auth.OAuthProvider('apple.com');
    provider.addScope('email');
    provider.addScope('name');
    auth.signInWithPopup(provider)
      .then(() => window.location.replace('/'))
      .catch(handleAuthError);
  }
</script>

</body>
</html>
