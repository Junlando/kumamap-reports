<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Junlando – 貼文詳細</title>

  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js"></script>
  <script src="/js/notif.js"></script>
  <script src="/js/share.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #2B5CE6;
      --primary-light: #EEF2FF;
      --text-main: #111827;
      --text-sub: #6B7280;
      --star: #F59E0B;
      --heart: #EF4444;
      --border: #E5E7EB;
      --bg: #F3F4F8;
      --card: #fff;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-main);
    }

    /* ── Header ── */
    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      height: 52px;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: var(--primary);
      font-size: 14px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 50px;
      background: var(--primary-light);
      flex-shrink: 0;
      white-space: nowrap;
    }
    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-main);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    /* ── Main ── */
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 12px 0 80px;
    }

    .post-card {
      background: var(--card);
      overflow: hidden;
    }

    /* ── Post body ── */
    .post-body {
      padding: 16px 16px 0;
    }

    .title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .post-title {
      font-size: 19px;
      font-weight: 700;
      line-height: 1.3;
      flex: 1;
      color: var(--text-main);
    }
    .title-right {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .stars {
      display: flex;
      gap: 1px;
    }
    .star { font-size: 15px; line-height: 1; }
    .star.filled { color: var(--star); }
    .star.empty  { color: #D1D5DB; }

    .topic-tag {
      display: inline-block;
      background: var(--primary-light);
      color: var(--primary);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 14px;
    }

    /* Author */
    .author-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      text-decoration: none;
      color: inherit;
    }
    .author-row:hover .author-name { color: var(--primary); }
    .author-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }
    .author-avatar-placeholder {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #818CF8);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .author-info { flex: 1; }
    .author-name { font-size: 14px; font-weight: 600; color: var(--text-main); }
    .post-date   { font-size: 12px; color: var(--text-sub); margin-top: 2px; }

    /* Content */
    .post-content {
      font-size: 15px;
      line-height: 1.8;
      color: #374151;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 16px;
    }

    /* ── Images (full-width, no padding) ── */
    .image-section {
      width: 100%;
    }
    .img-wrap {
      width: 100%;
      height: 0;
      padding-top: 75%;
      position: relative;
      overflow: hidden;
      background: #EBEBEB;
      flex-shrink: 0;
    }
    .img-wrap img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .img-wrap.zoomable { cursor: zoom-in; }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 2px;
      background: #E5E7EB;
    }
    .gallery img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      cursor: zoom-in;
    }

    /* ── Action bar ── */
    .action-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 14px;
      color: var(--text-sub);
      font-weight: 500;
    }
    .stat-icon { display: flex; align-items: center; }
    .spacer { flex: 1; }
    .share-btns {
      display: flex;
      gap: 8px;
    }
    .share-btn {
      padding: 7px 14px;
      border: none;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: opacity 0.15s;
      text-decoration: none;
      white-space: nowrap;
    }
    .share-btn:hover { opacity: 0.8; }
    .share-line { background: #00B900; color: #fff; }

    /* ── Comments ── */
    .comments-section {
      margin-top: 8px;
      background: var(--card);
      overflow: hidden;
    }
    .comments-header {
      padding: 16px 16px 12px;
      font-size: 16px;
      font-weight: 700;
      border-bottom: 1px solid var(--border);
      color: var(--text-main);
    }
    .comment-item {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }
    .comment-item:last-child { border-bottom: none; }
    .comment-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }
    .comment-avatar-placeholder {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #818CF8, #C4B5FD);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .comment-body { flex: 1; min-width: 0; }
    .comment-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .comment-author { font-size: 13px; font-weight: 600; color: var(--text-main); }
    .comment-time   { font-size: 11px; color: var(--text-sub); }
    .comment-content { font-size: 14px; color: #374151; line-height: 1.5; }
    .no-comments { padding: 24px 16px; text-align: center; color: var(--text-sub); font-size: 14px; }

    /* ── Comment menu ── */
    .comment-menu-wrap { position: relative; flex-shrink: 0; }
    .comment-menu-btn {
      width: 28px; height: 28px;
      border: none; background: none; border-radius: 50%;
      cursor: pointer; color: var(--text-sub); font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s; letter-spacing: 1px;
    }
    .comment-menu-btn:hover { background: var(--bg); }
    .comment-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      border: 1px solid var(--border);
      width: 120px;
      z-index: 150;
      overflow: hidden;
    }
    .comment-dropdown.open { display: block; }
    .comment-menu-item {
      display: block; width: 100%;
      padding: 10px 14px; font-size: 13px; font-weight: 500;
      text-align: left; border: none; background: none;
      cursor: pointer; font-family: inherit; color: var(--text-main);
      transition: background 0.12s;
    }
    .comment-menu-item:hover { background: var(--bg); }
    .comment-menu-item.danger { color: #DC2626; }
    .comment-menu-item.danger:hover { background: #FEF2F2; }

    /* ── Comment edit mode ── */
    .comment-edit-textarea {
      width: 100%; margin-top: 4px;
      border: 1.5px solid var(--primary); border-radius: 10px;
      padding: 8px 10px; font-size: 14px; font-family: inherit;
      color: var(--text-main); resize: none; outline: none;
      min-height: 60px; max-height: 200px; line-height: 1.5;
    }
    .comment-edit-actions { display: flex; gap: 6px; margin-top: 6px; }
    .comment-edit-save {
      padding: 5px 14px; border-radius: 50px; border: none;
      background: var(--primary); color: #fff;
      font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: opacity 0.15s;
    }
    .comment-edit-save:hover { opacity: 0.88; }
    .comment-edit-cancel {
      padding: 5px 14px; border-radius: 50px;
      border: 1px solid var(--border); background: none;
      color: var(--text-sub); font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    .comment-edit-cancel:hover { background: var(--bg); }
    .comment-edited-tag {
      display: block; font-size: 11px; color: var(--text-sub); margin-top: 3px;
    }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 92vw; max-height: 88vh; object-fit: contain; border-radius: 6px; }
    #lightbox-close { position: absolute; top: 18px; right: 22px; color: #fff; font-size: 30px; cursor: pointer; }

    /* ── Skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .state-box { text-align: center; padding: 64px 24px; color: var(--text-sub); }
    .state-box .icon { font-size: 48px; margin-bottom: 12px; }

    @media (max-width: 480px) {
      .post-title { font-size: 17px; }
    }

    .header-login-btn {
      padding: 6px 14px;
      border-radius: 50px;
      background: var(--primary);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }
    .header-login-btn:hover { opacity: 0.88; }
    .header-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--primary-light);
      display: block;
    }
    .header-avatar-ph {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #818CF8);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 12px; font-weight: 700;
    }
    .auth-dropdown-wrap { position: relative; display: flex; align-items: center; }
    .auth-avatar-btn { display: flex; align-items: center; cursor: pointer; }
    .auth-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      border: 1px solid var(--border);
      width: 160px;
      z-index: 200;
      overflow: hidden;
    }
    .auth-dropdown.open { display: block; }
    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 14px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-main);
      text-decoration: none;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.12s;
    }
    .dropdown-item:hover:not(:disabled) { background: var(--bg); }
    .dropdown-item:disabled { color: var(--text-sub); cursor: not-allowed; }
    .dropdown-item.danger { color: #DC2626; }
    .dropdown-item.danger:hover { background: #FEF2F2; }
    .dropdown-divider { height: 1px; background: var(--border); margin: 4px 0; }

    /* ── Like button ── */
    .like-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-sub);
      padding: 4px 8px 4px 4px;
      border-radius: 50px;
      transition: background 0.12s;
      font-family: inherit;
    }
    .like-btn:hover:not(:disabled) { background: var(--bg); }
    .like-btn.liked { color: var(--heart); }
    .like-btn .like-icon { display: flex; align-items: center; }
    .like-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .action-icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-sub);
      padding: 4px 8px;
      border-radius: 50px;
      transition: background 0.12s;
    }
    .action-icon-btn:hover { background: var(--bg); }

    /* ── Comment input ── */
    .comment-input-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 16px 14px;
      border-top: 1px solid var(--border);
    }
    .comment-input-wrap {
      flex: 1;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .comment-textarea {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 9px 12px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text-main);
      resize: none;
      outline: none;
      min-height: 40px;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    .comment-textarea:focus { border-color: var(--primary); }
    .comment-submit-btn {
      padding: 8px 16px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .comment-submit-btn:hover { opacity: 0.88; }
    .comment-submit-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .commenter-avatar-img {
      width: 36px; height: 36px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      display: block;
    }
    .commenter-avatar-ph {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #818CF8);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 13px; font-weight: 700;
      flex-shrink: 0;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: rgba(17,24,39,0.82);
      color: #fff;
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 500;
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .comment-item.comment-pending { opacity: 0.4; transition: opacity 0.2s; }
    .comment-item.comment-failed  { opacity: 0.6; }
    .comment-retry-btn {
      margin-top: 6px;
      padding: 4px 12px;
      border-radius: 50px;
      border: 1.5px solid #DC2626;
      background: none;
      color: #DC2626;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: inline-block;
      transition: background 0.15s;
    }
    .comment-retry-btn:hover { background: #FEF2F2; }
    .comment-retry-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Comment action row (like + reply) ── */
    .comment-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 6px;
    }
    .comment-action-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-sub);
      padding: 4px 8px;
      border-radius: 6px;
      font-family: inherit;
      transition: background 0.12s;
      line-height: 1;
    }
    .comment-action-btn:hover { background: var(--bg); color: var(--text-main); }
    .comment-action-btn.liked { color: var(--heart); }
    .comment-action-btn.liked svg { fill: var(--heart); stroke: var(--heart); }
    .comment-action-btn svg { display: block; }
    .comment-action-btn.active { color: var(--primary); }

    /* ── Reply thread ── */
    .reply-thread {
      margin-top: 8px;
      margin-left: 46px;
      border-left: 2px solid var(--border);
      padding-left: 12px;
    }
    .reply-item {
      display: flex;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .reply-item:last-of-type { border-bottom: none; }
    .reply-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }
    .reply-avatar-ph {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #818CF8, #C4B5FD);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 11px; font-weight: 700;
      flex-shrink: 0;
    }
    .reply-body { flex: 1; min-width: 0; }
    .reply-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
    .reply-author { font-size: 12px; font-weight: 600; color: var(--text-main); }
    .reply-time   { font-size: 11px; color: var(--text-sub); }
    .reply-content { font-size: 13px; color: #374151; line-height: 1.5; }
    .reply-delete-btn {
      background: none; border: none; cursor: pointer;
      font-size: 11px; color: var(--text-sub);
      padding: 2px 6px; border-radius: 4px;
      font-family: inherit; margin-left: auto; flex-shrink: 0;
      transition: color 0.12s;
    }
    .reply-delete-btn:hover { color: #DC2626; }

    /* reply expand toggle */
    .reply-toggle-btn {
      background: none; border: none; cursor: pointer;
      font-size: 12px; font-weight: 600; color: var(--primary);
      padding: 4px 0; font-family: inherit;
      margin-top: 4px; display: block;
    }
    .reply-toggle-btn:hover { opacity: 0.8; }

    /* inline reply input */
    .reply-input-wrap {
      display: none;
      margin-top: 8px;
      margin-left: 46px;
      gap: 8px;
      align-items: flex-end;
    }
    .reply-input-wrap.open { display: flex; }
    .reply-textarea {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 7px 10px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text-main);
      resize: none;
      outline: none;
      min-height: 36px;
      max-height: 100px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    .reply-textarea:focus { border-color: var(--primary); }
    .reply-submit-btn {
      padding: 7px 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .reply-submit-btn:hover { opacity: 0.88; }
    .reply-submit-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Bookmark Modal ── */
    .bm-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 600;
      align-items: flex-end;
      justify-content: center;
    }
    .bm-backdrop.show { display: flex; }
    .bm-sheet {
      width: 100%;
      max-width: 680px;
      background: #fff;
      border-radius: 20px 20px 0 0;
      padding-bottom: env(safe-area-inset-bottom, 16px);
      overflow: hidden;
    }
    .bm-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    .bm-title { font-size: 16px; font-weight: 700; }
    .bm-close { background: none; border: none; font-size: 16px; cursor: pointer; color: var(--text-sub); }

    .bm-col-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 13px 16px;
      background: none;
      border: none;
      border-bottom: 1px solid var(--border);
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      transition: background 0.1s;
    }
    .bm-col-item:hover { background: var(--bg); }
    .bm-col-item:last-child { border-bottom: none; }
    .bm-col-name { font-size: 15px; font-weight: 600; color: var(--text-main); }
    .bm-col-count { font-size: 13px; color: var(--text-sub); }
    .bm-empty { padding: 16px; font-size: 14px; color: var(--text-sub); text-align: center; }
    .bm-new-row {
      display: flex;
      gap: 8px;
      padding: 10px 16px;

    .bm-new-input {

      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px;
      font-family: inherit;
      font-size: 15px;
      outline: none;
    }
    .bm-new-input:focus { border-color: var(--primary); }
    .bm-new-confirm {
      padding: 8px 16px;
      border-radius: 10px;
      background: var(--primary);
      color: #fff;
      border: none;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    .bm-actions {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 10px 16px 16px;
    }
    .bm-add-col-btn, .bm-skip-btn {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .bm-add-col-btn { background: var(--primary-light); color: var(--primary); }
    .bm-skip-btn { background: var(--bg); color: var(--text-sub); }
    .bm-add-col-btn:hover, .bm-skip-btn:hover { opacity: 0.8; }
  </style>

<script>
  const firebaseConfig = {

  // ── SVG Icons ──
  const SVG_HEART         = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>`;
  const SVG_HEART_FILLED  = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>`;

  const SVG_SEND          = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>`;
  const SVG_BOOKMARK        = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>`;
  const SVG_BOOKMARK_FILLED = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>`;

  const pathParts = window.location.pathname.split('/').filter(Boolean);
  const postId = pathParts[pathParts.length - 1];

  function relativeTime(ts) {
    if (!ts) return '';
    const diff = Date.now() - (ts.toDate ? ts.toDate() : new Date(ts)).getTime();
    const m = Math.floor(diff / 60000);
    if (m < 1)  return '剛剛';
    if (m < 60) return `${m} 分鐘前`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h} 小時前`;
    const d = Math.floor(h / 24);
    if (d < 30) return `${d} 天前`;
    return (ts.toDate ? ts.toDate() : new Date(ts))
      .toLocaleDateString('zh-TW', { year:'numeric', month:'long', day:'numeric' });
  }

  function renderStars(rating) {
    const r = Math.round(rating || 0);
    return Array.from({length: 5}, (_, i) =>
      `<span class="star ${i < r ? 'filled' : 'empty'}">★</span>`
    ).join('');
  }

  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }
  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeLightbox();
  });
  document.addEventListener('click', () => {
    document.querySelectorAll('.comment-dropdown.open').forEach(d => d.classList.remove('open'));
  });

  function copyLink() {
    const url = `https://community.junlando.com/p/${postId}`;
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.getElementById('copy-btn');
      const original = btn.textContent;
      btn.textContent = '✅ 已複製';
      setTimeout(() => { btn.textContent = original; }, 2000);
    });
  }

  async function loadPost() {
    const card = document.getElementById('post-card');
    if (!postId || postId === 'post') {
      card.innerHTML = `<div class="state-box"><div class="icon">🗺️</div><p>找不到這篇貼文</p></div>`;
      return;
    }
    try {
      const doc = await db.collection('posts').doc(postId).get();
      if (!doc.exists) {
        card.innerHTML = `<div class="state-box"><div class="icon">😕</div><p>貼文不存在或已被刪除</p></div>`;
        return;
      }
      const d = doc.data();
      const name = d.title || d.restaurantName || '（未命名）';
      const imgs = Array.isArray(d.imageURLs) ? d.imageURLs : [];
      const shareUrl = `https://community.junlando.com/p/${postId}`;

      document.title = `${name} – Junlando`;
      document.getElementById('header-title').textContent = d.topicTitle || name;

      const imageEl = imgs[0]
        ? `<div class="image-section">
            <div class="img-wrap zoomable" onclick="openLightbox('${imgs[0]}')"><img src="${imgs[0]}" alt="${name}" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity 0.2s" /></div>
            ${imgs.length > 1
              ? `<div class="gallery">${imgs.slice(1).map(src =>
                  `<img src="${src}" alt="圖片" loading="lazy" style="width:100%;aspect-ratio:1;object-fit:cover;display:block;opacity:0;transition:opacity 0.2s" onclick="openLightbox('${src}')">`
                ).join('')}</div>`
              : ''}
           </div>`
        : '';

      const avatarEl = d.authorAvatar
        ? `<img class="author-avatar" src="${d.authorAvatar}" alt="${d.authorName||''}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : '';
      const avatarPlaceholder = `<div class="author-avatar-placeholder" style="${d.authorAvatar ? 'display:none' : ''}">${(d.authorName||'？')[0]}</div>`;

      card.innerHTML = `
        <div class="post-body">
          <div class="title-row">
            <h1 class="post-title">${name}</h1>
            <div class="title-right">
              <div class="stars">${renderStars(d.rating)}</div>
            </div>
          </div>
          ${d.topicTitle ? `<div class="topic-tag">${d.topicTitle}</div>` : ''}
          <a class="author-row" href="/user/${d.authorUID || ''}">
            ${avatarEl}${avatarPlaceholder}
            <div class="author-info">
              <div class="author-name">${d.authorName || '匿名旅人'}</div>
              <div class="post-date">${relativeTime(d.createdAt)}</div>
            </div>
          </a>
          <div class="post-content">${d.content || ''}</div>
        </div>
        ${imageEl}
        <div class="action-bar">
          <button class="like-btn" id="like-btn">
            <span class="like-icon">${SVG_HEART}</span>
            <span class="like-num">${d.likeCount || 0}</span>
          </button>
          <div class="stat-item"><span class="stat-icon">${SVG_COMMENT}</span> <span id="comment-count">${d.commentCount || 0}</span></div>
          <button class="action-icon-btn share-copy" onclick="openShareSheet('${shareUrl}', '${name.replace(/'/g, "\\'")}')">${SVG_SEND}</button>
          <div class="spacer"></div>
          <button class="action-icon-btn" id="save-btn">${SVG_BOOKMARK}</button>
        </div>`;

      // Reveal images only after load — prevents mid-decode stretch
      card.querySelectorAll('.img-wrap img, .gallery img').forEach(img => {
        const reveal = () => { img.style.opacity = '1'; };
        img.complete && img.naturalWidth > 0 ? reveal() : (img.onload = img.onerror = reveal);
      });

      setupLikeBtn();
      setupBookmarkBtn();
      loadComments(d.commentCount || 0);
    } catch (e) {
      console.error(e);
      card.innerHTML = `<div class="state-box"><div class="icon">⚠️</div><p>載入失敗，請稍後再試</p></div>`;
    }
  }

  async function loadComments(count) {
    if (count === 0) return;
    const section = document.getElementById('comments-section');
    const list = document.getElementById('comments-list');
    const header = document.getElementById('comments-header');
    section.style.display = 'block';
    header.textContent = `留言 ${count}`;
    try {
      const snap = await db.collection('posts').doc(postId)
        .collection('comments')
        .orderBy('createdAt', 'asc')
        .limit(50)
        .get();
      if (snap.empty) {
        list.innerHTML = `<div class="no-comments">還沒有留言</div>`;
        return;
      }
      list.innerHTML = '';
      snap.docs.forEach(doc => list.appendChild(buildLoadedCommentItem(doc.id, doc.data())));
    } catch (e) {
      console.error(e);
    }
  }

  function buildLoadedCommentItem(commentId, c) {
    const item = document.createElement('div');
    item.className = 'comment-item';
    item.style.flexDirection = 'column';

    // ── top row: avatar + body ──
    const topRow = document.createElement('div');
    topRow.style.cssText = 'display:flex;gap:10px;width:100%';

    // Avatar
    if (c.authorAvatar) {
      const img = document.createElement('img');
      img.className = 'comment-avatar'; img.src = c.authorAvatar; img.alt = '';
      const ph = document.createElement('div');
      ph.className = 'comment-avatar-placeholder';
      ph.textContent = (c.authorName || '？')[0]; ph.style.display = 'none';
      img.onerror = () => { img.style.display = 'none'; ph.style.display = 'flex'; };
      topRow.appendChild(img); topRow.appendChild(ph);
    } else {
      const ph = document.createElement('div');
      ph.className = 'comment-avatar-placeholder';
      ph.textContent = (c.authorName || '？')[0];
      topRow.appendChild(ph);
    }

    const body = document.createElement('div');
    body.className = 'comment-body';
    const meta = document.createElement('div');
    meta.className = 'comment-meta';
    const isOwn = currentUser && c.authorUID === currentUser.uid;

    if (isOwn) {
      const left = document.createElement('div');
      left.style.cssText = 'display:flex;align-items:center;gap:6px;flex:1;min-width:0';
      const a = document.createElement('span'); a.className = 'comment-author'; a.textContent = c.authorName || '匿名';
      const t = document.createElement('span'); t.className = 'comment-time'; t.textContent = relativeTime(c.createdAt);
      left.appendChild(a); left.appendChild(t);
      meta.appendChild(left);
      meta.appendChild(buildCommentMenu(item, commentId));
    } else {
      const a = document.createElement('span'); a.className = 'comment-author'; a.textContent = c.authorName || '匿名';
      const t = document.createElement('span'); t.className = 'comment-time'; t.textContent = relativeTime(c.createdAt);
      meta.appendChild(a); meta.appendChild(t);
    }

    body.appendChild(meta);
    const contentDiv = document.createElement('div');
    contentDiv.className = 'comment-content'; contentDiv.textContent = c.content || '';
    body.appendChild(contentDiv);

    if (c.edited) {
      const tag = document.createElement('span');
      tag.className = 'comment-edited-tag'; tag.textContent = '已編輯';
      body.appendChild(tag);
    }

    // ── action row: like + reply ──
    const actions = document.createElement('div');
    actions.className = 'comment-actions';

    // Like button
    const likeBtn = document.createElement('button');
    likeBtn.className = 'comment-action-btn';
    const likeCount = c.likeCount || 0;
    likeBtn.innerHTML = `${SVG_HEART} <span class="c-like-num">${likeCount || ''}</span>`;
    likeBtn.dataset.liked = 'false';

    if (currentUser) {
      // Check if already liked
      db.collection('posts').doc(postId).collection('comments').doc(commentId)
        .collection('likes').doc(currentUser.uid).get()
        .then(snap => {
          likeBtn.dataset.liked = snap.exists ? 'true' : 'false';
          if (snap.exists) likeBtn.classList.add('liked');
        }).catch(() => {});

      likeBtn.onclick = () => {
        const wasLiked = likeBtn.dataset.liked === 'true';
        const numEl = likeBtn.querySelector('.c-like-num');
        const prev = parseInt(numEl.textContent || '0') || 0;
        likeBtn.dataset.liked = wasLiked ? 'false' : 'true';
        likeBtn.classList.toggle('liked', !wasLiked);
        numEl.textContent = (!wasLiked ? prev + 1 : Math.max(0, prev - 1)) || '';
        likeComment({ postId, commentId }).catch(() => {
          likeBtn.dataset.liked = wasLiked ? 'true' : 'false';
          likeBtn.classList.toggle('liked', wasLiked);
          numEl.textContent = prev || '';
        });
      };
    } else {
      likeBtn.onclick = () => showToast('請先登入');
    }
    actions.appendChild(likeBtn);

    // Reply button
    const replyBtn = document.createElement('button');
    replyBtn.className = 'comment-action-btn';
    replyBtn.textContent = '回覆';
    actions.appendChild(replyBtn);

    body.appendChild(actions);
    topRow.appendChild(body);
    item.appendChild(topRow);

    // ── reply input (hidden by default) ──
    const replyInputWrap = document.createElement('div');
    replyInputWrap.className = 'reply-input-wrap';
    const replyTextarea = document.createElement('textarea');
    replyTextarea.className = 'reply-textarea';
    replyTextarea.placeholder = '回覆留言...';
    replyTextarea.rows = 1;
    replyTextarea.addEventListener('input', () => {
      replyTextarea.style.height = 'auto';
      replyTextarea.style.height = Math.min(replyTextarea.scrollHeight, 100) + 'px';
    });
    const replySubmit = document.createElement('button');
    replySubmit.className = 'reply-submit-btn';
    replySubmit.textContent = '送出';
    replyInputWrap.appendChild(replyTextarea);
    replyInputWrap.appendChild(replySubmit);
    item.appendChild(replyInputWrap);

    replyBtn.onclick = () => {
      if (!currentUser) { showToast('請先登入'); return; }
      replyInputWrap.classList.toggle('open');
      if (replyInputWrap.classList.contains('open')) replyTextarea.focus();
    };

    // ── reply thread ──
    const replyThread = document.createElement('div');
    replyThread.className = 'reply-thread';
    replyThread.style.display = 'none';
    item.appendChild(replyThread);

    // reply toggle button
    const replyCount = c.replyCount || 0;
    if (replyCount > 0) {
      const toggleBtn = document.createElement('button');
      toggleBtn.className = 'reply-toggle-btn';
      toggleBtn.textContent = `查看 ${replyCount} 則回覆`;
      let loaded = false;
      toggleBtn.onclick = async () => {
        if (replyThread.style.display === 'none') {
          replyThread.style.display = 'block';
          toggleBtn.textContent = '收起回覆';
          if (!loaded) {
            loaded = true;
            await loadReplies(commentId, replyThread);
          }
        } else {
          replyThread.style.display = 'none';
          toggleBtn.textContent = `查看 ${replyCount} 則回覆`;
        }
      };
      item.insertBefore(toggleBtn, replyThread);
    }

    // submit reply
    replySubmit.onclick = async () => {
      const content = replyTextarea.value.trim();
      if (!content) return;
      replySubmit.disabled = true;

      // Optimistic UI
      const replyEl = buildReplyItem(null, {
        authorName: currentUser.displayName || '匿名',
        authorAvatar: currentUser.photoURL || '',
        authorUID: currentUser.uid,
        content,
        createdAt: null,
      }, commentId);
      replyThread.style.display = 'block';
      replyThread.appendChild(replyEl);

      // update toggle button count
      const existingToggle = item.querySelector('.reply-toggle-btn');
      const newCount = (c.replyCount || 0) + replyThread.querySelectorAll('.reply-item').length;
      if (existingToggle) existingToggle.textContent = '收起回覆';
      else {
        const tb = document.createElement('button');
        tb.className = 'reply-toggle-btn';
        tb.textContent = '收起回覆';
        item.insertBefore(tb, replyThread);
        tb.onclick = () => {
          const open = replyThread.style.display !== 'none';
          replyThread.style.display = open ? 'none' : 'block';
          tb.textContent = open ? `查看回覆` : '收起回覆';
        };
      }

      replyTextarea.value = '';
      replyTextarea.style.height = 'auto';
      replyInputWrap.classList.remove('open');

      try {
        await addReply({ postId, commentId, content });
      } catch (e) {
        console.error(e);
        replyEl.remove();
        showToast('回覆失敗，請稍後再試');
      } finally {
        replySubmit.disabled = false;
      }
    };

    return item;
  }

  async function loadReplies(commentId, container) {
    container.innerHTML = '<div style="font-size:12px;color:var(--text-sub);padding:8px 0">載入中...</div>';
    try {
      const snap = await db.collection('posts').doc(postId)
        .collection('comments').doc(commentId)
        .collection('replies')
        .orderBy('createdAt', 'asc')
        .limit(50)
        .get();
      container.innerHTML = '';
      if (snap.empty) { container.innerHTML = '<div style="font-size:12px;color:var(--text-sub);padding:8px 0">還沒有回覆</div>'; return; }
      snap.docs.forEach(doc => container.appendChild(buildReplyItem(doc.id, doc.data(), commentId)));
    } catch (e) {
      console.error(e);
      container.innerHTML = '<div style="font-size:12px;color:#DC2626;padding:8px 0">載入失敗</div>';
    }
  }

  function buildReplyItem(replyId, r, commentId) {
    const item = document.createElement('div');
    item.className = 'reply-item';

    // Avatar
    if (r.authorAvatar) {
      const img = document.createElement('img');
      img.className = 'reply-avatar'; img.src = r.authorAvatar; img.alt = '';
      const ph = document.createElement('div'); ph.className = 'reply-avatar-ph';
      ph.textContent = (r.authorName || '？')[0]; ph.style.display = 'none';
      img.onerror = () => { img.style.display = 'none'; ph.style.display = 'flex'; };
      item.appendChild(img); item.appendChild(ph);
    } else {
      const ph = document.createElement('div'); ph.className = 'reply-avatar-ph';
      ph.textContent = (r.authorName || '？')[0];
      item.appendChild(ph);
    }

    const body = document.createElement('div'); body.className = 'reply-body';
    const meta = document.createElement('div'); meta.className = 'reply-meta';
    const nameEl = document.createElement('span'); nameEl.className = 'reply-author'; nameEl.textContent = r.authorName || '匿名';
    const timeEl = document.createElement('span'); timeEl.className = 'reply-time'; timeEl.textContent = relativeTime(r.createdAt);
    meta.appendChild(nameEl); meta.appendChild(timeEl);

    // Delete button (own replies only)
    if (replyId && currentUser && r.authorUID === currentUser.uid) {
      const delBtn = document.createElement('button');
      delBtn.className = 'reply-delete-btn'; delBtn.textContent = '刪除';
      delBtn.onclick = () => {
        item.style.opacity = '0.4';
        deleteReply({ postId, commentId, replyId }).then(() => item.remove())
          .catch(() => { item.style.opacity = '1'; showToast('刪除失敗'); });
      };
      meta.appendChild(delBtn);
    }

    const contentEl = document.createElement('div'); contentEl.className = 'reply-content';
    contentEl.textContent = r.content || '';
    body.appendChild(meta); body.appendChild(contentEl);
    item.appendChild(body);
    return item;
  }

  function buildCommentMenu(item, commentId) {
    const wrap = document.createElement('div');
    wrap.className = 'comment-menu-wrap';
    const btn = document.createElement('button');
    btn.className = 'comment-menu-btn'; btn.textContent = '•••';
    const dd = document.createElement('div');
    dd.className = 'comment-dropdown';

    const editBtn = document.createElement('button');
    editBtn.className = 'comment-menu-item'; editBtn.textContent = '✏️ 編輯';
    editBtn.onclick = e => {
      e.stopPropagation(); dd.classList.remove('open');
      openCommentEdit(item, commentId, item.querySelector('.comment-content').textContent);
    };

    const delBtn = document.createElement('button');
    delBtn.className = 'comment-menu-item danger'; delBtn.textContent = '🗑 刪除';
    delBtn.onclick = e => {
      e.stopPropagation(); dd.classList.remove('open');
      handleDeleteComment(item, commentId);
    };

    dd.appendChild(editBtn); dd.appendChild(delBtn);
    btn.onclick = e => {
      e.stopPropagation();
      document.querySelectorAll('.comment-dropdown.open').forEach(d => d.classList.remove('open'));
      dd.classList.toggle('open');
    };
    wrap.appendChild(btn); wrap.appendChild(dd);
    return wrap;
  }

  function openCommentEdit(item, commentId, originalContent) {
    const body = item.querySelector('.comment-body');
    const contentDiv = body.querySelector('.comment-content');
    const editedTag = body.querySelector('.comment-edited-tag');
    contentDiv.style.display = 'none';
    if (editedTag) editedTag.style.display = 'none';

    const textarea = document.createElement('textarea');
    textarea.className = 'comment-edit-textarea'; textarea.value = originalContent;
    const actions = document.createElement('div');
    actions.className = 'comment-edit-actions';
    const saveBtn = document.createElement('button');
    saveBtn.className = 'comment-edit-save'; saveBtn.textContent = '儲存';
    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'comment-edit-cancel'; cancelBtn.textContent = '取消';

    cancelBtn.onclick = () => {
      textarea.remove(); actions.remove();
      contentDiv.style.display = '';
      if (editedTag) editedTag.style.display = '';
    };
    saveBtn.onclick = () => handleEditComment(item, commentId, textarea, actions, originalContent);

    actions.appendChild(saveBtn); actions.appendChild(cancelBtn);
    body.appendChild(textarea); body.appendChild(actions);
    textarea.focus(); textarea.select();
  }

  function handleEditComment(item, commentId, textarea, actions, originalContent) {
    const newContent = textarea.value.trim();
    const body = item.querySelector('.comment-body');
    const contentDiv = body.querySelector('.comment-content');
    const editedTag = body.querySelector('.comment-edited-tag');

    if (!newContent || newContent === originalContent) {
      textarea.remove(); actions.remove();
      contentDiv.style.display = '';
      if (editedTag) editedTag.style.display = '';
      return;
    }

    // Optimistic update
    textarea.remove(); actions.remove();
    contentDiv.textContent = newContent; contentDiv.style.display = '';
    if (editedTag) { editedTag.style.display = ''; }
    else {
      const tag = document.createElement('span');
      tag.className = 'comment-edited-tag'; tag.textContent = '已編輯';
      body.appendChild(tag);
    }

    editComment({ postId, commentId, content: newContent }).catch(e => {
      console.error(e);
      contentDiv.textContent = originalContent;
      showToast('編輯失敗，請稍後再試');
    });
  }

  function handleDeleteComment(item, commentId) {
    const list = document.getElementById('comments-list');
    const next = item.nextSibling;
    list.removeChild(item);
    adjustCommentCount(-1);

    deleteComment({ postId, commentId }).catch(e => {
      console.error(e);
      list.insertBefore(item, next);
      adjustCommentCount(+1);
      showToast('刪除失敗，請稍後再試');
    });
  }

  function showToast(msg) {
    const existing = document.getElementById('toast');
    if (existing) existing.remove();
    const t = document.createElement('div');
    t.id = 'toast';
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    requestAnimationFrame(() => t.classList.add('show'));
    setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 2500);
  }

  function setupLikeBtn() {
    if (!authReady) return;
    const btn = document.getElementById('like-btn');
    if (!btn) return;
    if (!currentUser) {
      btn.onclick = () => showToast('請先登入');
      return;
    }
    db.collection('posts').doc(postId).collection('likes').doc(currentUser.uid).get()
      .then(doc => updateLikeBtn(doc.exists))
      .catch(() => {});
  }

  function updateLikeBtn(isLiked) {
    const btn = document.getElementById('like-btn');
    if (!btn) return;
    btn.className = `like-btn${isLiked ? ' liked' : ''}`;
    btn.querySelector('.like-icon').innerHTML = isLiked ? SVG_HEART_FILLED : SVG_HEART;
    btn.onclick = () => handleLike();
  }

  function handleLike() {
    if (!currentUser) { showToast('請先登入'); return; }
    const btn = document.getElementById('like-btn');
    if (!btn) return;
    const wasLiked = btn.classList.contains('liked');
    const nowLiked = !wasLiked;
    const countEl = btn.querySelector('.like-num');
    const prevCount = parseInt(countEl?.textContent || '0');
    updateLikeBtn(nowLiked);
    if (countEl) countEl.textContent = nowLiked ? prevCount + 1 : Math.max(0, prevCount - 1);
    likePost({ postId }).catch(e => {
      console.error(e);
      updateLikeBtn(wasLiked);
      if (countEl) countEl.textContent = prevCount;
    });
  }

  function renderCommentInput() {
    if (!authReady) return;
    const inputSection = document.getElementById('comment-input-section');
    if (!inputSection) return;
    if (!currentUser) { inputSection.style.display = 'none'; return; }

    document.getElementById('comments-section').style.display = 'block';
    inputSection.style.display = 'block';

    const avatarWrap = document.getElementById('commenter-avatar');
    avatarWrap.innerHTML = '';
    const initial = (currentUser.displayName || '？')[0];
    if (currentUser.photoURL) {
      const img = document.createElement('img');
      img.className = 'commenter-avatar-img';
      img.src = currentUser.photoURL;
      img.alt = '';
      const ph = document.createElement('div');
      ph.className = 'commenter-avatar-ph';
      ph.textContent = initial;
      ph.style.display = 'none';
      img.onerror = () => { img.style.display = 'none'; ph.style.display = 'flex'; };
      avatarWrap.appendChild(img);
      avatarWrap.appendChild(ph);
    } else {
      const ph = document.createElement('div');
      ph.className = 'commenter-avatar-ph';
      ph.textContent = initial;
      avatarWrap.appendChild(ph);
    }

    const textarea = document.getElementById('comment-textarea');
    textarea.addEventListener('input', () => {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
    });
    document.getElementById('comment-submit-btn').onclick = handleAddComment;
  }

  function buildCommentItem(content) {
    const item = document.createElement('div');
    item.className = 'comment-item';
    const initial = (currentUser.displayName || '？')[0];
    if (currentUser.photoURL) {
      const img = document.createElement('img');
      img.className = 'comment-avatar';
      img.src = currentUser.photoURL;
      img.alt = '';
      const ph = document.createElement('div');
      ph.className = 'comment-avatar-placeholder';
      ph.textContent = initial;
      ph.style.display = 'none';
      img.onerror = () => { img.style.display = 'none'; ph.style.display = 'flex'; };
      item.appendChild(img);
      item.appendChild(ph);
    } else {
      const ph = document.createElement('div');
      ph.className = 'comment-avatar-placeholder';
      ph.textContent = initial;
      item.appendChild(ph);
    }
    const body = document.createElement('div');
    body.className = 'comment-body';
    body.innerHTML = `<div class="comment-meta"><span class="comment-author"></span><span class="comment-time">剛剛</span></div><div class="comment-content"></div>`;
    body.querySelector('.comment-author').textContent = currentUser.displayName || '匿名';
    body.querySelector('.comment-content').textContent = content;
    item.appendChild(body);
    return item;
  }

  function adjustCommentCount(delta) {
    const countEl = document.getElementById('comment-count');
    if (countEl) countEl.textContent = Math.max(0, parseInt(countEl.textContent || '0') + delta);
    const header = document.getElementById('comments-header');
    if (header) {
      const match = header.textContent.match(/\d+/);
      header.textContent = `留言 ${Math.max(0, (match ? parseInt(match[0]) : 0) + delta)}`;
    }
  }

  function handleAddComment() {
    const textarea = document.getElementById('comment-textarea');
    const content = textarea.value.trim();
    if (!content) return;

    // Optimistic: insert immediately
    document.getElementById('comments-section').style.display = 'block';
    const list = document.getElementById('comments-list');
    const noComments = list.querySelector('.no-comments');
    if (noComments) noComments.remove();

    const item = buildCommentItem(content);
    list.insertBefore(item, list.firstChild);
    adjustCommentCount(+1);

    textarea.value = '';
    textarea.style.height = 'auto';

    // Background submit
    addComment({ postId, content })
      .catch(e => {
        console.error(e);
        item.classList.remove('comment-pending');
        item.classList.add('comment-failed');
        adjustCommentCount(-1);
        const retryBtn = document.createElement('button');
        retryBtn.className = 'comment-retry-btn';
        retryBtn.textContent = '重新送出';
        retryBtn.onclick = () => retryComment(item, content, retryBtn);
        item.querySelector('.comment-body').appendChild(retryBtn);
      });
  }

  async function retryComment(item, content, retryBtn) {
    retryBtn.disabled = true;
    item.classList.remove('comment-failed');
    item.classList.add('comment-pending');
    try {
      await addComment({ postId, content });
      item.classList.remove('comment-pending');
      retryBtn.remove();
      adjustCommentCount(+1);
    } catch (e) {
      console.error(e);
      item.classList.remove('comment-pending');
      item.classList.add('comment-failed');
      retryBtn.disabled = false;
    }
  }

  function setupAuthHeader() {
    const auth = firebase.auth();

    document.addEventListener('click', () => {
      const dd = document.getElementById('auth-dropdown');
      if (dd) dd.classList.remove('open');
    });

    auth.onAuthStateChanged(user => {
      currentUser = user;
      authReady = true;
      initNotifBell(db, user);
      setupLikeBtn();
      setupBookmarkBtn();
      renderCommentInput();
      const el = document.getElementById('auth-btn');
      if (!el) return;
      el.innerHTML = '';

      if (user) {
        const initial = (user.displayName || '？')[0];

        const wrap = document.createElement('div');
        wrap.className = 'auth-dropdown-wrap';

        const avatarBtn = document.createElement('div');
        avatarBtn.className = 'auth-avatar-btn';
        avatarBtn.onclick = e => {
          e.stopPropagation();
          document.getElementById('auth-dropdown').classList.toggle('open');
        };

        if (user.photoURL) {
          const img = document.createElement('img');
          img.className = 'header-avatar';
          img.src = user.photoURL;
          img.alt = '';
          const ph = document.createElement('span');
          ph.className = 'header-avatar-ph';
          ph.textContent = initial;
          ph.style.display = 'none';
          img.onerror = () => { img.style.display = 'none'; ph.style.display = 'flex'; };
          avatarBtn.appendChild(img);
          avatarBtn.appendChild(ph);
        } else {
          const ph = document.createElement('span');
          ph.className = 'header-avatar-ph';
          ph.textContent = initial;
          avatarBtn.appendChild(ph);
        }
        wrap.appendChild(avatarBtn);

        const dd = document.createElement('div');
        dd.id = 'auth-dropdown';
        dd.className = 'auth-dropdown';
        dd.onclick = e => e.stopPropagation();

        const profileLink = document.createElement('a');
        profileLink.className = 'dropdown-item';
        profileLink.href = `/user/${user.uid}`;
        profileLink.textContent = '👤 我的主頁';

        const settingsBtn = document.createElement('button');
        settingsBtn.className = 'dropdown-item';
        settingsBtn.disabled = true;
        settingsBtn.textContent = '⚙️ 帳號設定';

        const divider = document.createElement('div');
        divider.className = 'dropdown-divider';

        const signoutBtn = document.createElement('button');
        signoutBtn.className = 'dropdown-item danger';
        signoutBtn.textContent = '登出';
        signoutBtn.onclick = () => { auth.signOut(); dd.classList.remove('open'); };

        dd.appendChild(profileLink);
        dd.appendChild(settingsBtn);
        dd.appendChild(divider);
        dd.appendChild(signoutBtn);
        wrap.appendChild(dd);
        el.appendChild(wrap);

      } else {
        const btn = document.createElement('button');
        btn.className = 'header-login-btn';
        btn.textContent = '登入';
        btn.onclick = () => {
          auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
            .catch(err => {
              if (err.code !== 'auth/popup-closed-by-user' && err.code !== 'auth/cancelled-popup-request') {
                console.error(err);
              }
            });
        };
        el.appendChild(btn);
      }
    });
  }

  // ── Bookmark ──
  function setupBookmarkBtn() {
    if (!authReady) return;
    const btn = document.getElementById('save-btn');
    if (!btn) return;
    if (!currentUser) {
      btn.onclick = () => showToast('請先登入');
      return;
    }
    db.collection('users').doc(currentUser.uid).collection('bookmarks').doc(postId).get()
      .then(doc => updateBookmarkBtn(doc.exists))
      .catch(() => {});
    btn.onclick = () => handleBookmark();
  }

  function updateBookmarkBtn(isSaved) {
    const btn = document.getElementById('save-btn');
    if (!btn) return;
    btn.innerHTML = isSaved ? SVG_BOOKMARK_FILLED : SVG_BOOKMARK;
    btn.style.color = isSaved ? 'var(--primary)' : '';
    btn.dataset.saved = isSaved ? 'true' : 'false';
  }

  function handleBookmark() {
    if (!currentUser) { showToast('請先登入'); return; }
    const btn = document.getElementById('save-btn');
    const isSaved = btn.dataset.saved === 'true';
    if (isSaved) {
      updateBookmarkBtn(false);
      removeBookmark({ postId }).catch(() => updateBookmarkBtn(true));
    } else {
      openBookmarkModal();
    }
  }

  // ── Bookmark Modal ──
  let userCollections = [];

  function openBookmarkModal() {
    const modal = document.getElementById('bookmark-modal');
    modal.classList.add('show');
    loadCollections();
  }

  function closeBookmarkModal() {
    document.getElementById('bookmark-modal').classList.remove('show');
    document.getElementById('bm-new-input').value = '';
    document.getElementById('bm-new-row').style.display = 'none';
    renderCollectionList();
  }

  async function loadCollections() {
    try {
      const snap = await db.collection('users').doc(currentUser.uid).collection('collections')
        .orderBy('createdAt', 'desc').limit(20).get();
      userCollections = [];
      snap.forEach(doc => userCollections.push({ id: doc.id, ...doc.data() }));
    } catch(e) { userCollections = []; }
    renderCollectionList();
  }

  function renderCollectionList() {
    const list = document.getElementById('bm-col-list');
    if (!list) return;
    if (!userCollections.length) {
      list.innerHTML = '<div class="bm-empty">還沒有類別，可以新增一個</div>';
      return;
    }
    list.innerHTML = userCollections.map(c => `
      <button class="bm-col-item" data-id="${c.id}" data-name="${c.name}">
        <span class="bm-col-name">${c.name}</span>
        <span class="bm-col-count">${c.postCount || 0} 篇</span>
      </button>`).join('');
    list.querySelectorAll('.bm-col-item').forEach(btn => {
      btn.onclick = () => doSaveBookmark(btn.dataset.name);
    });
  }

  async function doSaveBookmark(collectionName) {
    closeBookmarkModal();
    updateBookmarkBtn(true);
    try {
      await saveBookmark({ postId, collectionName: collectionName || '' });
    } catch(e) {
      updateBookmarkBtn(false);
      showToast('收藏失敗，請再試');
    }
  }


  loadPost();
  setupAuthHeader();
</script>

<!-- Bookmark Modal -->
<div class="bm-backdrop" id="bookmark-modal" onclick="if(event.target===this)closeBookmarkModal()">
  <div class="bm-sheet">
    <div class="bm-header">
      <span class="bm-title">加入收藏</span>
      <button class="bm-close" onclick="closeBookmarkModal()">✕</button>
    </div>
    <div class="bm-col-list" id="bm-col-list"></div>
    <div class="bm-new-row" id="bm-new-row" style="display:none">
      <input class="bm-new-input" id="bm-new-input" placeholder="類別名稱..." maxlength="30" autocomplete="off" onkeydown="if(event.key==='Enter'){var n=this.value.trim();if(n)doSaveBookmark(n);}">
      <button class="bm-new-confirm" onclick="var n=document.getElementById('bm-new-input').value.trim();if(n)doSaveBookmark(n)">確定</button>
    </div>
    <div class="bm-actions">
      <button class="bm-add-col-btn" onclick="document.getElementById('bm-new-row').style.display='flex';document.getElementById('bm-new-input').focus()">＋ 新增類別</button>
      <button class="bm-skip-btn" onclick="doSaveBookmark('')">不分類，直接儲存</button>
    </div>
  </div>
</div>

</body>
</html>
