function getStatusColor(status) {
  return { upcoming:'#42a5f5',blooming:'#66bb6a',almost:'#ffd54f',peak:'#ff5722',fading:'#8d6e63',ended:'#bdbdbd',none:'#e5e7eb' }[status] || '#e5e7eb';
}
function getStatusBands() {
  return [
    { color:'#ff5722', label:'Peak Bloom' },
    { color:'#8d6e63', label:'Past Peak' },
    { color:'#ffd54f', label:'Almost Peak' },
    { color:'#66bb6a', label:'Blooming' },
    { color:'#42a5f5', label:'Coming Soon' },
    { color:'#bdbdbd', label:'Ended' },
    { color:'#e5e7eb', label:'N/A' },
  ];
}
function getBloomColor(bloom, flower) {
  if (!bloom) return '#d1d5db';
  const d = new Date(bloom), m = d.getMonth()+1, day = d.getDate();
  if (flower==='ajisai') {
    if (m<6) return '#7c3aed';
    if (m===6&&day<8)  return '#818cf8';
    if (m===6&&day<15) return '#60a5fa';
    if (m===6&&day<22) return '#34d399';
    if (m===6&&day<29) return '#a3e635';
    return '#fda4af';
  }
  if (flower==='koyo') {
    if (m===10&&day<=10) return '#dc2626';
    if (m===10&&day<=20) return '#ea580c';
    if (m===10)          return '#f97316';
    if (m===11&&day<=10) return '#f97316';
    if (m===11&&day<=20) return '#fbbf24';
    if (m===11)          return '#fbbf24';
    return '#fef08a';
  }
  if (flower==='sakura') {
    if (m<3||(m===3&&day<16)) return '#be185d';
    if (m===3) return '#ec4899';
    if (m===4&&day<16) return '#f472b6';
    if (m===4) return '#fda4af';
    return '#fce7f3';
  }
  return '#d1d5db';
}
function getColorBands(flower) {
  if (flower==='ajisai') return [
    { color:'#7c3aed',label:'Early June' },
    { color:'#818cf8',label:'Jun 1–7' },
    { color:'#60a5fa',label:'Jun 8–14' },
    { color:'#34d399',label:'Jun 15–21' },
    { color:'#a3e635',label:'Jun 22–28' },
    { color:'#fda4af',label:'Jun 29+' },
    { color:'#d1d5db',label:'TBD' },
  ];
  if (flower==='koyo') return [
    { color:'#dc2626',label:'Early Oct' },
    { color:'#ea580c',label:'Mid Oct' },
    { color:'#f97316',label:'Late Oct – Early Nov' },
    { color:'#fbbf24',label:'Mid–Late Nov' },
    { color:'#fef08a',label:'Early Dec+' },
    { color:'#d1d5db',label:'TBD' },
  ];
  if (flower==='sakura') return [
    { color:'#be185d',label:'Before Mar 15' },
    { color:'#ec4899',label:'Mar 15–31' },
    { color:'#f472b6',label:'Apr 1–15' },
    { color:'#fda4af',label:'Apr 16–30' },
    { color:'#fce7f3',label:'May+' },

  return [];

let _svgCache = null;

async function renderMap(flower, prefs) {
  const svgArea = document.getElementById('mapSvgArea');
  if (!svgArea) return;
  if (!_svgCache) {
    try { _svgCache = await fetch('../japan.svg').then(r => r.text()); }
    catch(e) { svgArea.innerHTML = ''; return; }
  }
  svgArea.innerHTML = _svgCache;
  const svg = svgArea.querySelector('svg');
  if (!svg) return;
  svg.setAttribute('viewBox','35 0 437.33 415');
  svg.removeAttribute('width'); svg.removeAttribute('height');
  svg.style.width='100%'; svg.style.height='auto';

  svg.querySelectorAll('path').forEach(path => {
    const key = JP_ID_MAP[path.id];
    if (path.id==='JP-47') { path.style.display='none'; return; }
    const fc = key && prefs[key];
    const color = fc ? getStatusColor(statusFromForecast(fc.bloom,fc.peak,fc.end)) : '#e5e7eb';
    path.style.fill = color;
    if (key && fc) {
      path.style.cursor='pointer';
      path.addEventListener('click', () => { location.href=`../prefecture/en/${flower}/${key}.html`; });
      path.addEventListener('mouseenter', () => path.style.opacity='0.7');
      path.addEventListener('mouseleave', () => path.style.opacity='1');
    } else { path.style.cursor='default'; }
  });

  svgArea.querySelectorAll('.map-city-label,.map-legend-box').forEach(el => el.remove());
  const CITY_LABELS = CITY_LABELS_BY_FLOWER[flower] || CITY_LABELS_BY_FLOWER.ajisai;
  CITY_LABELS.forEach(({ city, pref, x, y, dx, dy }) => {
    const fc = prefs[pref];
    if (!fc) return;
    const color = getStatusColor(statusFromForecast(fc.bloom,fc.peak,fc.end));
    const lbl = document.createElement('div');
    lbl.className = 'map-city-label';
    lbl.style.left = `${((x-35)/437)*100}%`;
    lbl.style.top  = `${(y/415)*100}%`;
    lbl.style.setProperty('--lbl-dx',`${dx}px`);
    lbl.style.setProperty('--lbl-dy',`${dy}px`);
    lbl.style.transform = `translate(${dx}px,${dy}px)`;
    lbl.style.setProperty('--lbl-accent', color);
    lbl.innerHTML = `<div>${city}</div><div class="lbl-date">${fc.forecastRange||'—'}</div>`;
    lbl.addEventListener('click', () => { location.href=`../prefecture/en/${flower}/${pref}.html`; });
    svgArea.appendChild(lbl);
  });

  const bands = getStatusBands();
  const legend = document.createElement('div');
  legend.className = 'map-legend-box';
  legend.innerHTML = bands.map(b => `<div class="map-legend-row"><div class="map-legend-swatch" style="background:${b.color}"></div><span>${b.label}</span></div>`).join('');
  svgArea.appendChild(legend);
}

const FLOWERS = {
  ajisai: { label:'Hydrangea',      emoji:'💠', color:'#7c5cbf', light:'#f0eafb' },
  koyo:   { label:'Autumn Leaves',  emoji:'🍁', color:'#d4570a', light:'#fff0e6' },
  sakura: { label:'Cherry Blossom', emoji:'🌸', color:'#d46b8a', light:'#fff0f5' },
};
const REGIONS_ORDER = ['Hokkaido','Tohoku','Kanto','Chubu','Kinki','Chugoku','Shikoku','Kyushu'];
const REGION_MAP_EN = {
  '北海道':'Hokkaido','東北':'Tohoku','関東':'Kanto','中部':'Chubu',
  '近畿':'Kinki','中国':'Chugoku','四国':'Shikoku','九州':'Kyushu','沖縄':'Okinawa',
};

const _urlFlower = new URLSearchParams(location.search).get('flower');
let currentFlower = ['ajisai','koyo','sakura'].includes(_urlFlower) ? _urlFlower : 'ajisai';
let cache = {};
const FLOWER_YEAR = { ajisai:2026, koyo:2026, sakura:2027 };
const STATUS_LABEL = { upcoming:'Coming Soon', blooming:'Blooming', almost:'Almost Peak', peak:'Peak Bloom', fading:'Past Peak', ended:'Ended', none:'—' };

function periodToEn(str) {
  if (!str) return '';
  const months = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const parts = { '上旬':'early', '中旬':'mid', '下旬':'late' };
  let lastMonth = 0;
  return str
    .replace(/(\d+)月(上旬|中旬|下旬)/g, (_,m,p) => { lastMonth=+m; return `${parts[p]} ${months[+m]}`; })
    .replace(/(上旬|中旬|下旬)/g, p => lastMonth ? `${parts[p]} ${months[lastMonth]}` : parts[p])
    .replace(/[～〜]/g, ' – ');
}

function statusFromForecast(bloom, peak, end) {
  if (!bloom) return 'none';
  const b=new Date(bloom), p=new Date(peak), e=new Date(end);
  if (TODAY<b) return 'upcoming';
  if (TODAY>=b&&TODAY<p) { return ((p-TODAY)/86400000)<=7 ? 'almost' : 'blooming'; }
  if (TODAY>=p&&TODAY<=e) { return ((e-TODAY)/86400000)<=4 ? 'fading' : 'peak'; }
  return 'ended';
}
function isFresh(dateStr) {
  if (!dateStr) return false;
  return ((TODAY-new Date(dateStr))/(1000*60*60*24)) <= 14;
}
function fmt(d, flower) {
  if (!d) return '—';
  const dt=new Date(d);
  if (flower==='koyo') {
    const day=dt.getDate();
    return `${['early','mid','late'][day<=10?0:day<=20?1:2]} ${dt.toLocaleString('en',{month:'short'})}`;
  }
  return `${dt.toLocaleString('en',{month:'short'})} ${dt.getDate()}`;
}

let _top20Cache=null, _spotIdCache=null, _romajiCache=null;
async function getRomajiMap() {
  if (_romajiCache) return _romajiCache;
  try { _romajiCache = await fetch('../data/romaji-map.json').then(r=>r.json()); }
  catch(e) { _romajiCache = {}; }
  return _romajiCache;
}
async function getSpotIdMap() {
  if (_spotIdCache) return _spotIdCache;
  try {
    const raw = await fetch('../data/spot-id-map.json').then(r=>r.json());
    _spotIdCache={};
    for (const [flower,entries] of Object.entries(raw)) {
      _spotIdCache[flower]={};
      for (const [id,info] of Object.entries(entries)) _spotIdCache[flower][info.name]=id;
    }
  } catch(e) { _spotIdCache={}; }
  return _spotIdCache;
}
function spotUrl(flower, name) {
  const id=_spotIdCache?.[flower]?.[name];
  return id ? `../spot/en/${flower}/${id}.html` : `../spot.html?flower=${flower}&spot=${encodeURIComponent(name)}`;
}
async function loadData(flower) {
  if (cache[flower]) return cache[flower];
  const year=FLOWER_YEAR[flower];
  const [forecast,statusRes,top20All] = await Promise.all([
    fetch(`../data/forecast/${flower}-${year}.json`).then(r=>r.json()),
    fetch(`../data/status/${flower}-${year}.json`).then(r=>r.json()).catch(()=>({updates:[]})),
    _top20Cache ? Promise.resolve(_top20Cache) : fetch('../data/top20.json').then(r=>r.json()).catch(()=>({})),
    getSpotIdMap(),
    getRomajiMap(),
  ]);
  if (!_top20Cache) _top20Cache=top20All;
  const updates=statusRes.updates||[];
  const latest=updates.length>0?updates[updates.length-1]:null;
  const isLiveMode=latest&&isFresh(latest.date);
  cache[flower]={ forecast, updates, latest, isLiveMode, year, top20:(top20All[flower]||[]) };
  return cache[flower];
}
function resolveStatus(prefId, fc, latest) {
  if (latest&&latest.data&&latest.data[prefId]) return latest.data[prefId].status;
  return statusFromForecast(fc.bloom,fc.peak,fc.end);
}
function countStats(prefs, latest) {
  const c={upcoming:0,blooming:0,peak:0,fading:0,ended:0,none:0};
  Object.entries(prefs).forEach(([id,fc])=>{ const s=resolveStatus(id,fc,latest); c[s]=(c[s]||0)+1; });
  return c;
}

function renderPrefCard(id, fc, latest, flower) {
  const s=resolveStatus(id,fc,latest);
  const liveData=latest&&latest.data&&latest.data[id];
  const isKoyo=flower==='koyo';
  const statusLbl=isKoyo
    ? {upcoming:'Coming Soon',blooming:'Turning',peak:'Peak 🔥',fading:'Past Peak',ended:'Ended',none:'—'}[s]
    : (flower==='sakura'&&s==='none') ? 'TBD' : STATUS_LABEL[s];
  const prefNameEn = PREF_EN[id] || fc.name;

  const rows=`
    <div class="pref-rows">
      ${liveData ? `
      <div class="pref-row">
        <span class="pref-row-label">Live</span>
        <span class="pref-row-val">${latest.date.slice(5).replace('-','/')}${liveData.pct!=null?`・${liveData.pct}%`:''}</span>
      </div>` : fc.forecastRange ? `
      <div class="pref-row">
        <span class="pref-row-label">Forecast</span>
        <span class="pref-row-val ${fc.forecastRange==='未公布'?'':'highlight'}">${fc.forecastRange==='未公布'?'TBD':fc.forecastRange}</span>
      </div>
      ${(fc.forecastRange!=='未公布'&&fc.peak)?`
      <div class="pref-row">
        <span class="pref-row-label">${isKoyo?'Peak Color':'Peak Bloom'}</span>
        <span class="pref-row-val">${fmt(fc.peak,flower)}</span>
      </div>`:''}` : `
      <div class="pref-row">
        <span class="pref-row-label">Start</span>
        <span class="pref-row-val">${fmt(fc.bloom,flower)}</span>
      </div>
      <div class="pref-row">
        <span class="pref-row-label">${isKoyo?'Peak':'Peak Bloom'}</span>
        <span class="pref-row-val">${fmt(fc.peak,flower)}</span>
      </div>`}
    </div>`;

  return `
    <a class="pref-card status-${s}" href="../prefecture/en/${flower}/${id}.html">
      <div class="pref-top">
        <div class="pref-name">${prefNameEn}</div>
        <div class="pref-badge badge-${s}">${statusLbl}</div>
      </div>
      ${rows}
    </a>`;
}

function groupByRegion(prefs) {
  const groups={};
  REGIONS_ORDER.forEach(r=>groups[r]=[]);
  Object.entries(prefs).forEach(([id,fc])=>{
    const r=REGION_MAP_EN[fc.region]||fc.region;
    if (groups[r]) groups[r].push({id,fc});
    else { groups[r]=[{id,fc}]; REGIONS_ORDER.push(r); }
  });
  return groups;
}

async function render(flower) {
  const app=document.getElementById('app');
  app.classList.add('loading');
  app.innerHTML='Loading...';
  const {forecast,updates,latest,isLiveMode,year,top20}=await loadData(flower);
  const f=FLOWERS[flower];
  const prefs=forecast.prefectures;
  const counts=countStats(prefs,isLiveMode?latest:null);

  document.documentElement.style.setProperty('--active',f.color);
  document.documentElement.style.setProperty('--active-light',f.light);

  const groups=groupByRegion(prefs);
  const regionsHTML=REGIONS_ORDER.map(r=>{
    const items=groups[r];
    if (!items||!items.length) return '';
    return `<div class="region-group">
      <div class="section-title">${r}</div>
      <div class="pref-grid">${items.map(({id,fc})=>renderPrefCard(id,fc,isLiveMode?latest:null,flower)).join('')}</div>
    </div>`;
  }).join('');

  const top20HTML=top20.length?`
    <section class="home-section">
      <div class="home-section-header">
        <div class="home-section-title">Top Recommended Spots 2026</div>
        <span class="home-section-sub">Scroll →</span>
      </div>
      <div class="top20-wrap">
      <button class="scroll-btn scroll-btn-left" id="scrollLeft" aria-label="Left">‹</button>
      <div class="top20-scroll" id="top20Scroll">
        ${top20.map(s=>{
          const cardImg=s.thumb||s.img;
          const imgEl=cardImg?`<img class="top20-img" src="../${cardImg}" alt="${s.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:''
          const placeholder=`<div class="top20-img-placeholder" style="${cardImg?'display:none':''}">${f.emoji}</div>`;
          return `<a class="top20-card" href="${spotUrl(flower,s.name)}">
            ${imgEl}${placeholder}
            <div class="top20-info">
              <div class="top20-name">${_romajiCache?.[flower]?.[s.name] ? `${_romajiCache[flower][s.name]} <span style="font-weight:400;color:var(--text-sub)">(${s.name})</span>` : s.name}</div>
              <div class="top20-pref">${PREF_EN[s.pref]||s.prefName}</div>
              <div class="top20-period">${periodToEn(s.period)}</div>
            </div>
          </a>`;
        }).join('')}
      </div>
      <button class="scroll-btn scroll-btn-right" id="scrollRight" aria-label="Right">›</button>
      </div>
    </section>`:'';

  const statSub=[
    counts.peak>0?`${counts.peak} at peak`:'',
    counts.fading>0?`${counts.fading} past peak`:'',
    counts.blooming>0?`${counts.blooming} blooming`:'',
    counts.upcoming>0?`${counts.upcoming} coming soon`:'',
  ].filter(Boolean).join(' · ');

  app.classList.remove('loading');
  app.innerHTML=`
    <section class="home-section">
      <div class="home-section-header">
        <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap">
          <div class="home-section-title">${year} Japan ${flower==='koyo'?'Autumn Leaves':flower==='sakura'?'Cherry Blossom':'Hydrangea'} Forecast Map</div>
          ${flower==='koyo'?'<span style="font-size:12px;color:#dc2626;font-weight:600;white-space:nowrap">※ Detailed forecast updates around September</span>':''}
        </div>
        <span class="home-section-sub">${statSub||'47 Prefectures'}</span>
      </div>
      <div class="map-section">
        <div class="map-outer"><div class="map-svg-area" id="mapSvgArea"></div></div>
      </div>
    </section>
    ${top20HTML}
    <section class="home-section">
      <div class="home-section-header">
        <div class="home-section-title">Forecast & Spots by Prefecture</div>
        <span class="home-section-sub">Click to view spots</span>
      </div>
      ${regionsHTML}
    </section>`;

  renderMap(flower, prefs);
  const mapOuter=document.querySelector('.map-outer');
  if (mapOuter) {
    const bgOverlay='linear-gradient(rgba(255,255,255,0.4),rgba(255,255,255,0.4))';
    const bgMap={koyo:'koyo-map-bg.jpg',sakura:'sakura-map-bg.jpg',ajisai:'ajisai-map-bg.jpg'};
    const bgFile=bgMap[flower];
    mapOuter.style.background=bgFile?`${bgOverlay}, url('../images/${bgFile}') center/cover no-repeat`:'#dce8f4';
  }

  const scroll=document.getElementById('top20Scroll');
  const btnL=document.getElementById('scrollLeft');
  const btnR=document.getElementById('scrollRight');
  if (scroll) {
    const updateBtns=()=>{ if(!btnL||!btnR)return; btnL.classList.toggle('hidden',scroll.scrollLeft<=4); btnR.classList.toggle('hidden',scroll.scrollLeft>=scroll.scrollWidth-scroll.clientWidth-4); };
    if(btnL){btnL.classList.add('hidden');btnL.addEventListener('click',()=>scroll.scrollBy({left:-280,behavior:'smooth'}));}
    if(btnR){btnR.addEventListener('click',()=>scroll.scrollBy({left:280,behavior:'smooth'}));}
    scroll.addEventListener('scroll',updateBtns,{passive:true});
    updateBtns();
    let isDragging=false,startX=0,startScroll=0;
    scroll.addEventListener('mousedown',e=>{isDragging=true;startX=e.pageX;startScroll=scroll.scrollLeft;scroll.classList.add('dragging');});
    window.addEventListener('mousemove',e=>{if(!isDragging)return;scroll.scrollLeft=startScroll-(e.pageX-startX);});
    window.addEventListener('mouseup',()=>{if(!isDragging)return;isDragging=false;scroll.classList.remove('dragging');});
    scroll.addEventListener('dragstart',e=>e.preventDefault());
  }
}

document.querySelectorAll('.flower-tab').forEach(tab=>{
  if(tab.dataset.flower===currentFlower){
    document.querySelectorAll('.flower-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
  }
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.flower-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentFlower=tab.dataset.flower;
    render(currentFlower);
  });
});
render(currentFlower);
