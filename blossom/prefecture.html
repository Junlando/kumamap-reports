<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>花卉預測 | Junlando</title>
  <meta name="description" content="都道府縣花卉開花預測與推薦賞花景點。" />
  <link rel="icon" href="../favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --active: #7c5cbf;
      --active-light: #f0eafb;
      --gray: #f5f6f8;
      --border: #e8e9ec;
      --text: #1a1a2e;
      --text-sub: #6b7280;
      --radius: 12px;
    }

    body {
      font-family: 'Inter', 'Noto Sans JP', -apple-system, sans-serif;
      background: #fafbfc;
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: white;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px;
      height: 58px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
      font-size: 18px;
    }
    .back-btn {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: white;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-sub);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
    }
    .back-btn:hover { background: var(--gray); color: var(--text); }

    /* ── BREADCRUMB ── */
    .breadcrumb-bar {
      background: white;
      border-bottom: 1px solid var(--border);
    }
    .breadcrumb-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 9px 20px;
      font-size: 13px;
      color: var(--text-sub);
    }

    /* ── MAIN ── */
    .main {
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    /* ── TIMELINE CARD ── */
    .timeline-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 24px;
      overflow: hidden;
    }
    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-header h2 { font-size: 15px; font-weight: 700; }

    .timeline-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
    }
    .timeline-item {
      padding: 20px 16px;
      text-align: center;
      border-right: 1px solid var(--border);
      position: relative;
    }
    .timeline-item:last-child { border-right: none; }
    .timeline-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-sub);
      margin-bottom: 6px;
    }
    .timeline-date {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.2;
    }
    .timeline-date-sub {
      font-size: 12px;
      color: var(--text-sub);
      margin-top: 4px;
    }
    .timeline-badge {
      display: inline-block;
      margin-top: 8px;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
    }

    /* Progress bar */
    .progress-wrap {
      padding: 16px 20px 20px;
      border-top: 1px solid var(--border);
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-sub);
      margin-bottom: 8px;
    }
    .progress-bar {
      height: 8px;
      background: var(--gray);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--active);
      transition: width 0.6s ease;
    }

    /* ── STATUS BANNER ── */
    .status-banner {
      border-radius: var(--radius);
      padding: 14px 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      font-weight: 600;
    }
    .status-banner.upcoming { background: #e8f4fd; color: #1565c0; border: 1px solid #bbdefb; }
    .status-banner.blooming { background: #e8f5e9; color: #1b5e20; border: 1px solid #c8e6c9; }
    .status-banner.peak     { background: #fff3e0; color: #bf360c; border: 1px solid #ffe0b2; }
    .status-banner.ended    { background: #f5f5f5; color: #616161; border: 1px solid #e0e0e0; }
    .status-banner .icon    { font-size: 20px; }
    .status-banner .msg     { flex: 1; }
    .status-banner .days    { font-size: 12px; opacity: 0.8; }

    /* ── SPOTS ── */
    .spots-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .spot-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px 14px 20px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.15s;
      border-left: 3px solid var(--active);
    }
    .spot-card:hover {
      border-color: var(--active);
      box-shadow: 0 3px 12px rgba(0,0,0,0.08);
      transform: translateY(-1px);
    }
    .spot-info { flex: 1; min-width: 0; text-align: left; }
    .spot-name { font-size: 15px; font-weight: 600; margin-bottom: 5px; }
    .spot-address { font-size: 12px; color: var(--text-sub); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 5px; }
    .spot-period-row { font-size: 12px; color: var(--text-sub); }
    .spot-period-row span { color: var(--active); font-weight: 500; }
    .spot-arrow { color: #c0c4cc; font-size: 16px; flex-shrink: 0; align-self: center; }

    /* ── NEARBY PREFS ── */
    .nearby-title {
      font-size: 15px;
      font-weight: 700;
      margin: 28px 0 12px;
    }
    .nearby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
    }
    .nearby-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      text-decoration: none;
      color: var(--text);
      display: block;
      transition: all 0.15s;
    }
    .nearby-card:hover {
      border-color: var(--active);
      transform: translateY(-1px);
    }
    .nearby-name  { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
    .nearby-date  { font-size: 11px; color: var(--text-sub); }

    /* ── LOADING ── */
    .loading {
      text-align: center;
      padding: 80px;
      color: var(--text-sub);
    }
    .error-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-sub);
    }
    .error-msg h2 { font-size: 20px; margin-bottom: 8px; }

    footer {
      border-top: 1px solid var(--border);
      padding: 24px 20px;
      text-align: center;
      font-size: 13px;
      color: var(--text-sub);
    }
    footer a { color: var(--text-sub); text-decoration: none; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      /* Header */
      .header-inner { padding: 0 14px; gap: 10px; }
      .back-btn { padding: 6px 10px; font-size: 12px; }

      /* Header */
      .header-inner { padding: 0 14px; gap: 10px; }
      .back-btn { padding: 6px 10px; font-size: 12px; }
      .breadcrumb-inner { padding: 8px 14px; }

      /* 卡片貼邊：移除容器側邊 padding */
      .main { padding: 8px 0 48px; }

      /* Timeline 貼邊 */
      .timeline-card { border-radius: 0; border-left: none; border-right: none; }
      .timeline-grid { grid-template-columns: repeat(3, 1fr); }
      .timeline-item { padding: 14px 8px; }
      .timeline-date { font-size: 16px; }
      .timeline-label { font-size: 10px; letter-spacing: 0; }
      .timeline-date-sub { font-size: 11px; }
      .timeline-badge { font-size: 10px; padding: 2px 7px; }
      .progress-wrap { padding: 12px 16px 16px; }
      .card-header { padding: 12px 16px; }

      /* Status banner 貼邊 */
      .status-banner { border-radius: 0; border-left: none; border-right: none; padding: 12px 16px; font-size: 13px; gap: 10px; margin-bottom: 12px; }

      /* Spot cards 貼邊，以分隔線取代卡片間距 */
      .spots-title { padding: 0 16px; margin-bottom: 8px; }
      .spot-card { border-radius: 0; border-left: 3px solid var(--active); border-right: none; border-top: none; border-bottom: 1px solid var(--border); padding: 14px 14px 14px 16px; margin-bottom: 0; }
      .spot-card:last-of-type { border-bottom: none; }
      .spot-name { font-size: 14px; }
      .spot-address { font-size: 11px; }
      .spot-period-row { font-size: 11px; }

      /* Nearby */
      .nearby-title { padding: 0 16px; }
      .nearby-grid { grid-template-columns: repeat(2, 1fr); padding: 0 10px; }
      .nearby-card { padding: 10px 12px; }
    }

    @media (max-width: 380px) {
      /* Very small phones: stack timeline vertically */
      .timeline-grid { grid-template-columns: 1fr; }
      .timeline-item { border-right: none; border-bottom: 1px solid var(--border); padding: 12px 16px; text-align: left; display: flex; align-items: center; gap: 12px; }
      .timeline-item:last-child { border-bottom: none; }
      .timeline-label { margin-bottom: 0; min-width: 40px; }
      .timeline-date { font-size: 18px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo">
      <img src="../favicon.ico" style="width:32px;height:32px;border-radius:8px;display:block" alt="Junlando" />
      Junlando
    </a>
    <a href="index.html" class="back-btn" id="backBtn">← 花卉預測</a>
  </div>
</header>

<div class="breadcrumb-bar">
  <div class="breadcrumb-inner">
    <span id="crumb-pref">載入中…</span>
  </div>
</div>

<main class="main">
  <div id="app" class="loading">載入資料中…</div>
</main>

<footer>
  <p>© 2026 Junlando | <a href="/">首頁</a> · <a href="index.html">花卉預測</a> · <a href="https://community.junlando.com" target="_blank" rel="noopener">旅遊論壇</a></p>
  <p style="margin-top:6px">預測資料僅供參考，實際花況受氣候影響可能有所差異。</p>
</footer>

<script>
const TODAY = new Date('2026-05-04');

const FLOWERS = {
  ajisai: { label: '繡球花', emoji: '💠', color: '#7c5cbf', light: '#f0eafb' },
  koyo:   { label: '紅葉',   emoji: '🍁', color: '#d4570a', light: '#fff0e6' },
  sakura: { label: '桜',     emoji: '🌸', color: '#d46b8a', light: '#fff0f5' },
};

function getParams() {
  const p = new URLSearchParams(location.search);
  return { ken: p.get('ken') || '', flower: p.get('flower') || 'ajisai' };
}

function getStatus(bloom, peak, end) {
  if (!bloom) return 'none';
  const b = new Date(bloom), p = new Date(peak), e = new Date(end);
  if (TODAY < b) return 'upcoming';
  if (TODAY >= b && TODAY < p) return 'blooming';
  if (TODAY >= p && TODAY <= e) return 'peak';
  return 'ended';
}

const FLOWER_YEAR = { ajisai: 2026, koyo: 2026, sakura: 2027 };

function isFresh(dateStr) {
  if (!dateStr) return false;
  const diff = (TODAY - new Date(dateStr)) / (1000 * 60 * 60 * 24);
  return diff >= 0 && diff <= 14;
}

function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  return `${dt.getFullYear()}/${dt.getMonth()+1}/${dt.getDate()}`;
}
function fmtShort(d) {
  if (!d) return '—';
  const dt = new Date(d);
  return `${dt.getMonth()+1}月${dt.getDate()}日`;
}
function fmtMD(dateStr) {
  if (!dateStr) return '—';
  return dateStr.slice(5).replace('-', '/');
}

function daysUntil(d) {
  if (!d) return null;
  return Math.round((new Date(d) - TODAY) / (1000 * 60 * 60 * 24));
}

function progressPct(bloom, end) {
  if (!bloom || !end) return 0;
  const b = new Date(bloom), e = new Date(end);
  if (TODAY < b) return 0;
  if (TODAY > e) return 100;
  return Math.round((TODAY - b) / (e - b) * 100);
}

// ── STATUS BANNER ──
function statusBanner(fc, liveData, flower) {
  const s = liveData ? liveData.status : getStatus(fc.bloom, fc.peak, fc.end);
  const f = FLOWERS[flower];
  const isLive = !!liveData;

  const msgs = {
    upcoming: () => { const d = daysUntil(fc.bloom); return d > 0 ? `預計 <strong>${fmtShort(fc.bloom)}</strong> 開花，還有 ${d} 天` : '即將開花'; },
    blooming: () => `目前開花中${liveData?.pct != null ? `，開花率約 ${liveData.pct}%` : ''}，預計 <strong>${fmtShort(fc.peak)}</strong> 滿開`,
    peak:     () => `現在是最佳觀賞時期！${liveData?.pct != null ? `開花率 ${liveData.pct}%，` : ''}預計至 <strong>${fmtShort(fc.end)}</strong>`,
    ended:    () => `本季賞花期已於 ${fmtShort(fc.end)} 結束`,
    none:     () => '此縣市暫無對應花卉預測資料'
  };
  const icons = { upcoming:'📅', blooming: f.emoji, peak:'🔥', ended:'🍃', none:'ℹ️' };

  return `
    <div class="status-banner ${s}">
      <span class="icon">${icons[s]}</span>
      <span class="msg">${(msgs[s] || msgs.none)()}
        ${isLive ? '<span style="font-size:11px;opacity:0.7;margin-left:6px">（實況）</span>' : ''}
      </span>
    </div>`;
}

// ── TIMELINE CARD ──
function timelineCard(fc, flower) {
  const f = FLOWERS[flower];
  const s = getStatus(fc.bloom, fc.peak, fc.end);
  const pct = progressPct(fc.bloom, fc.end);
  const badgeMap = {
    upcoming: { bg:'#e8f4fd', color:'#1976d2', txt:'開花前' },
    blooming: { bg:'#e8f5e9', color:'#2e7d32', txt:'開花中' },
    peak:     { bg:'#fff3e0', color:'#ef6c00', txt:'滿開🔥' },
    ended:    { bg:'#f5f5f5', color:'#757575', txt:'已結束' },
    none:     { bg:'#f5f5f5', color:'#aaa',    txt:'—' },
  }[s];

  return `
    <div class="timeline-card">
      <div class="card-header">
        <h2>${fc.name} ${f.label}開花日程</h2>
      </div>
      <div class="timeline-grid">
        <div class="timeline-item">
          <div class="timeline-label">開花日</div>
          <div class="timeline-date">${fc.bloom ? fmtShort(fc.bloom) : '—'}</div>
        </div>
        <div class="timeline-item">
          <div class="timeline-label">滿開日</div>
          <div class="timeline-date">${fc.peak ? fmtShort(fc.peak) : '—'}</div>
          <div class="timeline-badge" style="background:${badgeMap.bg};color:${badgeMap.color}">${badgeMap.txt}</div>
        </div>
        <div class="timeline-item">
          <div class="timeline-label">結束日</div>
          <div class="timeline-date">${fc.end ? fmtShort(fc.end) : '—'}</div>
        </div>
      </div>
      ${fc.bloom ? `
      <div class="progress-wrap">
        <div class="progress-label"><span>花期進度</span><span>${pct}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>` : ''}
      ${fc.forecastRange || fc.lastYearDate ? `
      <div style="padding:10px 20px;border-top:1px solid var(--border);display:flex;gap:20px;flex-wrap:wrap">
        ${fc.forecastRange ? `<div style="font-size:12px;color:var(--text-sub)">📊 今年預測區間 <strong style="color:var(--text)">${fc.forecastRange}</strong></div>` : ''}
        ${fc.lastYearDate  ? `<div style="font-size:12px;color:var(--text-sub)">🗓 去年開花日 <strong style="color:var(--text)">${fc.lastYearDate}</strong></div>` : ''}
      </div>` : ''}
    </div>`;
}

// ── TREND BLOCK ──
function trendSection(updates, ken, flower) {
  if (!updates || updates.length < 2) return '';
  const f = FLOWERS[flower];

  const STATUS_COLOR = { peak:'#ffa726', blooming:'#66bb6a', upcoming:'#42a5f5', ended:'#bdbdbd', none:'#eee' };
  const STATUS_LABEL = { upcoming:'開花前', blooming:'開花中', peak:'滿開', ended:'已結束', none:'—' };

  const rows = updates.map(u => {
    const d = u.data[ken];
    const s = d?.status || 'none';
    return `
      <div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)">
        <div style="font-size:12px;color:var(--text-sub);width:44px;flex-shrink:0">${fmtMD(u.date)}</div>
        <div style="width:10px;height:10px;border-radius:50%;background:${STATUS_COLOR[s]};flex-shrink:0"></div>
        <div style="font-size:13px;font-weight:600">${STATUS_LABEL[s]}</div>
        ${d?.pct != null ? `<div style="font-size:12px;color:var(--text-sub)">${d.pct}%</div>` : ''}
        ${d?.note ? `<div style="font-size:12px;color:var(--text-sub);margin-left:auto">${d.note}</div>` : ''}
      </div>`;
  }).reverse().join('');

  return `
    <div class="timeline-card" style="margin-bottom:20px">
      <div class="card-header">
        <h2>近期花況記錄</h2>
        <span style="font-size:12px;color:var(--text-sub)">最新在上</span>
      </div>
      <div style="padding:0 20px 4px">${rows}</div>
    </div>`;
}

// ── SPOTS ──
function spotsSection(spots, flower, ken) {
  const f = FLOWERS[flower];
  if (!spots || spots.length === 0) return '';
  const html = spots.map(s => `
    <a class="spot-card" href="spot.html?flower=${flower}&spot=${encodeURIComponent(s.name)}&pref=${ken}">
      <div class="spot-info">
        <div class="spot-name">${s.name}</div>
        <div class="spot-address">📍 ${s.address}</div>
        ${s.period ? `<div class="spot-period-row">預估賞花期：<span>${s.period}</span></div>` : ''}
      </div>
      <div class="spot-arrow">›</div>
    </a>`).join('');
  return `<div class="spots-title">推薦賞花景點</div>${html}`;
}

// ── NEARBY ──
function nearbySection(forecastPrefs, currentId, latestData, flower) {
  const others = Object.entries(forecastPrefs)
    .filter(([id]) => id !== currentId).slice(0, 8);
  if (!others.length) return '';
  const STATUS_LABEL = { upcoming:'開花前', blooming:'開花中', peak:'滿開', ended:'已結束', none:'—' };
  const cards = others.map(([id, fc]) => {
    const liveS = latestData?.data?.[id];
    const s = liveS ? liveS.status : getStatus(fc.bloom, fc.peak, fc.end);
    return `
      <a class="nearby-card" href="prefecture.html?ken=${id}&flower=${flower}">
        <div class="nearby-name">${fc.name}</div>
        <div class="nearby-date">${fc.bloom ? fmtShort(fc.bloom) + ' 開花' : '—'}</div>
        <div style="font-size:11px;margin-top:3px;color:var(--text-sub)">${STATUS_LABEL[s]}</div>
      </a>`;
  }).join('');
  return `<div class="nearby-title">其他都道府縣預測</div><div class="nearby-grid">${cards}</div>`;
}

// ── MAIN RENDER ──
async function render() {
  const { ken, flower } = getParams();
  const f = FLOWERS[flower] || FLOWERS.ajisai;
  const year = FLOWER_YEAR[flower] || 2026;
  const app = document.getElementById('app');

  document.documentElement.style.setProperty('--active', f.color);
  document.documentElement.style.setProperty('--active-light', f.light);

  try {
    const [forecast, statusRes, spotsData] = await Promise.all([
      fetch(`data/forecast/${flower}-${year}.json`).then(r => r.json()),
      fetch(`data/status/${flower}-${year}.json`).then(r => r.json()).catch(() => ({ updates: [] })),
      fetch(`data/spots/${flower}.json`).then(r => r.json()).catch(() => ({}))
    ]);

    const fc = forecast.prefectures[ken];
    if (!fc) {
      document.getElementById('crumb-pref').textContent = ken;
      app.classList.remove('loading');
      app.innerHTML = `<div class="error-msg"><h2>找不到「${ken}」的資料</h2>
        <p style="margin-top:8px"><a href="index.html" style="color:var(--active)">← 回到花卉預測首頁</a></p></div>`;
      return;
    }

    const updates = statusRes.updates || [];
    const latest = updates.length > 0 ? updates[updates.length - 1] : null;
    const isLiveMode = latest && isFresh(latest.date);
    const liveData = isLiveMode ? latest.data?.[ken] : null;

    document.title = `${fc.name} ${f.label}預測 | Junlando`;
    document.getElementById('crumb-pref').innerHTML = `<a href="index.html?flower=${flower}" style="color:var(--text-sub);text-decoration:none">花卉預測</a> › ${fc.name}`;
    document.getElementById('backBtn').href = `index.html?flower=${flower}`;

    app.classList.remove('loading');
    app.innerHTML = `
      ${statusBanner(fc, liveData, flower)}
      ${timelineCard(fc, flower)}
      ${isLiveMode ? trendSection(updates, ken, flower) : ''}
      ${spotsSection(spotsData[ken] || [], flower, ken)}
      ${nearbySection(forecast.prefectures, ken, isLiveMode ? latest : null, flower)}
    `;

  } catch (e) {
    console.error(e);
    app.classList.remove('loading');
    app.innerHTML = `<div class="error-msg"><h2>載入失敗，請稍後再試</h2></div>`;
  }
}

render();
</script>
</body>
</html>
