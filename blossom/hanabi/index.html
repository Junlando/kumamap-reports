<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 日本花火大會日曆｜全國花火祭典行程・地圖一覽｜Junlando</title>
  <meta name="description" content="2026 日本花火大會完整日曆！收錄隅田川、大曲、長岡等全國 40+ 場花火祭典，依日期與縣市查詢，輕鬆規劃日本夏祭旅行。" />
  <meta property="og:title" content="2026 日本花火大會日曆｜Junlando" />
  <meta property="og:description" content="2026 全國 40+ 場花火祭典，依日期與縣市查詢，規劃夏祭旅行首選。" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://junlando.com/blossom/hanabi/" />
  <link rel="canonical" href="https://junlando.com/blossom/hanabi/" />
  <link rel="icon" href="../../favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --hanabi: #e05a00;
      --hanabi-dark: #b84400;
      --hanabi-light: #fff4ee;
      --hanabi-gold: #f5a623;
      --gray: #f5f6f8;
      --border: #e8e9ec;
      --text: #1a1a2e;
      --text-sub: #6b7280;
      --radius: 12px;
    }

    body {
      font-family: 'Inter', 'Noto Sans JP', -apple-system, sans-serif;
      background: #fafbfc;
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: white;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
      height: 58px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
      font-size: 18px;
      flex-shrink: 0;
    }
    .header-links {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .header-links a {
      padding: 6px 12px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 13px;
      color: var(--text-sub);
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
    }
    .header-links a:hover { background: var(--gray); color: var(--text); }
    .header-links .btn-primary { background: var(--text); color: white; margin-left: 4px; }
    .header-links .btn-primary:hover { background: #2d2d4e; }

    /* ── HERO ── */
    .hanabi-hero {
      background: linear-gradient(135deg, #1a0a00 0%, #3d1500 40%, #1a0a00 100%);
      padding: 32px 20px 28px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hanabi-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 50%, rgba(255,100,0,0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 50%, rgba(255,200,0,0.14) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 15%, rgba(255,50,100,0.12) 0%, transparent 50%);
      pointer-events: none;
    }
    .hanabi-hero-inner { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; }
    .hanabi-hero-emoji { font-size: 44px; margin-bottom: 10px; line-height: 1; }
    .hanabi-hero-title {
      font-size: 26px;
      font-weight: 800;
      color: white;
      margin-bottom: 6px;
      line-height: 1.25;
    }
    .hanabi-hero-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      margin-bottom: 18px;
    }
    .hanabi-stats {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .hanabi-stat-pill {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 4px 13px;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.88);
    }

    /* ── TAB BAR ── */
    .selector-wrap { background: #e05a00; }
    .flower-tabs {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      padding: 0 12px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .flower-tabs::-webkit-scrollbar { display: none; }
    .flower-tab {
      padding: 13px 20px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.75);
      transition: color 0.15s, background 0.15s;
      position: relative;
      white-space: nowrap;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .flower-tab:hover { color: white; background: rgba(0,0,0,0.1); }
    .flower-tab.active { color: white; background: rgba(0,0,0,0.15); }
    .flower-tab.active::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: rgba(255,255,255,0.9);
      border-radius: 3px 3px 0 0;
    }

    /* ── MAIN ── */
    .main { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }

    /* ── SECTION HEADER ── */
    .section-hd {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding-bottom: 12px;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--border);
    }
    .section-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-sub {
      font-size: 13px;
      color: var(--text-sub);
    }

    /* ── CALENDAR SECTION ── */
    .cal-section { margin-bottom: 40px; }

    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 12px;
      max-width: 640px;
      margin-left: auto;
      margin-right: auto;
    }
    .cal-nav-btn {
      width: 40px;
      height: 40px;
      border: 1.5px solid var(--border);
      background: white;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      transition: background 0.12s, border-color 0.12s;
      flex-shrink: 0;
    }
    .cal-nav-btn:hover { background: var(--hanabi-light); border-color: var(--hanabi); }
    .cal-nav-btn:disabled { opacity: 0.3; cursor: default; }
    .cal-nav-btn:disabled:hover { background: white; border-color: var(--border); }
    .cal-month-label {
      min-width: 180px;
      text-align: center;
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .cal-month-badge {
      background: var(--hanabi-light);
      color: var(--hanabi);
      font-size: 12px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 12px;
    }

    .cal-wrap {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px 16px;
      max-width: 640px;
      margin: 0 auto;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .cal-dow {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-sub);
      padding: 4px 0 6px;
    }
    .cal-dow.sun { color: #ef4444; }
    .cal-dow.sat { color: #3b82f6; }
    .cal-day {
      height: 52px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: default;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-sub);
      transition: background 0.1s;
    }
    .cal-day.empty { pointer-events: none; }
    .cal-day.has-event {
      background: var(--hanabi-light);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
      border: 1.5px solid #ffc49e;
    }
    .cal-day.has-event:hover { background: #ffe0cc; border-color: var(--hanabi); }
    .cal-day.active-day {
      background: var(--hanabi) !important;
      color: white !important;
      border-color: var(--hanabi-dark) !important;
    }
    .cal-day.sun { color: #ef4444; }
    .cal-day.has-event.sun { color: #c41c1c; }
    .cal-day.active-day { color: white !important; }
    .cal-day.sat { color: #3b82f6; }
    .cal-day.has-event.sat { color: #1d4ed8; }
    .cal-count {
      font-size: 9px;
      font-weight: 700;
      color: var(--hanabi);
      line-height: 1;
      margin-top: 1px;
    }
    .cal-day.active-day .cal-count { color: rgba(255,255,255,0.85); }
    .cal-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--hanabi);
      margin-top: 2px;
    }
    .cal-day.active-day .cal-dot { background: white; }

    /* ── EVENT PANEL ── */
    .event-panel {
      margin-top: 12px;
      background: white;
      border: 1.5px solid var(--hanabi);
      border-radius: var(--radius);
      overflow: hidden;
      animation: slideDown 0.18s ease;
    }
    @keyframes slideDown {
      from { opacity:0; transform:translateY(-5px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .event-panel-hd {
      background: var(--hanabi);
      color: white;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 700;
    }
    .long-running-panel { margin-top: 8px; border-color: #9b6a00; }
    .long-running-hd { background: #7a5200; }

    /* Banner inside calendar for long-running months */
    .cal-long-banner {
      margin-bottom: 10px;
      background: #fff8ec;
      border: 1.5px solid #f0c060;
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 12px;
      color: #7a5200;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .cal-long-banner-names { font-weight: 400; color: #5a3a00; }

    .event-list { padding: 4px 0; }
    .event-item {
      padding: 11px 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .event-item:last-child { border-bottom: none; }
    .event-icon { font-size: 20px; flex-shrink: 0; line-height: 1; margin-top: 1px; }
    .event-info { flex: 1; min-width: 0; }
    .event-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
    .event-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .event-pref-tag {
      background: var(--hanabi-light);
      color: var(--hanabi-dark);
      padding: 1px 8px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 11px;
    }
    .event-note { font-size: 11px; color: var(--text-sub); font-style: italic; }

    /* ── MAP SECTION ── */
    .map-section { margin-bottom: 40px; }
    .map-body {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .map-outer {
      background: #dce8f4;
      padding: 16px;
      display: flex;
      justify-content: center;
    }
    .map-svg-area { position: relative; width: 100%; max-width: 420px; }
    .map-svg-area svg { width: 100%; height: auto; display: block; }
    .map-svg-area path {
      stroke: white;
      stroke-width: 0.8;
      transition: opacity 0.12s;
    }
    .map-svg-area path.no-event { fill: #d1d5db; cursor: default; }
    .map-svg-area path.has-event { fill: var(--hanabi); cursor: pointer; opacity: 0.85; }
    .map-svg-area path.has-event:hover { opacity: 1; }
    .map-svg-area path.selected-pref { fill: var(--hanabi-dark) !important; opacity: 1 !important; }
    #mapSvgArea #JP-47 { display: none; }

    /* Legend overlay (like flower map) */
    .map-legend-box {
      position: absolute;
      top: 8px; left: 8px;
      background: rgba(15,20,50,0.78);
      border-radius: 7px;
      padding: 6px 10px;
      color: white;
      pointer-events: none;
      font-size: 10px;
    }
    .map-legend-row { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
    .map-legend-row:last-child { margin-bottom: 0; }
    .map-legend-swatch { width: 12px; height: 8px; border-radius: 2px; flex-shrink: 0; }

    /* Chips below map */
    .pref-chips-row {
      padding: 10px 16px 12px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
    }
    .pref-chips-label { font-size: 11px; font-weight: 700; color: var(--text-sub); margin-right: 4px; }
    .pref-chip {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: white;
      color: var(--text-sub);
      transition: all 0.12s;
      white-space: nowrap;
    }
    .pref-chip:hover { border-color: var(--hanabi); color: var(--hanabi); background: var(--hanabi-light); }
    .pref-chip.active { background: var(--hanabi); color: white; border-color: var(--hanabi); }
    .map-clear-btn {
      font-size: 12px; color: var(--hanabi); cursor: pointer; font-weight: 600;
      display: none; background: none; border: none; padding: 0;
    }
    .map-clear-btn.visible { display: inline; }

    /* ── TOP PICKS ── */
    .top-section { margin-bottom: 40px; }
    .top-scroll-wrap { position: relative; }
    .top-scroll {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      padding-bottom: 6px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      cursor: grab;
      user-select: none;
    }
    .top-scroll.dragging { cursor: grabbing; }
    .top-scroll::-webkit-scrollbar { display: none; }
    .top-card {
      flex: 0 0 200px;
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    .top-card:hover { box-shadow: 0 4px 16px rgba(224,90,0,0.14); border-color: #ffc49e; }
    .top-card-img {
      height: 110px;
      background: linear-gradient(135deg, #2d0a00, #8b2a00);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      position: relative;
      overflow: hidden;
    }
    .top-card-img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 70%, rgba(255,120,0,0.25) 0%, transparent 65%);
    }
    .top-card-rank {
      position: absolute;
      top: 8px; left: 8px;
      background: rgba(0,0,0,0.55);
      color: white;
      font-size: 11px;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 8px;
      z-index: 1;
    }
    .top-card-body { padding: 10px 12px; }
    .top-card-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.35;
      margin-bottom: 5px;
    }
    .top-card-meta { display: flex; align-items: center; gap: 6px; }
    .top-card-pref {
      font-size: 11px;
      font-weight: 600;
      color: var(--hanabi-dark);
      background: var(--hanabi-light);
      padding: 1px 7px;
      border-radius: 7px;
    }
    .top-card-date { font-size: 11px; color: var(--text-sub); }

    /* ── ALL EVENTS LIST ── */
    .all-section { margin-bottom: 40px; }
    .all-list { display: flex; flex-direction: column; gap: 8px; }
    .all-item {
      background: white;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      transition: border-color 0.1s, box-shadow 0.1s;
    }
    .all-item:hover { border-color: #ffc49e; box-shadow: 0 2px 8px rgba(224,90,0,0.08); }
    .all-item.hidden { display: none; }
    .all-date-block {
      background: var(--hanabi-light);
      border-radius: 8px;
      padding: 6px 10px;
      text-align: center;
      flex-shrink: 0;
      min-width: 54px;
    }
    .all-month { font-size: 10px; font-weight: 700; color: var(--hanabi); }
    .all-day { font-size: 22px; font-weight: 800; color: var(--hanabi-dark); line-height: 1.1; }
    .all-dow { font-size: 10px; color: var(--text-sub); }
    .all-info { flex: 1; min-width: 0; }
    .all-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; line-height: 1.3; }
    .all-tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .all-pref {
      background: var(--hanabi-light);
      color: var(--hanabi-dark);
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 8px;
    }
    .all-note { font-size: 11px; color: var(--text-sub); }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="header-inner">
    <a class="logo" href="../">
      <span>🌸</span>
      <span>Junlando</span>
    </a>
    <nav class="header-links">
      <a href="../">花卉預測</a>
      <a href="https://community.junlando.com" target="_blank" rel="noopener">旅遊論壇</a>
      <a href="https://community.junlando.com/coupon" target="_blank" rel="noopener" class="btn-primary">優惠券</a>
    </nav>
  </div>
</header>

<!-- ── HERO ── -->
<div class="hanabi-hero">
  <div class="hanabi-hero-inner">
    <div class="hanabi-hero-emoji">🎆</div>
    <h1 class="hanabi-hero-title">2026 日本花火大會</h1>
    <p class="hanabi-hero-sub">收錄全國主要花火祭典，點選日期查看當天活動</p>
    <div class="hanabi-stats" id="heroStats">
      <span class="hanabi-stat-pill" id="statCount">⏳ 載入中</span>
      <span class="hanabi-stat-pill" id="statRange">📅 —</span>
      <span class="hanabi-stat-pill" id="statPref">🏔 — 個縣市</span>
    </div>
  </div>
</div>

<!-- ── TAB BAR ── -->
<div class="selector-wrap">
  <div class="flower-tabs">
    <a class="flower-tab" href="../?flower=sakura">🌸 櫻花</a>
    <a class="flower-tab" href="../?flower=ajisai">💠 繡球花</a>
    <a class="flower-tab" href="../?flower=koyo">🍁 紅葉</a>
    <a class="flower-tab active" href="./index.html">🎆 花火大會</a>
  </div>
</div>

<!-- ── MAIN ── -->
<div class="main">

  <!-- SECTION 1: Calendar -->
  <div class="cal-section">
    <div class="section-hd">
      <div class="section-title">📅 花火大會月曆</div>
      <div class="section-sub" id="calSubLabel"></div>
    </div>

    <!-- Month nav -->
    <div class="cal-nav">
      <button class="cal-nav-btn" id="btnPrev" onclick="changeMonth(-1)">‹</button>
      <div class="cal-month-label" id="monthLabel">—</div>
      <button class="cal-nav-btn" id="btnNext" onclick="changeMonth(1)">›</button>
    </div>

    <!-- Calendar grid -->
    <div class="cal-wrap">
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- Event panel (appears below calendar) -->
    <div id="eventPanel"></div>
  </div>

  <!-- SECTION 2: Map -->
  <div class="map-section">
    <div class="section-hd">
      <div class="section-title">🗾 縣市地圖</div>
      <button class="map-clear-btn" id="mapClearBtn" onclick="clearPrefFilter()">清除篩選</button>
    </div>
    <div class="map-body">
      <div class="map-outer">
        <div class="map-svg-area" id="mapSvgArea"></div>
      </div>
      <div class="pref-chips-row">
        <span class="pref-chips-label">縣市</span>
        <div id="prefChips" style="display:contents"></div>
        <button class="map-clear-btn" id="mapClearBtn" onclick="clearPrefFilter()">✕ 清除</button>
      </div>
    </div>
  </div>

  <!-- SECTION 3: Top Picks -->
  <div class="top-section">
    <div class="section-hd">
      <div class="section-title">🏆 人氣花火大會精選</div>
      <div class="section-sub">不可錯過的經典場次</div>
    </div>
    <div class="top-scroll-wrap">
      <div class="top-scroll" id="topScroll"></div>
    </div>
  </div>

  <!-- SECTION 4: All Events -->
  <div class="all-section">
    <div class="section-hd">
      <div class="section-title">🎇 全部場次一覽</div>
      <div class="section-sub" id="allSubLabel"></div>
    </div>
    <div class="all-list" id="allList"></div>
  </div>

</div><!-- /main -->

<script>
const DOW_ZH  = ['日','一','二','三','四','五','六'];
const MONTH_ZH = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

// Prefecture key → JP SVG id map
const JP_ID_MAP = {
  'JP-01':'hokkaido','JP-02':'aomori','JP-03':'iwate','JP-04':'miyagi',
  'JP-05':'akita','JP-06':'yamagata','JP-07':'fukushima','JP-08':'ibaraki',
  'JP-09':'tochigi','JP-10':'gunma','JP-11':'saitama','JP-12':'chiba',
  'JP-13':'tokyo','JP-14':'kanagawa','JP-15':'niigata','JP-16':'toyama',
  'JP-17':'ishikawa','JP-18':'fukui','JP-19':'yamanashi','JP-20':'nagano',
  'JP-21':'gifu','JP-22':'shizuoka','JP-23':'aichi','JP-24':'mie',
  'JP-25':'shiga','JP-26':'kyoto','JP-27':'osaka','JP-28':'hyogo',
  'JP-29':'nara','JP-30':'wakayama','JP-31':'tottori','JP-32':'shimane',
  'JP-33':'okayama','JP-34':'hiroshima','JP-35':'yamaguchi','JP-36':'tokushima',
  'JP-37':'kagawa','JP-38':'ehime','JP-39':'kochi','JP-40':'fukuoka',
  'JP-41':'saga','JP-42':'nagasaki','JP-43':'kumamoto','JP-44':'oita',
  'JP-45':'miyazaki','JP-46':'kagoshima','JP-47':'okinawa'
};

// Featured / top picks (id list, in order)
const TOP_PICKS = [
  '001', // 隅田川
  '016', // 長岡（8/2）
  '032', // 大曲花火
  '048', // 足立之花火
  '029', // 諏訪湖
  '020', // 琵琶湖
  '002', // 天神祭
  '031', // 熊野
  '035', // 片貝（9/12）
  '044', // 琉球海炎祭
  '041', // 東京灣
  '042', // 土浦
];

let EVENTS = [];
let activePref = null;
let activeDate = null;

// Month navigation: store available months
let months = [];   // ['2026-07', '2026-08', ...]
let monthIdx = 0;  // current index

// ── INIT ────────────────────────────────────────────────────────────────
async function init() {
  const res = await fetch('./data/events.json');
  EVENTS = await res.json();

  // Build sorted month list (include months covered by long-running events)
  const mSet = new Set(EVENTS.map(e => e.date.slice(0,7)));
  EVENTS.filter(e => e.endDate).forEach(e => {
    const end = new Date(e.endDate + 'T00:00:00');
    let cur = new Date(e.date + 'T00:00:00');
    cur = new Date(cur.getFullYear(), cur.getMonth(), 1);
    while (cur <= end) {
      mSet.add(`${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}`);
      cur = new Date(cur.getFullYear(), cur.getMonth()+1, 1);
    }
  });
  months = [...mSet].sort();

  // Default to first month, auto-select first event date
  monthIdx = 0;
  autoSelectFirst();

  // Update hero stats dynamically
  const sorted = [...EVENTS].sort((a,b) => a.date.localeCompare(b.date));
  const firstDate = new Date(sorted[0].date + 'T00:00:00');
  const lastDate  = new Date(sorted[sorted.length-1].date + 'T00:00:00');
  const prefCount = new Set(EVENTS.map(e => e.ken)).size;
  document.getElementById('statCount').textContent = `🗾 ${EVENTS.length} 場花火大會`;
  document.getElementById('statRange').textContent =
    `📅 ${firstDate.getMonth()+1}月 ～ ${lastDate.getMonth()+1}月`;
  document.getElementById('statPref').textContent = `🏔 ${prefCount} 個縣市`;

  renderCalendar();
  loadMap();
  buildPrefChips();
  renderTopPicks();
  renderAllList();
}

// ── CALENDAR ─────────────────────────────────────────────────────────────
function getMonthEvents() {
  const ym = months[monthIdx];
  // Exclude long-running events (endDate set) from the per-date count
  return EVENTS.filter(e =>
    !e.endDate && e.date.startsWith(ym) && (!activePref || e.ken === activePref)
  );
}

// Long-running events that overlap with current month
function getLongRunningEvents() {
  const ym = months[monthIdx];
  const [y, m] = ym.split('-').map(Number);
  const monthStart = new Date(y, m-1, 1);
  const monthEnd   = new Date(y, m, 0);
  return EVENTS.filter(e => {
    if (!e.endDate) return false;
    if (activePref && e.ken !== activePref) return false;
    const start = new Date(e.date    + 'T00:00:00');
    const end   = new Date(e.endDate + 'T00:00:00');
    return start <= monthEnd && end >= monthStart;
  });
}

// Auto-select first event date of current month (if none active)
function autoSelectFirst() {
  const ym = months[monthIdx];
  const [y, m] = ym.split('-').map(Number);
  const daysInMonth = new Date(y, m, 0).getDate();
  const byDate = {};
  EVENTS.filter(e => !e.endDate && e.date.startsWith(ym) && (!activePref || e.ken === activePref))
    .forEach(e => { if (!byDate[e.date]) byDate[e.date] = []; byDate[e.date].push(e); });

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if (byDate[dateStr]?.length) { activeDate = dateStr; return; }
  }
  activeDate = null; // no events this month
}

function renderCalendar() {
  const ym = months[monthIdx];
  const [y, m] = ym.split('-').map(Number);

  const monthEvts = getMonthEvents();

  // Nav buttons
  document.getElementById('btnPrev').disabled = (monthIdx <= 0);
  document.getElementById('btnNext').disabled = (monthIdx >= months.length - 1);

  // Month label
  const longCount = getLongRunningEvents().length;
  let badgeText = monthEvts.length ? `${monthEvts.length} 場` : '';
  if (longCount) badgeText += (badgeText ? ' + ' : '') + `常駐 ${longCount}`;
  document.getElementById('monthLabel').innerHTML =
    `${y}年 ${MONTH_ZH[m-1]} <span class="cal-month-badge">${badgeText || '—'}</span>`;

  document.getElementById('calSubLabel').textContent =
    activePref ? `篩選：${EVENTS.find(e=>e.ken===activePref)?.location || ''}` : '';

  // Build date map
  const byDate = {};
  monthEvts.forEach(e => {
    if (!byDate[e.date]) byDate[e.date] = [];
    byDate[e.date].push(e);
  });

  // Long-running banner (before grid)
  const calWrap = document.querySelector('.cal-wrap');
  calWrap.querySelector('.cal-long-banner')?.remove();
  const longEvtsNow = getLongRunningEvents();
  if (longEvtsNow.length) {
    const banner = document.createElement('div');
    banner.className = 'cal-long-banner';
    banner.innerHTML = `🏮 本月常駐：<span class="cal-long-banner-names">${longEvtsNow.map(e=>e.name).join('、')}</span>`;
    calWrap.insertBefore(banner, calWrap.firstChild);
  }

  // Render grid
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // DOW headers
  ['日','一','二','三','四','五','六'].forEach((d,i) => {
    const el = document.createElement('div');
    el.className = 'cal-dow' + (i===0?' sun':i===6?' sat':'');
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(y, m-1, 1).getDay();
  const daysInMonth = new Date(y, m, 0).getDate();

  for (let i=0; i<firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }

  for (let d=1; d<=daysInMonth; d++) {
    const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const evts = byDate[dateStr] || [];
    const dow = new Date(y, m-1, d).getDay();

    const el = document.createElement('div');
    el.className = 'cal-day'
      + (evts.length ? ' has-event' : '')
      + (dow===0 ? ' sun' : dow===6 ? ' sat' : '')
      + (dateStr===activeDate ? ' active-day' : '');

    if (evts.length > 0) {
      el.innerHTML = `<span>${d}</span><span class="cal-count">${evts.length}場</span>`;
    } else {
      el.textContent = d;
    }

    if (evts.length) {
      el.addEventListener('click', () => toggleDate(dateStr, evts));
    }
    grid.appendChild(el);
  }

  // Render event panel
  renderEventPanel();
}

function toggleDate(dateStr, events) {
  if (activeDate === dateStr) {
    activeDate = null;
  } else {
    activeDate = dateStr;
  }
  renderCalendar();
}

function renderEventPanel() {
  const panel = document.getElementById('eventPanel');
  panel.innerHTML = '';

  // ── Regular date events ──
  if (activeDate) {
    const ym = months[monthIdx];
    const byDate = {};
    EVENTS.filter(e => !e.endDate && e.date.startsWith(ym) && (!activePref || e.ken === activePref))
      .forEach(e => { if (!byDate[e.date]) byDate[e.date] = []; byDate[e.date].push(e); });

    const evts = byDate[activeDate] || [];
    if (evts.length) {
      const d = new Date(activeDate + 'T00:00:00');
      const label = `${d.getMonth()+1}月${d.getDate()}日（${DOW_ZH[d.getDay()]}）`;
      const el = document.createElement('div');
      el.innerHTML = `
        <div class="event-panel">
          <div class="event-panel-hd">🎆 ${label}の花火大會（${evts.length}場）</div>
          <div class="event-list">
            ${evts.map(e => `
              <div class="event-item">
                <div class="event-icon">🎇</div>
                <div class="event-info">
                  <div class="event-name">${e.name}</div>
                  <div class="event-meta">
                    <span class="event-pref-tag">${e.location}</span>
                    ${e.note ? `<span class="event-note">${e.note}</span>` : ''}
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
      panel.appendChild(el);
    }
  }

  // ── Long-running events ──
  const longEvts = getLongRunningEvents();
  if (longEvts.length) {
    const el = document.createElement('div');
    el.innerHTML = `
      <div class="event-panel long-running-panel">
        <div class="event-panel-hd long-running-hd">🏮 本月常駐花火（${longEvts.length}場）</div>
        <div class="event-list">
          ${longEvts.map(e => {
            const s = new Date(e.date    + 'T00:00:00');
            const en= new Date(e.endDate + 'T00:00:00');
            const range = `${s.getMonth()+1}/${s.getDate()} ～ ${en.getMonth()+1}/${en.getDate()}`;
            return `
              <div class="event-item">
                <div class="event-icon">🏮</div>
                <div class="event-info">
                  <div class="event-name">${e.name}</div>
                  <div class="event-meta">
                    <span class="event-pref-tag">${e.location}</span>
                    <span class="event-note">${range} 每晚舉辦</span>
                    ${e.note ? `<span class="event-note">${e.note}</span>` : ''}
                  </div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
    panel.appendChild(el);
  }
}

function changeMonth(dir) {
  monthIdx = Math.max(0, Math.min(months.length-1, monthIdx + dir));
  autoSelectFirst();
  renderCalendar();
}

// ── MAP ───────────────────────────────────────────────────────────────────
function loadMap() {
  fetch('../japan.svg')
    .then(r => r.text())
    .then(svgText => {
      const area = document.getElementById('mapSvgArea');
      area.innerHTML = svgText;
      const eventKens = new Set(EVENTS.map(e => e.ken));
      area.querySelectorAll('path[id]').forEach(path => {
        const ken = JP_ID_MAP[path.id];
        if (!ken) return;
        if (eventKens.has(ken)) {
          path.classList.add('has-event');
          path.addEventListener('click', () => togglePrefFilter(ken));
        } else {
          path.classList.add('no-event');
        }
      });

      // Legend overlay
      const legend = document.createElement('div');
      legend.className = 'map-legend-box';
      legend.innerHTML = `
        <div class="map-legend-row">
          <div class="map-legend-swatch" style="background:var(--hanabi)"></div>
          <span>有花火大會</span>
        </div>
        <div class="map-legend-row">
          <div class="map-legend-swatch" style="background:#d1d5db"></div>
          <span>無活動</span>
        </div>
      `;
      area.appendChild(legend);
    });
}

function togglePrefFilter(ken) {
  activePref = (activePref === ken) ? null : ken;
  activeDate = null;

  // Update map
  document.querySelectorAll('#mapSvgArea path').forEach(p => {
    p.classList.toggle('selected-pref', JP_ID_MAP[p.id] === activePref && activePref !== null);
  });

  // Update chips
  document.querySelectorAll('.pref-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.ken === activePref);
  });

  const clearBtn = document.getElementById('mapClearBtn');
  clearBtn.classList.toggle('visible', activePref !== null);

  // If new pref doesn't have events in current month, jump to first month with its events
  if (activePref) {
    const firstMonthWithPref = months.findIndex(ym =>
      EVENTS.some(e => e.ken === activePref && e.date.startsWith(ym))
    );
    if (firstMonthWithPref >= 0) monthIdx = firstMonthWithPref;
  }

  autoSelectFirst();
  renderCalendar();
  renderAllList();
}

function clearPrefFilter() {
  activePref = null;
  activeDate = null;
  document.querySelectorAll('#mapSvgArea path').forEach(p => p.classList.remove('selected-pref'));
  document.querySelectorAll('.pref-chip').forEach(c => c.classList.remove('active'));
  document.getElementById('mapClearBtn').classList.remove('visible');
  renderCalendar();
  renderAllList();
}

// ── PREF CHIPS ────────────────────────────────────────────────────────────
function buildPrefChips() {
  const wrap = document.getElementById('prefChips');
  const counts = {};
  EVENTS.forEach(e => {
    counts[e.ken] = counts[e.ken] || { ken: e.ken, location: e.location, count: 0 };
    counts[e.ken].count++;
  });
  const sorted = Object.values(counts).sort((a,b) => b.count - a.count);
  sorted.forEach(({ ken, location, count }) => {
    const chip = document.createElement('div');
    chip.className = 'pref-chip';
    chip.dataset.ken = ken;
    const shortName = location.replace(/[都道府縣]/g,'');
    chip.textContent = `${shortName} ${count}`;
    chip.addEventListener('click', () => togglePrefFilter(ken));
    wrap.appendChild(chip);
  });
}

// ── TOP PICKS ─────────────────────────────────────────────────────────────
function renderTopPicks() {
  const scroll = document.getElementById('topScroll');
  TOP_PICKS.forEach((id, i) => {
    const e = EVENTS.find(ev => ev.id === id);
    if (!e) return;
    const d = new Date(e.date + 'T00:00:00');
    const dateStr = `${d.getMonth()+1}/${d.getDate()}（${DOW_ZH[d.getDay()]}）`;

    const card = document.createElement('div');
    card.className = 'top-card';
    card.innerHTML = `
      <div class="top-card-img">
        <span class="top-card-rank">#${i+1}</span>
        🎆
      </div>
      <div class="top-card-body">
        <div class="top-card-name">${e.name}</div>
        <div class="top-card-meta">
          <span class="top-card-pref">${e.location.replace(/[都道府縣]/g,'')}</span>
          <span class="top-card-date">${dateStr}</span>
        </div>
      </div>
    `;
    card.addEventListener('click', () => {
      // Jump to the month and highlight the date
      const ym = e.date.slice(0,7);
      monthIdx = months.indexOf(ym);
      activePref = null;
      activeDate = e.date;
      document.querySelectorAll('.pref-chip').forEach(c => c.classList.remove('active'));
      document.getElementById('mapClearBtn').classList.remove('visible');
      document.querySelectorAll('#mapSvgArea path').forEach(p => p.classList.remove('selected-pref'));
      renderCalendar();
      document.querySelector('.cal-section').scrollIntoView({ behavior:'smooth', block:'start' });
    });
    scroll.appendChild(card);
  });

  // Drag scroll
  let isDown = false, startX, scrollLeft;
  scroll.addEventListener('mousedown', e => {
    isDown = true; scroll.classList.add('dragging');
    startX = e.pageX - scroll.offsetLeft;
    scrollLeft = scroll.scrollLeft;
  });
  scroll.addEventListener('mouseleave', () => { isDown = false; scroll.classList.remove('dragging'); });
  scroll.addEventListener('mouseup', () => { isDown = false; scroll.classList.remove('dragging'); });
  scroll.addEventListener('mousemove', e => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - scroll.offsetLeft;
    scroll.scrollLeft = scrollLeft - (x - startX) * 1.2;
  });
}

// ── ALL LIST ──────────────────────────────────────────────────────────────
function renderAllList() {
  const list = document.getElementById('allList');
  list.innerHTML = '';

  const filtered = EVENTS.filter(e => !activePref || e.ken === activePref);
  document.getElementById('allSubLabel').textContent =
    activePref ? `${filtered.length} 場` : `共 ${EVENTS.length} 場`;

  filtered.sort((a,b) => a.date.localeCompare(b.date)).forEach(e => {
    const d = new Date(e.date + 'T00:00:00');
    const dow = DOW_ZH[d.getDay()];

    const item = document.createElement('div');
    item.className = 'all-item';
    item.innerHTML = `
      <div class="all-date-block">
        <div class="all-month">${d.getMonth()+1}月</div>
        <div class="all-day">${d.getDate()}</div>
        <div class="all-dow">${dow}</div>
      </div>
      <div class="all-info">
        <div class="all-name">${e.name}</div>
        <div class="all-tags">
          <span class="all-pref">${e.location}</span>
          ${e.note ? `<span class="all-note">${e.note}</span>` : ''}
        </div>
      </div>
    `;
    list.appendChild(item);
  });
}

// ── START ─────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
