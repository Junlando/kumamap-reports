<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 日本花火大會日曆｜全國花火祭典行程・地圖一覽｜Junlando</title>
  <meta name="description" content="2026 日本花火大會完整日曆！收錄隅田川、大曲、長岡等全國 50 場花火祭典，依日期與縣市查詢，輕鬆規劃日本夏祭旅行。" />
  <meta property="og:title" content="2026 日本花火大會日曆｜Junlando" />
  <meta property="og:description" content="2026 全國 50 場花火祭典，依日期與縣市查詢，規劃夏祭旅行首選。" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://junlando.com/blossom/hanabi/" />
  <meta property="og:image" content="https://junlando.com/blossom/hanabi/images/001/1.jpg" />
  <link rel="canonical" href="https://junlando.com/blossom/hanabi/" />
  <link rel="icon" href="../../favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --hanabi: #e05a00;
      --hanabi-dark: #b84400;
      --hanabi-light: #fff4ee;
      --hanabi-gold: #f5a623;
      --gray: #f5f6f8;
      --border: #e8e9ec;
      --text: #1a1a2e;
      --text-sub: #6b7280;
      --radius: 12px;
    }

    body {
      font-family: 'Inter', 'Noto Sans JP', -apple-system, sans-serif;
      background: #fafbfc;
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: white;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
      height: 58px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
      font-size: 18px;
      flex-shrink: 0;
    }
    .header-links {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .header-links a {
      padding: 6px 12px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 13px;
      color: var(--text-sub);
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
    }
    .header-links a:hover { background: var(--gray); color: var(--text); }
    .header-links .btn-primary { background: var(--text); color: white; margin-left: 4px; }
    .header-links .btn-primary:hover { background: #2d2d4e; }

    /* ── HERO ── */
    .hanabi-hero {
      position: relative;
      overflow: hidden;
      background: #0a0a0a;
      min-height: 210px;
      display: flex;
      align-items: center;
      padding: 0;
    }
    .hanabi-hero-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      opacity: 0.92;
      display: block;
    }
    .hanabi-hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom,
        rgba(0,0,0,0.15) 0%,
        rgba(0,0,0,0.35) 100%);
      pointer-events: none;
    }
    .hanabi-hero-inner { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; padding: 20px; text-align: center; width: 100%; }
.hanabi-hero-title {
      font-size: 46px;
      font-weight: 800;
      margin-bottom: 6px;
      line-height: 1.25;
      position: relative;
      color: white;
      -webkit-text-stroke: 6px white;
      word-break: keep-all;
    }
    .hanabi-hero-title::before {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, #ffaa00 0%, #dd2200 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      -webkit-text-stroke: 0px transparent;
      z-index: 1;
    }
    .hanabi-hero-sub {
      font-size: 17px;
      color: white;
      margin-bottom: 18px;
    }
    .hanabi-stats {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .hanabi-stat-pill {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 15px;
      font-weight: 600;
      color: rgba(255,255,255,0.88);
    }
    @media (max-width: 600px) {
      /* Hero */
      .hanabi-hero { min-height: 170px; }
      .hanabi-hero-title { font-size: 42px; -webkit-text-stroke: 5px white; }
      .hanabi-hero-inner { padding: 14px 16px; }
      .hanabi-hero-sub { font-size: 13px; white-space: nowrap; margin-bottom: 10px; }
      .hanabi-stat-pill { font-size: 13px; padding: 5px 12px; }
    }

    /* ── TAB BAR ── */
    .selector-wrap { background: #e05a00; }
    .flower-tabs {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      padding: 0 12px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .flower-tabs::-webkit-scrollbar { display: none; }
    .flower-tab {
      padding: 13px 20px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.75);
      transition: color 0.15s, background 0.15s;
      position: relative;
      white-space: nowrap;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .flower-tab:hover { color: white; background: rgba(0,0,0,0.1); }
    .flower-tab.active { color: white; background: rgba(0,0,0,0.15); }
    .flower-tab.active::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: rgba(255,255,255,0.9);
      border-radius: 3px 3px 0 0;
    }
    @media (max-width: 600px) {
      /* Tab — mirror 花卉 mobile */
      .flower-tabs { padding: 0; }
      .flower-tab { flex: 1; padding: 11px 6px; font-size: 12px; text-align: center; white-space: normal; }
    }

    /* ── MAIN ── */
    .main { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }

    /* ── SECTION HEADER ── */
    .section-hd {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding-bottom: 12px;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--border);
    }
    .section-title {
      font-size: 23px;
      font-weight: 800;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-sub {
      font-size: 13px;
      color: var(--text-sub);
    }

    /* ── CALENDAR SECTION ── */
    .cal-section { margin-bottom: 40px; }

    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 12px;
      max-width: 640px;
      margin-left: auto;
      margin-right: auto;
    }
    .cal-nav-btn {
      width: 40px;
      height: 40px;
      border: 1.5px solid var(--border);
      background: white;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      transition: background 0.12s, border-color 0.12s;
      flex-shrink: 0;
    }
    .cal-nav-btn:hover { background: var(--hanabi-light); border-color: var(--hanabi); }
    .cal-nav-btn:disabled { opacity: 0.3; cursor: default; }
    .cal-nav-btn:disabled:hover { background: white; border-color: var(--border); }
    .cal-month-label {
      min-width: 180px;
      text-align: center;
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .cal-month-badge {
      background: var(--hanabi-light);
      color: var(--hanabi);
      font-size: 12px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 12px;
    }

    .cal-wrap {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px 16px;
      max-width: 640px;
      margin: 0 auto;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .cal-dow {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-sub);
      padding: 4px 0 6px;
    }
    .cal-dow.sun { color: #ef4444; }
    .cal-dow.sat { color: #3b82f6; }
    .cal-day {
      height: 52px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: default;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-sub);
      transition: background 0.1s;
    }
    .cal-day.empty { pointer-events: none; }
    .cal-day.has-event {
      background: var(--hanabi-light);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
      border: 1.5px solid #ffc49e;
    }
    .cal-day.has-event:hover { background: #ffe0cc; border-color: var(--hanabi); }
    .cal-day.active-day {
      background: var(--hanabi) !important;
      color: white !important;
      border-color: var(--hanabi-dark) !important;
    }
    .cal-day.sun { color: #ef4444; }
    .cal-day.has-event.sun { color: #c41c1c; }
    .cal-day.active-day { color: white !important; }
    .cal-day.sat { color: #3b82f6; }
    .cal-day.has-event.sat { color: #1d4ed8; }
    .cal-count {
      font-size: 11px;
      font-weight: 700;
      color: var(--hanabi);
      line-height: 1;
      margin-top: 1px;
    }
    .cal-day.active-day .cal-count { color: rgba(255,255,255,0.85); }
    .cal-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--hanabi);
      margin-top: 2px;
    }
    .cal-day.active-day .cal-dot { background: white; }

    /* ── EVENT PANEL ── */
    .event-panel {
      margin-top: 12px;
      background: white;
      border: 1.5px solid var(--hanabi);
      border-radius: var(--radius);
      overflow: hidden;
      animation: slideDown 0.18s ease;
    }
    @keyframes slideDown {
      from { opacity:0; transform:translateY(-5px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .event-panel-hd {
      background: var(--hanabi);
      color: white;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 700;
    }
    .long-running-panel { margin-top: 8px; border-color: #9b6a00; }
    .long-running-hd { background: #7a5200; }

    /* Banner inside calendar for long-running months */
    .cal-long-banner {
      margin-bottom: 10px;
      background: #fff8ec;
      border: 1.5px solid #f0c060;
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 12px;
      color: #7a5200;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .cal-long-banner-names { font-weight: 400; color: #5a3a00; }

    .event-list { padding: 4px 0; }
    .event-item {
      padding: 0;
      display: flex;
      align-items: stretch;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      transition: background 0.1s;
      overflow: hidden;
    }
    .event-item:last-child { border-bottom: none; }
    .event-item:hover { background: var(--hanabi-light); }
    .event-icon { font-size: 20px; flex-shrink: 0; line-height: 1; margin-top: 1px; }
    .event-info { flex: 1; min-width: 0; padding: 11px 0 11px 16px; }
    .event-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
    .event-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .event-pref-tag {
      background: var(--hanabi-light);
      color: var(--hanabi-dark);
      padding: 1px 8px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 11px;
    }
    .event-note { font-size: 13px; color: var(--text-sub); font-style: italic; }
    .event-thumb {
      width: 110px;
      align-self: stretch;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--gray);
      display: block;
    }

    /* ── CAL + MAP SIDE-BY-SIDE ── */
    .cal-map-section { margin-bottom: 40px; }
    .cal-map-layout { display: flex; gap: 20px; align-items: stretch; }
    .cal-side { flex: 1; min-width: 0; }
    .cal-side .cal-wrap { max-width: none; margin: 0; }
    /* map-side: square — width = height (= cal-side height) */
    .map-side { flex: 0 0 auto; aspect-ratio: 1 / 1; display: flex; flex-direction: column; }
    #eventPanel { margin-top: 12px; }
    @media (max-width: 800px) {
      .cal-map-layout { flex-direction: column; }
      .map-side { flex: none; width: 100%; aspect-ratio: 437 / 516; }
    }
    @media (max-width: 600px) {
      .map-side { display: none; }
    }
    .map-side-inner {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .map-outer { flex: 1; overflow: hidden; background: url('images/map-bg.png') center/cover no-repeat; padding: 10px; }
    .map-svg-area { position: relative; width: 100%; height: 100%; }
    .map-svg-area svg { width: 100%; height: 100%; display: block; }
    .map-svg-area path { stroke: white; stroke-width: 0.8; transition: fill 0.15s, opacity 0.12s; }
    .map-svg-area path.map-no-event   { fill: #8eafc2; cursor: default; }
    .map-svg-area path.map-month-event { fill: #fde047; opacity: 1; cursor: pointer; }
    .map-svg-area path.map-month-event:hover { opacity: 0.85; }
    .map-svg-area path.map-date-event  { fill: var(--hanabi); opacity: 1; cursor: pointer; }
    .map-svg-area path.map-date-event:hover { opacity: 0.85; }
    .map-svg-area path.map-selected    { fill: var(--hanabi-dark) !important; opacity: 1 !important; }
    #mapSvgArea #JP-47 { display: none; }
    .map-legend-bar {
      display: flex; gap: 14px; flex-wrap: wrap;
      padding: 7px 12px; border-top: 1px solid var(--border);
      font-size: 11px; color: var(--text-sub); font-weight: 600;
    }
    .map-legend-bar span { display: flex; align-items: center; gap: 5px; }
    .map-legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

    /* ── REGIONAL SECTION ── */
    .region-section { margin-bottom: 40px; }
    .region-groups { display: flex; flex-direction: column; gap: 10px; }
    .region-group { display: flex; align-items: baseline; flex-wrap: wrap; gap: 0; }
    .region-label {
      font-size: 15px; font-weight: 700; color: var(--text);
      min-width: 84px; flex-shrink: 0; padding-top: 5px;
    }
    .region-chips { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
    .pref-chip {
      padding: 5px 13px; border-radius: 20px; font-size: 14px; font-weight: 600;
      cursor: pointer; border: 1.5px solid var(--border); background: white;
      color: var(--text-sub); transition: all 0.12s; white-space: nowrap;
      text-decoration: none; display: inline-block;
    }
    .pref-chip.has-events { color: var(--hanabi-dark); border-color: #ffc49e; background: var(--hanabi-light); }
    .pref-chip.has-events:hover { background: #ffe0cc; border-color: var(--hanabi); }
    .pref-chip.active { background: var(--hanabi) !important; color: white !important; border-color: var(--hanabi) !important; }
    .pref-chip.no-events { opacity: 0.35; cursor: default; pointer-events: none; }
    .map-clear-btn {
      font-size: 12px; color: var(--hanabi); cursor: pointer; font-weight: 600;
      display: none; background: none; border: none; padding: 0;
    }
    .map-clear-btn.visible { display: inline; }

    /* ── TOP PICKS ── */
    .top-section { margin-bottom: 40px; }
    .top-scroll-wrap { position: relative; }
    .top-scroll {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      padding-bottom: 6px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      cursor: grab;
      user-select: none;
    }
    .top-scroll.dragging { cursor: grabbing; }
    .top-scroll::-webkit-scrollbar { display: none; }
    .top-card {
      flex-shrink: 0;
      width: 280px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: white;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .top-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.13); }
    .top-card-img {
      width: 100%;
      height: 210px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      background: linear-gradient(135deg, #2d0a00, #8b2a00);
    }
    .top-card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .top-card-img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2d0a00, #8b2a00);
      color: rgba(255,255,255,0.35);
      font-size: 13px;
      letter-spacing: 0.5px;
    }
    .top-card-body { padding: 10px 13px 12px; display: flex; flex-direction: column; gap: 3px; }
    .top-card-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }
    .top-card-meta { display: flex; align-items: center; gap: 6px; }
    .top-card-pref {
      font-size: 12px;
      font-weight: 600;
      color: var(--hanabi-dark);
      background: var(--hanabi-light);
      padding: 1px 7px;
      border-radius: 7px;
      flex-shrink: 0;
    }
    .top-card-date { font-size: 12px; color: var(--text-sub); }

    /* ── ALL EVENTS LIST ── */
    .all-section { margin-bottom: 40px; }
    .all-list { display: flex; flex-direction: column; gap: 8px; }
    .all-item {
      background: white;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 10px 10px 14px;
      display: flex;
      gap: 12px;
      align-items: center;
      transition: border-color 0.1s, box-shadow 0.1s;
      text-decoration: none;
      color: inherit;
      overflow: hidden;
    }
    .all-item:hover { border-color: #ffc49e; box-shadow: 0 2px 8px rgba(224,90,0,0.08); }
    .all-item.hidden { display: none; }
    .all-date-block {
      background: var(--hanabi-light);
      border-radius: 8px;
      padding: 6px 10px;
      text-align: center;
      flex-shrink: 0;
      min-width: 54px;
    }
    .all-month { font-size: 11px; font-weight: 700; color: var(--hanabi); }
    .all-day { font-size: 24px; font-weight: 800; color: var(--hanabi-dark); line-height: 1.1; }
    .all-dow { font-size: 11px; color: var(--text-sub); }
    .all-info { flex: 1; min-width: 0; }
    .all-name { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 4px; line-height: 1.3; }
    .all-tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .all-pref {
      background: var(--hanabi-light);
      color: var(--hanabi-dark);
      font-size: 12px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 8px;
    }
    .all-note { font-size: 14px; color: var(--text-sub); }
    .all-thumb {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 8px;
      flex-shrink: 0;
      background: var(--gray);
    }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="header-inner">
    <a class="logo" href="../"><img src="../../favicon.ico" style="width:32px;height:32px;border-radius:8px;display:block" alt="Junlando" />Junlando</a>
    <nav class="header-links">
      <a href="../">花卉預測</a>
      <a href="https://community.junlando.com" target="_blank" rel="noopener">旅遊論壇</a>
      <a href="https://junlando.com/coupon/" target="_blank" rel="noopener" class="btn-primary">優惠券</a>
    </nav>
  </div>
</header>

<!-- ── HERO ── -->
<div class="hanabi-hero">
  <img class="hanabi-hero-bg" src="images/hero.jpg" alt="日本花火大會" />
  <div class="hanabi-hero-inner">

<script>

const REGIONS = [

let EVENTS = [];
let activePref = null;
let activeDate = null;

// Month navigation: store available months
let months = [];   // ['2026-07', '2026-08', ...]
let monthIdx = 0;  // current index

// ── INIT ────────────────────────────────────────────────────────────────
async function init() {
  const res = await fetch('./data/events.json');
  EVENTS = await res.json();

  // Build sorted month list — only from non-long-running events
  // (long-running 常駐 events appear as banners but don't drive month navigation)
  const mSet = new Set(EVENTS.filter(e => !isLongRunning(e)).map(e => e.date.slice(0,7)));
  months = [...mSet].sort();

  // Default to current month; if no events this month, jump to next month with events
  const todayYM = (() => { const t = new Date(); return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}`; })();
  const todayExact = months.indexOf(todayYM);
  if (todayExact >= 0) {
    monthIdx = todayExact;
  } else {
    // current month not in list — find the nearest future month
    const futureIdx = months.findIndex(ym => ym > todayYM);
    monthIdx = futureIdx >= 0 ? futureIdx : 0;
  }
  autoSelectFirst();

  // Update hero stats dynamically
  const sorted = [...EVENTS].sort((a,b) => a.date.localeCompare(b.date));
  const firstDate = new Date(sorted[0].date + 'T00:00:00');
  const lastDate  = new Date(sorted[sorted.length-1].date + 'T00:00:00');
  const prefCount = new Set(EVENTS.map(e => e.ken)).size;
  document.getElementById('statCount').textContent = `${EVENTS.length} 場花火大會`;
  document.getElementById('statRange').textContent =
    `${firstDate.getMonth()+1}月 ～ ${lastDate.getMonth()+1}月`;
  document.getElementById('statPref').textContent = `${prefCount} 個縣市`;

  renderCalendar();
  loadMap();
  buildRegionalSection();
  renderUpcoming();
  renderTopPicks();
  renderAllList();
}

// ── HELPERS ──────────────────────────────────────────────────────────────
// Events with endDate > 7 days = 常駐花火；shorter = short multi-day event
function isLongRunning(ev) {
  if (!ev.endDate) return false;
  const diffMs = new Date(ev.endDate + 'T00:00:00') - new Date(ev.date + 'T00:00:00');
  return diffMs > 7 * 24 * 60 * 60 * 1000;
}

// Build a date→events map for the current month (includes short multi-day events on each day)
function buildByDate(ym) {
  const [y, m] = ym.split('-').map(Number);
  const byDate = {};
  getMonthEvents().forEach(e => {
    if (!e.endDate) {
      if (!byDate[e.date]) byDate[e.date] = [];
      byDate[e.date].push(e);
    } else {
      // Short multi-day: spread across each day within this month
      let cur = new Date(Math.max(new Date(e.date + 'T00:00:00'), new Date(y, m-1, 1)));
      const last = new Date(Math.min(new Date(e.endDate + 'T00:00:00'), new Date(y, m, 0)));
      while (cur <= last) {
        const ds = `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-${String(cur.getDate()).padStart(2,'0')}`;
        if (!byDate[ds]) byDate[ds] = [];
        if (!byDate[ds].find(x => x.id === e.id)) byDate[ds].push(e);
        cur = new Date(cur.getFullYear(), cur.getMonth(), cur.getDate() + 1);
      }
    }
  });
  return byDate;
}

// ── CALENDAR ─────────────────────────────────────────────────────────────
function getMonthEvents() {
  const ym = months[monthIdx];
  const [y, m] = ym.split('-').map(Number);
  const monthStart = new Date(y, m-1, 1);
  const monthEnd   = new Date(y, m, 0);
  return EVENTS.filter(e => {
    if (isLongRunning(e)) return false;
    if (activePref && e.ken !== activePref) return false;
    if (!e.endDate) return e.date.startsWith(ym);
    // Short multi-day: overlaps with current month
    const start = new Date(e.date + 'T00:00:00');
    const end   = new Date(e.endDate + 'T00:00:00');
    return start <= monthEnd && end >= monthStart;
  });
}

// Long-running events (> 7 days) that overlap with current month
function getLongRunningEvents() {
  const ym = months[monthIdx];
  const [y, m] = ym.split('-').map(Number);
  const monthStart = new Date(y, m-1, 1);
  const monthEnd   = new Date(y, m, 0);
  return EVENTS.filter(e => {
    if (!isLongRunning(e)) return false;
    if (activePref && e.ken !== activePref) return false;
    const start = new Date(e.date    + 'T00:00:00');
    const end   = new Date(e.endDate + 'T00:00:00');
    return start <= monthEnd && end >= monthStart;
  });
}

// Auto-select first event date of current month (if none active)
function autoSelectFirst() {
  const ym = months[monthIdx];
  const [y, m] = ym.split('-').map(Number);
  const daysInMonth = new Date(y, m, 0).getDate();
  const byDate = buildByDate(ym);
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if (byDate[dateStr]?.length) { activeDate = dateStr; return; }
  }
  activeDate = null; // no events this month
}

function renderCalendar() {
  const ym = months[monthIdx];
  const [y, m] = ym.split('-').map(Number);

  const monthEvts = getMonthEvents();

  // Nav buttons
  document.getElementById('btnPrev').disabled = (monthIdx <= 0);
  document.getElementById('btnNext').disabled = (monthIdx >= months.length - 1);

  // Month label
  const longCount = getLongRunningEvents().length;
  let badgeText = monthEvts.length ? `${monthEvts.length} 場` : '';
  if (longCount) badgeText += (badgeText ? ' + ' : '') + `常駐 ${longCount}`;
  document.getElementById('monthLabel').innerHTML =
    `${y}年 ${MONTH_ZH[m-1]} <span class="cal-month-badge">${badgeText || '—'}</span>`;

  document.getElementById('calSubLabel').textContent =
    activePref ? `篩選：${EVENTS.find(e=>e.ken===activePref)?.location || ''}` : '';

  // Build date map (handles single-day and short multi-day events)
  const byDate = buildByDate(ym);

  // Long-running banner (before grid) — always rendered to reserve space
  const calWrap = document.querySelector('.cal-wrap');
  let banner = calWrap.querySelector('.cal-long-banner');
  if (!banner) {
    banner = document.createElement('div');
    banner.className = 'cal-long-banner';
    calWrap.insertBefore(banner, calWrap.firstChild);
  }
  const longEvtsNow = getLongRunningEvents();
  if (longEvtsNow.length) {
    banner.innerHTML = `🏮 本月常駐：<span class="cal-long-banner-names">${longEvtsNow.map(e=>e.name).join('、')}</span>`;
    banner.style.visibility = 'visible';
  } else {
    banner.innerHTML = '&nbsp;';
    banner.style.visibility = 'hidden';
  }

  // Render grid
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // DOW headers
  ['日','一','二','三','四','五','六'].forEach((d,i) => {
    const el = document.createElement('div');
    el.className = 'cal-dow' + (i===0?' sun':i===6?' sat':'');
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(y, m-1, 1).getDay();
  const daysInMonth = new Date(y, m, 0).getDate();

  for (let i=0; i<firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }

  for (let d=1; d<=daysInMonth; d++) {
    const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const evts = byDate[dateStr] || [];
    const dow = new Date(y, m-1, d).getDay();

    const el = document.createElement('div');
    el.className = 'cal-day'
      + (evts.length ? ' has-event' : '')
      + (dow===0 ? ' sun' : dow===6 ? ' sat' : '')
      + (dateStr===activeDate ? ' active-day' : '');

    if (evts.length > 0) {
      el.innerHTML = `<span>${d}</span><span class="cal-count">${evts.length}場</span>`;
    } else {
      el.textContent = d;
    }

    if (evts.length) {
      el.addEventListener('click', () => toggleDate(dateStr, evts));
    }
    grid.appendChild(el);
  }

  // Always pad to 42 cells (6 rows × 7) → no layout shift between months
  const filled = firstDay + daysInMonth;
  for (let i = filled; i < 42; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }

  // Render event panel + sync map colours
  renderEventPanel();
  updateMapColors();
}

function toggleDate(dateStr, events) {
  if (activeDate === dateStr) {
    activeDate = null;
  } else {
    activeDate = dateStr;
  }
  renderCalendar();
}

function renderEventPanel() {
  const panel = document.getElementById('eventPanel');
  panel.innerHTML = '';

  // ── Regular date events ──
  if (activeDate) {
    const ym = months[monthIdx];
    const byDate = buildByDate(ym);
    const evts = byDate[activeDate] || [];
    if (evts.length) {
      const d = new Date(activeDate + 'T00:00:00');
      const label = `${d.getMonth()+1}月${d.getDate()}日（${DOW_ZH[d.getDay()]}）`;
      const el = document.createElement('div');
      el.innerHTML = `
        <div class="event-panel">
          <div class="event-panel-hd">${label}の花火大會（${evts.length}場）</div>
          <div class="event-list">
            ${evts.map(e => `
              <a class="event-item" href="spot/${e.id}.html">
                <div class="event-info">
                  <div class="event-name">${e.name}</div>
                  <div class="event-meta">
                    <span class="event-pref-tag">${e.location}</span>
                    ${e.note ? `<span class="event-note">${e.note}</span>` : ''}
                  </div>
                </div>
                <img class="event-thumb" src="images/thumb/${e.id}.jpg" alt="${e.name}" onerror="this.style.display='none'" loading="lazy" />
                <div style="color:#ccc;font-size:16px;align-self:center;flex-shrink:0;padding:0 10px">›</div>
              </a>
            `).join('')}
          </div>
        </div>
      `;
      panel.appendChild(el);
    }
  }

  // ── Long-running events ──
  const longEvts = getLongRunningEvents();
  if (longEvts.length) {
    const el = document.createElement('div');
    el.innerHTML = `
      <div class="event-panel long-running-panel">
        <div class="event-panel-hd long-running-hd">本月常駐花火（${longEvts.length}場）</div>
        <div class="event-list">
          ${longEvts.map(e => {
            const s = new Date(e.date    + 'T00:00:00');
            const en= new Date(e.endDate + 'T00:00:00');
            const range = `${s.getMonth()+1}/${s.getDate()} ～ ${en.getMonth()+1}/${en.getDate()}`;
            return `
              <a class="event-item" href="spot/${e.id}.html">
                <div class="event-info">
                  <div class="event-name">${e.name}</div>
                  <div class="event-meta">
                    <span class="event-pref-tag">${e.location}</span>
                    <span class="event-note">${range} 每晚舉辦</span>
                    ${e.note ? `<span class="event-note">${e.note}</span>` : ''}
                  </div>
                </div>
                <img class="event-thumb" src="images/thumb/${e.id}.jpg" alt="${e.name}" onerror="this.style.display='none'" loading="lazy" />
                <div style="color:#ccc;font-size:16px;align-self:center;flex-shrink:0;padding:0 10px">›</div>
              </a>
            `;
          }).join('')}
        </div>
      </div>
    `;
    panel.appendChild(el);
  }
}

function changeMonth(dir) {
  monthIdx = Math.max(0, Math.min(months.length-1, monthIdx + dir));
  autoSelectFirst();
  renderCalendar();
}

// ── MAP ───────────────────────────────────────────────────────────────────
function loadMap() {
  fetch('../japan.svg')
    .then(r => r.text())
    .then(svgText => {
      const area = document.getElementById('mapSvgArea');
      area.innerHTML = svgText;

      // Set viewBox centered on Japan's geographic centroid (~281, ~182 in SVG coords)
      // Square 380×380 window → Japan centered with minimal letterboxing
      const svgEl = area.querySelector('svg');
      if (svgEl) {
        svgEl.setAttribute('viewBox', '100 20 355 355');
        svgEl.setAttribute('width',  '100%');
        svgEl.setAttribute('height', '100%');
        svgEl.setAttribute('preserveAspectRatio', 'xMidYMid meet');
      }

      const eventKens = new Set(EVENTS.map(e => e.ken));
      area.querySelectorAll('path[id]').forEach(path => {
        const ken = JP_ID_MAP[path.id];
        if (!ken) return;
        if (eventKens.has(ken)) {
          path.addEventListener('click', () => { location.href = `pref/${ken}.html`; });
        }
      });
      updateMapColors();
    });
}

function updateMapColors() {
  const area = document.getElementById('mapSvgArea');
  if (!area || !area.querySelector('svg')) return;

  const ym = months[monthIdx];
  const [y, m] = ym.split('-').map(Number);
  const monthStart = new Date(y, m-1, 1);
  const monthEnd   = new Date(y, m, 0);

  // Kens with non-long-running events this month
  const monthKens = new Set(
    EVENTS.filter(e => {
      if (isLongRunning(e)) return false;
      if (!e.endDate) return e.date.startsWith(ym);
      const s = new Date(e.date    + 'T00:00:00');
      const en= new Date(e.endDate + 'T00:00:00');
      return s <= monthEnd && en >= monthStart;
    }).map(e => e.ken)
  );

  // Kens with events on the active date
  const dateKens = new Set();
  if (activeDate) {
    (buildByDate(ym)[activeDate] || []).forEach(e => dateKens.add(e.ken));
  }

  area.querySelectorAll('path[id]').forEach(path => {
    const ken = JP_ID_MAP[path.id];
    if (!ken) return;
    path.classList.remove('map-no-event','map-month-event','map-date-event','map-selected');
    if (activePref === ken) {
      path.classList.add('map-selected');
    } else if (dateKens.has(ken)) {
      path.classList.add('map-date-event');
    } else if (monthKens.has(ken)) {
      path.classList.add('map-month-event');
    } else {
      path.classList.add('map-no-event');
    }
  });
}

function togglePrefFilter(ken) {
  activePref = (activePref === ken) ? null : ken;
  activeDate = null;

  // Update region chips
  document.querySelectorAll('.pref-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.ken === activePref);
  });
  document.getElementById('mapClearBtn').classList.toggle('visible', activePref !== null);

  // If new pref doesn't have events in current month, jump to first month with its events
  if (activePref) {
    const firstMonthWithPref = months.findIndex(ym =>
      EVENTS.some(e => e.ken === activePref && e.date.startsWith(ym))
    );
    if (firstMonthWithPref >= 0) monthIdx = firstMonthWithPref;
  }

  autoSelectFirst();
  renderCalendar();
  renderAllList();
}

function clearPrefFilter() {
  activePref = null;
  activeDate = null;
  document.querySelectorAll('.pref-chip').forEach(c => c.classList.remove('active'));
  document.getElementById('mapClearBtn').classList.remove('visible');
  renderCalendar();
  renderAllList();
}

// ── REGIONAL SECTION ─────────────────────────────────────────────────────
function buildRegionalSection() {
  const eventKens = new Set(EVENTS.map(e => e.ken));
  const counts = {};
  EVENTS.forEach(e => { counts[e.ken] = (counts[e.ken] || 0) + 1; });
  const container = document.getElementById('regionGroups');

  REGIONS.forEach(region => {
    const group = document.createElement('div');
    group.className = 'region-group';

    const label = document.createElement('div');
    label.className = 'region-label';
    label.textContent = region.label;
    group.appendChild(label);

    const chips = document.createElement('div');
    chips.className = 'region-chips';
    region.prefs.forEach(pref => {
      const hasEvents = eventKens.has(pref.ken);
      const chip = hasEvents ? document.createElement('a') : document.createElement('div');
      chip.className = 'pref-chip ' + (hasEvents ? 'has-events' : 'no-events');
      chip.dataset.ken = pref.ken;
      chip.textContent = hasEvents ? `${pref.name} ${counts[pref.ken]}` : pref.name;
      if (hasEvents) chip.href = `pref/${pref.ken}.html`;
      chips.appendChild(chip);
    });

    group.appendChild(chips);
    container.appendChild(group);
  });
}

// ── UPCOMING ──────────────────────────────────────────────────────────────
function renderUpcoming() {
  const scroll = document.getElementById('upcomingScroll');
  const today = new Date();
  today.setHours(0,0,0,0);

  // Filter non-long-running events on or after today, sort by date
  const upcoming = EVENTS
    .filter(e => !isLongRunning(e) && new Date(e.date + 'T00:00:00') >= today)
    .sort((a, b) => a.date.localeCompare(b.date))
    .slice(0, 12);

  if (!upcoming.length) {
    document.querySelector('#upcomingScroll').closest('.top-section').style.display = 'none';
    return;
  }

  // Update sub label
  const sub = document.getElementById('upcomingSubLabel');
  if (sub) sub.textContent = `即將開跑的 ${upcoming.length} 場`;

  upcoming.forEach(e => {
    const d = new Date(e.date + 'T00:00:00');
    const dateStr = `${d.getMonth()+1}/${d.getDate()}（${DOW_ZH[d.getDay()]}）`;

    const card = document.createElement('a');
    card.className = 'top-card';
    card.href = `spot/${e.id}.html`;
    const thumb = `images/thumb/${e.id}.jpg`;
    card.innerHTML = `
      <div class="top-card-img">
        <img src="${thumb}" alt="${e.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
        <div class="top-card-img-placeholder" style="display:none">${e.name.slice(0,4)}</div>
      </div>
      <div class="top-card-body">
        <div class="top-card-name">${e.name}</div>
        <div class="top-card-meta">
          <span class="top-card-pref">${e.location}</span>
          <span class="top-card-date">${dateStr}</span>
        </div>
      </div>
    `;
    scroll.appendChild(card);
  });

  // Drag scroll
  let isDown = false, startX, scrollLeft;
  scroll.addEventListener('mousedown', e => { isDown = true; scroll.classList.add('dragging'); startX = e.pageX - scroll.offsetLeft; scrollLeft = scroll.scrollLeft; });
  scroll.addEventListener('mouseleave', () => { isDown = false; scroll.classList.remove('dragging'); });
  scroll.addEventListener('mouseup', () => { isDown = false; scroll.classList.remove('dragging'); });
  scroll.addEventListener('mousemove', e => { if (!isDown) return; e.preventDefault(); scroll.scrollLeft = scrollLeft - (e.pageX - scroll.offsetLeft - startX) * 1.2; });
}

// ── TOP PICKS ─────────────────────────────────────────────────────────────
function renderTopPicks() {
  const scroll = document.getElementById('topScroll');
  TOP_PICKS.forEach((id, i) => {
    const e = EVENTS.find(ev => ev.id === id);
    if (!e) return;
    const d = new Date(e.date + 'T00:00:00');
    const dateStr = `${d.getMonth()+1}/${d.getDate()}（${DOW_ZH[d.getDay()]}）`;

    const card = document.createElement('a');
    card.className = 'top-card';
    card.href = `spot/${e.id}.html`;
    const thumb = `images/thumb/${e.id}.jpg`;
    card.innerHTML = `
      <div class="top-card-img">
        <img src="${thumb}" alt="${e.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
        <div class="top-card-img-placeholder" style="display:none">${e.name.slice(0,4)}</div>
      </div>
      <div class="top-card-body">
        <div class="top-card-name">${e.name}</div>
        <div class="top-card-meta">
          <span class="top-card-pref">${e.location}</span>
          <span class="top-card-date">${dateStr}</span>
        </div>
      </div>
    `;
    scroll.appendChild(card);
  });

  // Drag scroll
  let isDown = false, startX, scrollLeft;
  scroll.addEventListener('mousedown', e => {
    isDown = true; scroll.classList.add('dragging');
    startX = e.pageX - scroll.offsetLeft;
    scrollLeft = scroll.scrollLeft;
  });
  scroll.addEventListener('mouseleave', () => { isDown = false; scroll.classList.remove('dragging'); });
  scroll.addEventListener('mouseup', () => { isDown = false; scroll.classList.remove('dragging'); });
  scroll.addEventListener('mousemove', e => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - scroll.offsetLeft;
    scroll.scrollLeft = scrollLeft - (x - startX) * 1.2;
  });
}

// ── ALL LIST ──────────────────────────────────────────────────────────────
function renderAllList() {
  const list = document.getElementById('allList');
  list.innerHTML = '';

  const filtered = EVENTS.filter(e => !activePref || e.ken === activePref);
  document.getElementById('allSubLabel').textContent =
    activePref ? `${filtered.length} 場` : `共 ${EVENTS.length} 場`;

  filtered.sort((a,b) => a.date.localeCompare(b.date)).forEach(e => {
    const d = new Date(e.date + 'T00:00:00');
    const dow = DOW_ZH[d.getDay()];
    const isShortMulti = e.endDate && !isLongRunning(e);
    const dayDisplay = isShortMulti
      ? `${d.getDate()}・${new Date(e.endDate + 'T00:00:00').getDate()}`
      : `${d.getDate()}`;

    const item = document.createElement('a');
    item.className = 'all-item';
    item.href = `spot/${e.id}.html`;
    item.innerHTML = `
      <div class="all-date-block">
        <div class="all-month">${d.getMonth()+1}月</div>
        <div class="all-day">${dayDisplay}</div>
        <div class="all-dow">${isShortMulti ? '連兩日' : dow}</div>
      </div>
      <div class="all-info">
        <div class="all-name">${e.name}</div>
        <div class="all-tags">
          <span class="all-pref">${e.location}</span>
          ${e.note ? `<span class="all-note">${e.note}</span>` : ''}
        </div>
      </div>
      <img class="all-thumb" src="images/${e.id}/1.jpg" alt="${e.name}" onerror="this.style.display='none'" />
    `;
    list.appendChild(item);
  });
}

// ── START ─────────────────────────────────────────────────────────────────
init();
</script>
