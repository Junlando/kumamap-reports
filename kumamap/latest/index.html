<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/kumamap/app_icon.png">
  <title>最新情報｜クマ出没マップ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta
    name="description"
    content="日本全国のクマ出没情報の最新情報。今日・過去7日間の出没情報を地図で確認できます。"
  />
  <link rel="canonical" href="https://junlando.com/kumamap/latest/" />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    :root {
      --ink: #111827;
      --ink-soft: #6b7280;
      --accent: #b91c1c;
      --border: #e5e7eb;
      --bg: #fff;
      --bg-muted: #f9fafb;
      --bg-card: #ffffff;
      --badge-accident: #f97316;
      --badge-sighting: #ef4444;
      --badge-trace: #3b82f6;
      --badge-capture: #10b981;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", sans-serif;
      background: var(--bg-muted);
      color: var(--ink);
      min-height: 100vh;
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }

    /* ── Header ── */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 14px 0;
    }
    .site-header.hidden { display: none; }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .site-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
      color: var(--ink);
    }
    .site-logo img {
      width: 36px;
      height: 36px;
      border-radius: 8px;
    }

    .header-nav {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .nav-tab {
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      color: var(--ink-soft);
      background: transparent;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .nav-tab:hover { background: var(--bg-muted); color: var(--ink); }
    .nav-tab.active { background: var(--accent); color: #fff; }
    .nav-tab.active:hover { background: #a01717; }

    /* ── Page Layout ── */
    .page-wrapper {
      max-width: 1300px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    .page-grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 20px;
      align-items: start;
    }

    /* ── Left: Map ── */
    .map-panel {
      position: sticky;
      top: 80px;
    }

    .map-card {
      background: var(--bg-card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border: 1px solid var(--border);
    }

    .map-card-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }

    .map-card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
    }

    #latest-map {
      width: 100%;
      height: 540px;
    }

    .map-footer {
      padding: 10px 18px;
      font-size: 12px;
      color: var(--ink-soft);
      border-top: 1px solid var(--border);
      background: var(--bg-muted);
    }

    /* ── Right: Stats + Toggle + List ── */
    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Stats Card */
    .stats-card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 18px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border: 1px solid var(--border);
    }

    .stats-top {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 14px;
    }

    .stats-total-num {
      font-size: 36px;
      font-weight: 800;
      color: var(--ink);
      line-height: 1;
    }

    .stats-total-label {
      font-size: 13px;
      color: var(--ink-soft);
    }

    .stats-row {
      display: flex;
      gap: 10px;
    }

    .stats-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-muted);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 13px;
      font-weight: 500;
    }

    .stats-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .stats-chip .count {
      font-weight: 700;
    }

    /* Toggle */
    .toggle-bar {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border: 1px solid var(--border);
      display: flex;
      gap: 0;
    }

    .toggle-btn {
      flex: 1;
      padding: 10px 0;
      font-size: 14px;
      font-weight: 600;
      border: none;
      background: transparent;
      border-radius: 10px;
      cursor: pointer;
      color: var(--ink-soft);
      transition: all 0.18s;
    }

    .toggle-btn.active {
      background: var(--ink);
      color: #fff;
    }

    /* Incident List */
    .list-card {
      background: var(--bg-card);
      border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border: 1px solid var(--border);
      overflow: hidden;
      max-height: 560px;
      overflow-y: auto;
    }

    .list-card-header {
      padding: 14px 18px 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg-card);
      z-index: 1;
    }

    .incident-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 13px 18px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
      color: inherit;
    }

    .incident-item:last-child { border-bottom: none; }
    .incident-item:hover { background: var(--bg-muted); }

    .incident-badge {
      flex-shrink: 0;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      margin-top: 2px;
    }

    .badge-accident { background: var(--badge-accident); }
    .badge-sighting { background: var(--badge-sighting); }
    .badge-trace    { background: var(--badge-trace); }
    .badge-capture  { background: var(--badge-capture); }

    .incident-body {
      flex: 1;
      min-width: 0;
    }

    .incident-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .incident-address {
      font-size: 12px;
      color: var(--ink-soft);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .incident-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 5px;
    }

    .incident-reporter {
      font-size: 11px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 4px;
    }
    .reporter-gov  { background: #dbeafe; color: #1d4ed8; }
    .reporter-user { background: #f3e8ff; color: #7c3aed; }

    .incident-reltime {
      font-size: 12px;
      color: var(--ink-soft);
      white-space: nowrap;
    }

    .incident-arrow {
      flex-shrink: 0;
      font-size: 18px;
      color: #d1d5db;
      align-self: center;
    }

    .list-empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--ink-soft);
      font-size: 14px;
    }

    .list-loading {
      padding: 30px 20px;
      text-align: center;
      color: var(--ink-soft);
      font-size: 14px;
    }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 24px;
      text-align: center;
      color: var(--ink-soft);
      font-size: 14px;
      background: var(--bg-card);
      margin-top: 32px;
    }

    /* ── Mobile ── */
    @media (max-width: 900px) {
      .page-grid {
        grid-template-columns: 1fr;
      }

      .map-panel {
        position: static;
        order: 2;
      }

      .right-panel {
        order: 1;
      }

      #latest-map {
        height: 280px;
      }

      .list-card {
        max-height: none;
        overflow-y: visible;
      }

      .page-wrapper {
        padding: 16px 12px;
      }
    }

    @media (max-width: 600px) {
      .header-nav { flex-wrap: wrap; gap: 4px; }
      .nav-tab { padding: 6px 12px; font-size: 12px; }
      .stats-row { flex-wrap: wrap; }
    }
  </style>

</head>

<body>

      <nav class="header-nav">

  <!-- Leaflet JS (no integrity to avoid hash mismatch) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // ── ?from=app → ヘッダー非表示 ──
    if (new URLSearchParams(location.search).get("from") === "app") {
      document.getElementById("site-header").classList.add("hidden");
    }

    // ── 定数 ──
    const JST_OFFSET_MS = 9 * 60 * 60 * 1000;
    const API_BASE = "https://kumamap.junlando.com/incidents/";
    const DAYS = 7;

    const PREF_MAP = [
      { id: "hokkaido", name: "北海道" },
      { id: "aomori",   name: "青森県" },
      { id: "iwate",    name: "岩手県" },
      { id: "miyagi",   name: "宮城県" },
      { id: "akita",    name: "秋田県" },
      { id: "yamagata", name: "山形県" },
      { id: "fukushima",name: "福島県" },
      { id: "ibaraki",  name: "茨城県" },
      { id: "tochigi",  name: "栃木県" },
      { id: "gunma",    name: "群馬県" },
      { id: "saitama",  name: "埼玉県" },
      { id: "chiba",    name: "千葉県" },
      { id: "tokyo",    name: "東京都" },
      { id: "kanagawa", name: "神奈川県" },
      { id: "niigata",  name: "新潟県" },
      { id: "toyama",   name: "富山県" },
      { id: "ishikawa", name: "石川県" },
      { id: "fukui",    name: "福井県" },
      { id: "yamanashi",name: "山梨県" },
      { id: "nagano",   name: "長野県" },
      { id: "gifu",     name: "岐阜県" },
      { id: "shizuoka", name: "静岡県" },
      { id: "aichi",    name: "愛知県" },
      { id: "mie",      name: "三重県" },
      { id: "shiga",    name: "滋賀県" },
      { id: "kyoto",    name: "京都府" },
      { id: "osaka",    name: "大阪府" },
      { id: "hyogo",    name: "兵庫県" },
      { id: "nara",     name: "奈良県" },
      { id: "wakayama", name: "和歌山県" },
      { id: "tottori",  name: "鳥取県" },
      { id: "shimane",  name: "島根県" },
      { id: "okayama",  name: "岡山県" },
      { id: "hiroshima",name: "広島県" },
      { id: "yamaguchi",name: "山口県" },
      { id: "tokushima",name: "徳島県" },
      { id: "kagawa",   name: "香川県" },
      { id: "ehime",    name: "愛媛県" },
      { id: "kochi",    name: "高知県" },
      { id: "fukuoka",  name: "福岡県" },
      { id: "saga",     name: "佐賀県" },
      { id: "nagasaki", name: "長崎県" },
      { id: "kumamoto", name: "熊本県" },
      { id: "oita",     name: "大分県" },
      { id: "miyazaki", name: "宮崎県" },
      { id: "kagoshima",name: "鹿児島県" },
      { id: "okinawa",  name: "沖縄県" },
    ];

    const PREF_ALIASES = { shimanetottori: "島根県", narakizugawa: "京都府" };
    const PREF_REMAP   = { shimanetottori: "shimane", narakizugawa: "kyoto" };
    const BLOCKED_PREFS = new Set(["yamanashi"]);

    // ── 都道府県名取得 ──
    function getPrefName(prefId) {
      const n = (prefId || "").toLowerCase();
      if (PREF_ALIASES[n]) return PREF_ALIASES[n];
      return PREF_MAP.find(p => p.id === n)?.name || prefId || "不明";
    }

    // ── incident_type → カテゴリ ──
    const SIGHTING_TYPES = new Set(["sighting", "building_intrusion"]);
    const ACCIDENT_TYPES = new Set(["human_injury", "traffic_accident", "train_accident"]);
    const CAPTURE_TYPES  = new Set(["capture"]);
    // それ以外 (trace, building_damage, crop_damage, unknown, ...) → 痕跡

    function getTypeCategory(type) {
      const t = (type || "").toLowerCase();
      if (SIGHTING_TYPES.has(t)) return "sighting";
      if (ACCIDENT_TYPES.has(t)) return "accident";
      if (CAPTURE_TYPES.has(t))  return "capture";
      return "trace";
    }

    function getBadgeInfo(type) {
      const cat = getTypeCategory(type);
      switch (cat) {
        case "accident": return { label: "事故", cls: "badge-accident" };
        case "sighting": return { label: "目撃", cls: "badge-sighting" };
        case "capture":  return { label: "捕獲", cls: "badge-capture" };
        default:         return { label: "痕跡", cls: "badge-trace" };
      }
    }

    // ── 相対時間 ──
    function getRelativeTime(ts) {
      if (!ts) return "時間不明";
      const now = Date.now();
      const diffSec = Math.floor((now / 1000) - ts);
      if (diffSec < 0)   return "たった今";
      if (diffSec < 60)  return `${diffSec}秒前`;
      const diffMin = Math.floor(diffSec / 60);
      if (diffMin < 60)  return `${diffMin}分前`;
      const diffHr = Math.floor(diffMin / 60);
      if (diffHr < 24)   return `${diffHr}時間前`;
      // 24h〜72h → N日前
      const diffDays = Math.floor(diffSec / 86400);
      if (diffDays <= 2) return `${diffDays}日前`;
      // 72h 超え → 日付
      const jstItem = new Date(ts * 1000 + JST_OFFSET_MS);
      return `${jstItem.getUTCMonth() + 1}月${jstItem.getUTCDate()}日`;
    }

    // ── Leaflet map ──
    let latestMap;
    let markersOnMap = [];

    const iconToday = L.icon({
      iconUrl: "/kumamap/kuma_marker.png",
      iconSize: [36, 36], iconAnchor: [18, 36], popupAnchor: [0, -36],
    });
    const iconMid = L.icon({
      iconUrl: "/kumamap/kuma_marker.png",
      iconSize: [30, 30], iconAnchor: [15, 30], popupAnchor: [0, -30],
    });
    const iconOld = L.icon({
      iconUrl: "/kumamap/kuma_marker_pinkgray.png",
      iconSize: [22, 22], iconAnchor: [11, 22], popupAnchor: [0, -22],
    });

    function initMap() {
      latestMap = L.map("latest-map").setView([36.5, 138.0], 5);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap contributors",
        maxZoom: 18,
      }).addTo(latestMap);
    }

    function clearMarkers() {
      markersOnMap.forEach(m => latestMap.removeLayer(m));
      markersOnMap = [];
    }

    function addMarkers(items, todayStartSec, threeDaysAgoSec) {
      const sorted = [...items].sort((a, b) => (a.timestamp_second || 0) - (b.timestamp_second || 0));
      sorted.forEach(item => {
        const lat = parseFloat(item.latitude);
        const lng = parseFloat(item.longitude);
        if (isNaN(lat) || isNaN(lng) || !lat || !lng) return;

        const ts = item.timestamp_second || 0;
        const isToday = ts >= todayStartSec;
        const isMid   = !isToday && ts >= threeDaysAgoSec;
        const icon = isToday ? iconToday : isMid ? iconMid : iconOld;
        const zIndexOffset = isToday ? 2000 : isMid ? 1000 : 0;

        const prefName = getPrefName(item.prefecture);
        const timeStr  = ts
          ? new Date(ts * 1000).toLocaleString("ja-JP", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" })
          : "時間不明";
        const descText = item.generated_description || item.street_address || item.description || "";
        const popupHtml = `<strong>${prefName}</strong><br>${timeStr}${descText ? `<br><span style="font-size:12px;color:#555;">${descText}</span>` : ""}`;

        const marker = L.marker([lat, lng], { icon, opacity: 1.0, zIndexOffset })
          .addTo(latestMap)
          .bindPopup(popupHtml);
        markersOnMap.push(marker);
      });
    }

    // ── データ保持 ──
    let allWeekIncidents  = []; // 7日間
    let allTodayIncidents = []; // 今日のみ
    let todayStartSec     = 0;
    let threeDaysAgoSec   = 0;
    let currentMode       = "week"; // "today" | "week"

    // ── モード切替 ──
    function switchMode(mode) {
      currentMode = mode;
      document.getElementById("btn-today").classList.toggle("active", mode === "today");
      document.getElementById("btn-week").classList.toggle("active",  mode === "week");

      const items = mode === "today" ? allTodayIncidents : allWeekIncidents;
      updateStats(items);
      updateList(items);
      clearMarkers();
      addMarkers(items, todayStartSec, threeDaysAgoSec);

      document.getElementById("map-mode-label").textContent = mode === "today" ? "今日の出没マップ" : "過去7日間の出没マップ";
      document.getElementById("list-header").textContent =
        mode === "today" ? "今日の出没情報" : "過去7日間の出没情報";
      document.getElementById("map-status").textContent =
        `${mode === "today" ? "今日" : "過去7日間"}の出没情報（${items.length}件）`;
    }

    // ── 統計更新 ──
    function updateStats(items) {
      document.getElementById("stats-total").textContent = items.length;
      let acc = 0, sig = 0, tra = 0;
      items.forEach(item => {
        const cat = getTypeCategory(item.incident_type);
        if (cat === "accident") acc++;
        else if (cat === "sighting") sig++;
        else tra++;
      });
      document.getElementById("stats-accident").textContent = acc;
      document.getElementById("stats-sighting").textContent = sig;
      document.getElementById("stats-trace").textContent    = tra;
    }

    // ── リスト描画 ──
    function updateList(incidents) {
      const el = document.getElementById("incident-list-content");
      if (!el) return;

      if (!incidents || incidents.length === 0) {
        el.innerHTML = `<div class="list-empty">出没情報はありません</div>`;
        return;
      }

      const sorted = [...incidents].sort((a, b) => (b.timestamp_second || 0) - (a.timestamp_second || 0));

      let html = "";
      sorted.forEach((item, idx) => {
        const relTime = getRelativeTime(item.timestamp_second);
        const badge   = getBadgeInfo(item.incident_type);

        // 敘述を title に：generated_description → street_address → description → 都道府県名
        const hasGenDesc = !!item.generated_description;
        const title = item.generated_description
          || item.street_address
          || item.description
          || getPrefName((item.prefecture || "").toLowerCase());

        // 住所は generated_description がある場合のみ副行表示（street_address と重複しないように）
        const address = hasGenDesc ? (item.street_address || "") : "";

        // reporter ラベル
        const reporter = (item.reporter || "").toLowerCase();
        const reporterHtml = reporter === "gov"
          ? `<span class="incident-reporter reporter-gov">公式</span>`
          : reporter === "user"
            ? `<span class="incident-reporter reporter-user">ユーザー</span>`
            : "";

        html += `
          <a class="incident-item" data-idx="${idx}" href="/kumamap/incident/">
            <span class="incident-badge ${badge.cls}">${badge.label}</span>
            <div class="incident-body">
              <div class="incident-title">${title}</div>
              ${address ? `<div class="incident-address">${address}</div>` : ""}
              <div class="incident-meta">
                ${reporterHtml}
                <span class="incident-reltime">${relTime}</span>
              </div>
            </div>
            <span class="incident-arrow">›</span>
          </a>`;
      });

      el.innerHTML = html;

      // クリック → sessionStorage → detail page
      el.addEventListener("click", (e) => {
        const card = e.target.closest(".incident-item[data-idx]");
        if (!card) return;
        e.preventDefault();
        const item = sorted[parseInt(card.dataset.idx, 10)];
        if (!item) return;
        sessionStorage.setItem("kumamap_incident", JSON.stringify(item));
        location.href = "/kumamap/incident/";
      });
    }

    // ── データ取得 ──
    async function loadData() {
      try {
        const now   = new Date();
        const jst   = new Date(now.getTime() + JST_OFFSET_MS);
        const todayUtcMs = Date.UTC(jst.getUTCFullYear(), jst.getUTCMonth(), jst.getUTCDate()) - JST_OFFSET_MS;

        todayStartSec   = Math.floor(todayUtcMs / 1000);
        threeDaysAgoSec = todayStartSec - 3 * 86400;

        const weekAfterSec  = Math.floor((todayUtcMs - (DAYS - 1) * 86400000) / 1000);
        const tomorrowSec   = todayStartSec + 86400;

        const [resData, resApi] = await Promise.all([
          fetch("/kumamap/data.json"),
          fetch(`${API_BASE}?created_after=${weekAfterSec}&created_before=${tomorrowSec}`),
        ]);
        if (!resData.ok) throw new Error(`data.json: HTTP ${resData.status}`);

        const apiItems  = resApi.ok ? (await resApi.json()) : [];
        const dataItems = await resData.json();

        // マージ + PREF_REMAP + フィルタ
        const raw = [...dataItems, ...apiItems]
          .map(item => ({
            ...item,
            prefecture: PREF_REMAP[(item.prefecture || "").toLowerCase()] ?? item.prefecture,
          }))
          .filter(item => !BLOCKED_PREFS.has((item.prefecture || "").toLowerCase()))
          .filter(item => item.timestamp_second && item.timestamp_second >= weekAfterSec);

        // 重複除去
        const dedupeMap = new Map();
        raw.forEach(item => {
          const lat = parseFloat(item.latitude).toFixed(4);
          const lng = parseFloat(item.longitude).toFixed(4);
          const key = `${item.timestamp_second}_${lat}_${lng}`;
          const ex  = dedupeMap.get(key);
          if (!ex || (!ex.generated_description && item.generated_description)) {
            dedupeMap.set(key, item);
          }
        });

        allWeekIncidents  = Array.from(dedupeMap.values());
        allTodayIncidents = allWeekIncidents.filter(i => (i.timestamp_second || 0) >= todayStartSec);

        // 初期表示: week モード
        switchMode(currentMode);

      } catch (e) {
        console.error("Failed to load incidents:", e);
        document.getElementById("map-status").textContent = "データの取得に失敗しました。";
        document.getElementById("incident-list-content").innerHTML =
          `<div class="list-empty">データの取得に失敗しました</div>`;
      }
    }

    // ── 初期化 ──
    function init() {
      if (typeof L === "undefined") {
        setTimeout(init, 100);
        return;
      }
      initMap();
      loadData();
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init);
    } else {
      init();
    }
  </script>

            }
        })();
    </script>
